# gitleaks config (#1462) — customises the default rule set for this
# repository. Format reference:
# https://github.com/gitleaks/gitleaks?tab=readme-ov-file#configuration
#
# Policy: zero tolerance for REAL leaked secrets. Silence false
# positives here with tight-scoped allow-list entries, never disable
# a rule globally. When in doubt, rotate the candidate secret first
# (SECURITY.md § Token + secret rotation) and silence the finding
# afterwards.
#
# NOTE on schema: gitleaks 8.24 (the version gitleaks-action@v2 ships)
# expects a SINGLE `[allowlist]` map, not `[[allowlist]]` array-of-
# tables. The `paths` and `regexes` fields below are merged into one
# allowlist that covers every carve-out; the leading comments indicate
# which use case each entry serves.

# Inherit gitleaks' default detection ruleset. Extending gives us the
# maintained upstream detectors for AWS keys, GCP service-account
# JSON, GitHub PATs, Slack tokens, Stripe keys, etc. — updated
# whenever we pin to a newer gitleaks-action version.
[extend]
useDefault = true

[allowlist]
description = "Documented non-secret noise — pytest cache, lockfiles, doc placeholders"
paths = [
  # pytest scratch artefacts look high-entropy to detectors but are
  # non-secret test data.
  '''\.pytest_cache/''',

  # Go module download caches + vendored deps are public content
  # checksums, not secrets.
  '''go\.sum$''',
  '''vendor/''',

  # npm / pnpm / yarn lockfiles include integrity hashes (sha512-…)
  # that trip entropy detectors. Pure content checksums.
  '''package-lock\.json$''',
  '''pnpm-lock\.yaml$''',
  '''yarn\.lock$''',

  # Example / placeholder tokens live in schema files, docs, and the
  # SECURITY policy. Keep the allow-list path-tight here rather than
  # globally; real secrets in these files would still be caught by a
  # content scanner on other paths.
  '''values\.schema\.json$''',
  '''docs/''',
  '''SECURITY\.md$''',
]

# Specific known-safe strings that must never trip a rule anywhere
# in the repo. The REPLACE_ME_WITH_GENERATED_TOKEN placeholder is
# intentional and enforced by a Helm template fail-on-render (#760) so
# a real token never ships with that value.
regexes = [
  '''REPLACE_ME_WITH_GENERATED_TOKEN''',
]
