# gitleaks config (#1462) — customises the default rule set for this
# repository. Format reference: https://github.com/gitleaks/gitleaks#configuration
#
# Policy: zero tolerance for REAL leaked secrets. Silence false
# positives here with tight-scoped allow-list entries, never disable
# a rule globally. When in doubt, rotate the candidate secret first
# (SECURITY.md § Token + secret rotation) and silence the finding
# afterwards.

# Inherit gitleaks' default detection ruleset. Extending gives us the
# maintained upstream detectors for AWS keys, GCP service-account
# JSON, GitHub PATs, Slack tokens, Stripe keys, etc. — updated
# whenever we pin to a newer gitleaks-action version.
[extend]
useDefault = true

# -----------------------------------------------------------------------------
# Path-scoped allow-list entries — narrow + commented.
# -----------------------------------------------------------------------------

# Claude Code bundles a local SQLite task database for session state
# under clients/ww/.pytest_cache and various test_*.pkl files. None
# of those are ever secret, but they occasionally trip the entropy
# detector with base64-encoded SHA digests. Silence binaries under
# any .pytest_cache directory.
[[allowlist]]
description = "pytest cache artefacts are non-secret test scratch data"
paths = ['''\.pytest_cache/''']

# Go module download caches (GOMODCACHE) occasionally end up in a
# pushed branch during a CI-caching experiment. These are public
# checksums, not secrets.
[[allowlist]]
description = "go module cache artefacts are public package hashes"
paths = ['''go\.sum$''', '''vendor/''']

# npm lockfiles include integrity hashes (sha512-…) that look like
# secrets to entropy detectors. Pure integrity data, no secret value.
[[allowlist]]
description = "npm/yarn lockfile integrity hashes are content checksums, not secrets"
paths = [
    '''package-lock\.json$''',
    '''pnpm-lock\.yaml$''',
    '''yarn\.lock$''',
]

# Helm chart `values.schema.json` and rendered-manifest fixtures carry
# example tokens in documentation blocks. Keep this tight: only
# files named values.schema.json or under docs/.
[[allowlist]]
description = "example / placeholder tokens in schemas + docs"
paths = [
    '''values\.schema\.json$''',
    '''docs/''',
    '''SECURITY\.md$''',
]

# -----------------------------------------------------------------------------
# Content-scoped allow-list — specific known-safe strings.
# -----------------------------------------------------------------------------

# The repo ships a placeholder token value in values-test.yaml +
# values-psa-audit.yaml that operators MUST replace before deploy
# (#760 enforces via a Helm template fail). The placeholder is
# documented as an intentional non-secret string.
[[allowlist]]
description = "REPLACE_ME token placeholder is intentional; chart fails render if it reaches deploy"
regexes = [
    '''REPLACE_ME_WITH_GENERATED_TOKEN''',
]
