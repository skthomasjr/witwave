default: true
MD013:
  line_length: 120
  tables: false
  code_blocks: false
  lists: true
MD018: false # `#NNN` issue refs at line start are a project convention; not ATX headings
MD024:
  siblings_only: true # Changelogs intentionally repeat headings like Added/Changed/Fixed under different releases
MD029: false # Allow intentional numbering across code-block-interrupted lists
MD033: false # Allow inline HTML
MD041: false # First line need not be a top-level heading (e.g. frontmatter files)
MD046:
  style: fenced # Match Prettier and the repo's preferred explicit code-block style
