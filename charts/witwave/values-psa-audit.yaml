# charts/witwave/values-psa-audit.yaml — #1377
#
# This values file turns on every opt-in component so the chart-CI
# PSA-restricted audit job (in .github/workflows/ci-charts.yml) sees
# the full rendered resource set, not just the defaults + values-test.
# Without this file, new optional components (mcp-prometheus is one)
# ship with a missing securityContext baseline and admission-time PSS
# failures only surface on a real cluster.
#
# Keep in sync with values.yaml's default-off flags: enable every
# toggle, enable every MCP tool, point every placeholder at a
# syntactically-valid fake so the render actually succeeds.

# -- core agents (minimum viable to render) ---------------------------
# Chart expects port / image / backends at the top level of each
# agent entry (see templates/deployment.yaml referencing `.image` on
# the agent scope). A non-"latest" tag is required by values.schema.json
# (#1450) — `0.0.1-ci-audit` is an obvious-fake marker so nobody
# accidentally believes this file produces a deployable render.
agents:
  - name: psa-audit-agent
    port: 8000
    image:
      repository: ghcr.io/skthomasjr/images/harness
      tag: "0.0.1-ci-audit"
    backends:
      - name: claude
        port: 8010
        image:
          repository: ghcr.io/skthomasjr/images/claude
          tag: "0.0.1-ci-audit"
    dashboard:
      enabled: true
      auth:
        mode: basic
        basic:
          htpasswd: "audit:$2y$05$fakehashfakehashfakehash"

# -- every MCP tool enabled (#1377 aim) -------------------------------
mcpTools:
  kubernetes:
    enabled: true
    image:
      repository: ghcr.io/skthomasjr/images/mcp-kubernetes
      tag: "0.0.1-ci-audit"
  helm:
    enabled: true
    image:
      repository: ghcr.io/skthomasjr/images/mcp-helm
      tag: "0.0.1-ci-audit"
  prometheus:
    enabled: true
    image:
      repository: ghcr.io/skthomasjr/images/mcp-prometheus
      tag: "0.0.1-ci-audit"

# -- every NetworkPolicy surface enabled ------------------------------
networkPolicy:
  enabled: true
  ingress:
    allowSameNamespace: true
    allowWitwaveAgents: true

# -- optional observability stack enabled -----------------------------
metrics:
  enabled: true
podMonitor:
  enabled: true
serviceMonitor:
  enabled: true
prometheusRule:
  enabled: true

# -- credential placeholders so templates don't fail render -----------
secrets:
  conversationsAuthToken: "audit-fake-token"
  triggersAuthToken: "audit-fake-token"
  hookEventsAuthToken: "audit-fake-token"
