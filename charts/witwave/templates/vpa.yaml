{{- /*
VerticalPodAutoscaler per agent (#1120). Disabled by default. Requires the
VerticalPodAutoscaler CRD from the kubernetes-sigs/autoscaler addon; the
template is inert unless the cluster operator installs that CRD separately.
witwave does NOT ship the VPA addon — LLM backends have wildly divergent memory
envelopes per model, so recommend-mode (`updateMode: Off`) is the sensible
default: the VPA emits recommendations, humans apply them.

Per-agent overrides follow the same shape as autoscaling/podDisruptionBudget:
`agents[].vpa` REPLACES (not merges) the chart-global `vpa` value.
*/ -}}
{{- range $agent := .Values.agents }}
{{- if eq (include "witwave.enabled" $agent) "true" }}
{{- $vpa := dict }}
{{- if $agent.vpa }}
{{- $vpa = $agent.vpa }}
{{- else if $.Values.vpa }}
{{- $vpa = $.Values.vpa }}
{{- end }}
{{- if $vpa.enabled }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ $.Release.Name }}-{{ $agent.name }}
  labels:
    {{- include "witwave.agentLabels" (dict "name" $agent.name "root" $) | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $.Release.Name }}-{{ $agent.name }}
  updatePolicy:
    updateMode: {{ $vpa.updateMode | default "Off" | quote }}
    {{- with $vpa.minReplicas }}
    minReplicas: {{ . }}
    {{- end }}
  {{- with $vpa.resourcePolicy }}
  resourcePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
