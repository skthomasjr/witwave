{{- /*
Inline credential Secrets (#473 dev-convenience pattern — extended to
gitSync and backend credentials).

Renders:
  - one Secret per agents[].gitSyncs[] entry whose resolved credentials
    include inline username/token (and acknowledgeInsecureInline=true)
  - one Secret per agents[].backends[] entry whose resolved credentials
    include an inline secrets: {} map (and acknowledgeInsecureInline=true)

Naming follows the shape deployment.yaml's envFrom helper expects:
  gitsync: <release>-<agent>-<gitSync>-gitsync-credentials
  backend: <release>-<agent>-<backend>-backend-credentials

Secrets with an existingSecret reference or anonymous gitSyncs render
nothing here — deployment.yaml just envFroms the existingSecret directly.
*/ -}}
{{- $root := . -}}
{{- $defGit := (.Values.gitSync).credentials | default dict -}}
{{- $defBackend := (.Values.backends).credentials | default dict -}}
{{- range $agent := .Values.agents -}}
{{- if $agent.gitSyncs }}
{{- range $gs := $agent.gitSyncs -}}
{{- $creds := $gs.credentials | default dict -}}
{{- $inline := include "witwave.hasInlineCredentials" (dict "creds" $creds "default" $defGit "kind" "gitsync") -}}
{{- $existing := or $creds.existingSecret $defGit.existingSecret -}}
{{- if and $inline (not $existing) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-%s-%s-gitsync-credentials" $root.Release.Name $agent.name $gs.name | trunc 253 }}
  labels:
    {{- include "witwave.agentLabels" (dict "root" $root "name" $agent.name) | nindent 4 }}
    app.kubernetes.io/component: gitsync-credentials
    witwave.ai/gitsync-name: {{ $gs.name | quote }}
type: Opaque
stringData:
  {{- include "witwave.inlineCredentialData" (dict "creds" $creds "default" $defGit "kind" "gitsync") | nindent 2 }}
{{- end -}}
{{- end -}}
{{- end }}
{{- if $agent.backends }}
{{- range $b := $agent.backends -}}
{{- $creds := $b.credentials | default dict -}}
{{- $inline := include "witwave.hasInlineCredentials" (dict "creds" $creds "default" $defBackend "kind" "backend") -}}
{{- $existing := or $creds.existingSecret $defBackend.existingSecret -}}
{{- if and $inline (not $existing) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-%s-%s-backend-credentials" $root.Release.Name $agent.name $b.name | trunc 253 }}
  labels:
    {{- include "witwave.agentLabels" (dict "root" $root "name" $agent.name) | nindent 4 }}
    app.kubernetes.io/component: backend-credentials
    witwave.ai/backend-name: {{ $b.name | quote }}
type: Opaque
stringData:
  {{- include "witwave.inlineCredentialData" (dict "creds" $creds "default" $defBackend "kind" "backend") | nindent 2 }}
{{- end -}}
{{- end -}}
{{- end }}
{{- end -}}
