---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-manifest
  labels:
    app.kubernetes.io/component: witwave-manifest
    app.kubernetes.io/part-of: witwave
    app.kubernetes.io/managed-by: helm
data:
  manifest.json: |
    {
      "team": [
        {{- $agents := list }}
        {{- range .Values.agents }}
        {{- if eq (include "witwave.enabled" .) "true" }}
        {{- $agents = append $agents . }}
        {{- end }}
        {{- end }}
        {{- range $i, $agent := $agents }}
        {{- /* #1587: mirror the service template's $svcPort resolution
               so the manifest URL points at the Service's exposed port,
               not the container port, when `service.port` overrides the
               default. */}}
        {{- $containerPort := $agent.port | default 8000 }}
        {{- $svcPort := $containerPort }}
        {{- if and ($agent.service) (hasKey $agent.service "port") }}
        {{- $svcPort = $agent.service.port }}
        {{- end }}
        {
          "name": {{ $agent.name | quote }},
          "url": "http://{{ $.Release.Name }}-{{ $agent.name }}:{{ $svcPort }}"
        }{{ if lt $i (sub (len $agents) 1) }},{{ end }}
        {{- end }}
      ]
    }
