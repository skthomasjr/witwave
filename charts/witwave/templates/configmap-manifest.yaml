---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-manifest
  labels:
    app.kubernetes.io/component: witwave-manifest
    app.kubernetes.io/part-of: witwave
    app.kubernetes.io/managed-by: helm
data:
  manifest.json: |
    {
      "team": [
        {{- $agents := list }}
        {{- range .Values.agents }}
        {{- if eq (include "witwave.enabled" .) "true" }}
        {{- $agents = append $agents . }}
        {{- end }}
        {{- end }}
        {{- range $i, $agent := $agents }}
        {
          "name": {{ $agent.name | quote }},
          "url": "http://{{ $.Release.Name }}-{{ $agent.name }}:{{ $agent.port | default 8000 }}"
        }{{ if lt $i (sub (len $agents) 1) }},{{ end }}
        {{- end }}
      ]
    }
