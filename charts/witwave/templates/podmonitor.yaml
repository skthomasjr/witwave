{{- if .Values.podMonitor.enabled }}
{{- range $agent := .Values.agents }}
{{- if eq (include "witwave.enabled" $agent) "true" }}
{{- /* Per-agent metrics.enabled=false must disable SM/PM emission (#1019).
       sprig `default` treats `false` as empty so a bare
       `($agent.metrics).enabled | default $.Values.metrics.enabled`
       silently falls back to the global value. */}}
{{- $agentMetricsEnabled := $.Values.metrics.enabled }}
{{- if ($agent.metrics) }}{{- if hasKey $agent.metrics "enabled" }}{{- $agentMetricsEnabled = $agent.metrics.enabled }}{{- end }}{{- end }}
{{- if $agentMetricsEnabled }}
---
# PodMonitor for the Prometheus Operator (#582). One per agent, gated on
# both .Values.podMonitor.enabled and the agent's metrics flag.
# #1588: duplicate container port names are not permitted per pod, so
# each container exposes a distinct metrics port name
# (harness → ``metrics``; backend ``<name>`` → ``<trunc>-metrics``). The
# PodMonitor emits one endpoint per name so every listener is still
# scraped.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $.Release.Name }}-{{ $agent.name }}
  labels:
    {{- include "witwave.agentLabels" (dict "name" $agent.name "root" $) | nindent 4 }}
    {{- with $.Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $agent.name }}
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  {{- /* Preserve the canonical `app.kubernetes.io/part-of` pod label onto
         every scraped series so alerts can match `app_kubernetes_io_part_of="witwave"`
         without relying on a fragile `job=~".*witwave.*"` regex (#1264). Prometheus
         sanitises `.` and `/` in label names. */}}
  podTargetLabels:
    - app.kubernetes.io/part-of
  {{- /* Cardinality + size safety (#1076). Values render only when non-nil
         so existing installs that explicitly override these to null keep
         their old behaviour; the defaults in values.yaml cap per-scrape
         samples, targets, and label-value lengths. */}}
  {{- with $.Values.podMonitor.sampleLimit }}
  sampleLimit: {{ . }}
  {{- end }}
  {{- with $.Values.podMonitor.targetLimit }}
  targetLimit: {{ . }}
  {{- end }}
  {{- with $.Values.podMonitor.labelValueLengthLimit }}
  labelValueLengthLimit: {{ . }}
  {{- end }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ $.Values.podMonitor.scrapeInterval }}
      scrapeTimeout: {{ $.Values.podMonitor.scrapeTimeout }}
      {{- with $.Values.podMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- /* #1588: per-backend endpoint block — each backend exposes a
           uniquely named metrics port so the pod manifest validates. */}}
    {{- range $agent.backends }}
    {{- if eq (include "witwave.enabled" .) "true" }}
    - port: {{ .name | trunc 7 }}-metrics
      path: /metrics
      interval: {{ $.Values.podMonitor.scrapeInterval }}
      scrapeTimeout: {{ $.Values.podMonitor.scrapeTimeout }}
      {{- with $.Values.podMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- /* MCP tool PodMonitors (#688). One per enabled MCP tool pod so
       kube-prometheus-stack discovers the metrics listener the tool
       binds in-container. Skips the scalar metricsPort entry under
       .Values.mcpTools introduced in #687. */}}
{{- if and .Values.podMonitor.enabled .Values.metrics.enabled }}
{{- range $name, $tool := .Values.mcpTools }}
{{- if and (kindIs "map" $tool) $tool.enabled }}
{{- $fullName := printf "%s-mcp-%s" $.Release.Name $name }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $fullName }}
  labels:
    app.kubernetes.io/name: {{ $fullName }}
    app.kubernetes.io/component: mcp-tool
    app.kubernetes.io/part-of: witwave
    {{- with $.Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $fullName }}
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  {{- /* Cardinality + size safety (#1076). Values render only when non-nil
         so existing installs that explicitly override these to null keep
         their old behaviour; the defaults in values.yaml cap per-scrape
         samples, targets, and label-value lengths. */}}
  {{- with $.Values.podMonitor.sampleLimit }}
  sampleLimit: {{ . }}
  {{- end }}
  {{- with $.Values.podMonitor.targetLimit }}
  targetLimit: {{ . }}
  {{- end }}
  {{- with $.Values.podMonitor.labelValueLengthLimit }}
  labelValueLengthLimit: {{ . }}
  {{- end }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ $.Values.podMonitor.scrapeInterval }}
      scrapeTimeout: {{ $.Values.podMonitor.scrapeTimeout }}
      {{- with $.Values.podMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
