{{- /*
Chart-owned cert-manager Issuer for dashboard TLS (#639).

Rendered only when:
  - certManager.enabled
  - certManager.createIssuer
  - certManager.issuerRef.name is empty (external issuer takes priority)

Default shape is `selfSigned` — simplest for internal clusters and matches
what Kubebuilder scaffolds for webhook certs. For production setups point
at an external ClusterIssuer via certManager.issuerRef and set
createIssuer=false.
*/ -}}
{{- if .Values.certManager.enabled -}}
{{- if and .Values.certManager.createIssuer (not (and .Values.certManager.issuerRef .Values.certManager.issuerRef.name)) -}}
apiVersion: cert-manager.io/v1
kind: {{ .Values.certManager.issuerKind | default "Issuer" | quote }}
metadata:
  name: {{ .Release.Name }}-selfsigned
  {{- if eq (.Values.certManager.issuerKind | default "Issuer") "Issuer" }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: cert-manager
    app.kubernetes.io/part-of: witwave
    app.kubernetes.io/managed-by: helm
spec:
  selfSigned: {}
{{- end -}}
{{- end -}}
