{{/*
helm test for OTel tracing env injection (#842).

Verifies that when observability.tracing.enabled=true, every harness
container has OTEL_ENABLED=true and OTEL_EXPORTER_OTLP_ENDPOINT
injected. A refactor to deployment.yaml that drops the env wiring
would otherwise only surface when an operator diffed env vars by hand.

No-op when tracing is disabled — skip rendering entirely so unrelated
test-suite runs do not pay the pod-spin cost.
*/}}
{{- if .Values.observability.tracing.enabled }}
{{- $endpoint := .Values.observability.tracing.endpoint | default "" }}
{{- if $endpoint }}
{{- range .Values.agents }}
{{- if eq (include "witwave.enabled" .) "true" }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-test-tracing
  labels:
    {{- include "witwave.agentLabels" (dict "name" .name "root" $) | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  activeDeadlineSeconds: 60
  serviceAccountName: {{ $.Release.Name }}-{{ .name }}-test-tracing
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test
      image: bitnami/kubectl:1.30.4
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      command:
        - /bin/sh
        - -c
        - |
          set -e
          DEPLOY={{ $.Release.Name }}-{{ .name }}
          NS={{ $.Release.Namespace }}
          echo "Asserting OTEL_ENABLED injected on every container of $DEPLOY..."
          env_json=$(kubectl -n "$NS" get deploy "$DEPLOY" -o json)
          enabled_count=$(echo "$env_json" \
            | grep -c '"name": "OTEL_ENABLED"' || true)
          if [ "$enabled_count" = "0" ]; then
            echo "ERROR: OTEL_ENABLED not found on any container of $DEPLOY" >&2
            exit 1
          fi
          endpoint_count=$(echo "$env_json" \
            | grep -c '"name": "OTEL_EXPORTER_OTLP_ENDPOINT"' || true)
          if [ "$endpoint_count" = "0" ]; then
            echo "ERROR: OTEL_EXPORTER_OTLP_ENDPOINT not wired on $DEPLOY" >&2
            exit 1
          fi
          echo "OTel tracing env verified on $DEPLOY."
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-test-tracing
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-test-tracing
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-test-tracing
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-{{ .name }}-test-tracing
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $.Release.Name }}-{{ .name }}-test-tracing
{{- end }}
{{- end }}
{{- end }}
{{- end }}
