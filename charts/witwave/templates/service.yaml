{{- range .Values.agents }}
{{- if eq (include "witwave.enabled" .) "true" }}
{{- /* Service port vs container port (#479). `port` is the container port
       (probes, pod-to-pod); when `service.port` is set it overrides the
       Service port only — targetPort stays pinned to the container port
       so probes keep landing on the same listener. Matches the operator's
       WitwaveAgentSpec.ServicePort override. */}}
{{- $containerPort := .port | default 8000 }}
{{- $svcPort := $containerPort }}
{{- if and (.service) (hasKey .service "port") }}
{{- $svcPort = .service.port }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  labels:
    {{- include "witwave.agentLabels" (dict "name" .name "root" $) | nindent 4 }}
  {{- /* serviceAnnotations defaults to true, so use hasKey to detect an explicit
        per-agent `false` override — sprig's `default` would return the global
        true and ignore the override (#472, #1020). */}}
  {{- $metricsOn := $.Values.metrics.enabled }}
  {{- if (.metrics) }}{{- if hasKey .metrics "enabled" }}{{- $metricsOn = .metrics.enabled }}{{- end }}{{- end }}
  {{- $svcAnnOn := $.Values.metrics.serviceAnnotations }}
  {{- if (.metrics) }}{{- if hasKey .metrics "serviceAnnotations" }}{{- $svcAnnOn = .metrics.serviceAnnotations }}{{- end }}{{- end }}
  {{- /* Metrics port derived per-container: app_port + 1000. Service
         exposes the harness's metrics port (not the backends' — those
         are scraped per-container via PodMonitor which targets the
         named `metrics` port across all containers). #643 */}}
  {{- $metricsPort := add $containerPort 1000 }}
  {{- if and $metricsOn $svcAnnOn }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ $metricsPort | quote }}
    prometheus.io/path: "/metrics"
  {{- end }}
spec:
  type: {{ ((.service).type) | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: {{ .name }}
  ports:
    - name: http
      port: {{ $svcPort }}
      targetPort: {{ $containerPort }}
    {{- if $metricsOn }}
    # Dedicated metrics port (#643) — exposed on the Service so
    # ServiceMonitor can scrape it via the `metrics` named endpoint.
    - name: metrics
      port: {{ $metricsPort }}
      targetPort: metrics
    {{- end }}
{{- end }}
{{- end }}
