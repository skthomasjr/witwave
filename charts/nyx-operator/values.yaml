# nyx-operator controller manager image.
image:
  repository: ghcr.io/skthomasjr/images/nyx-operator
  # Image tag. Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name derived inside _helpers.tpl.
nameOverride: ""
fullnameOverride: ""

# Number of controller-manager replicas. 1 is typical; >1 requires leader
# election (enabled by default) to elect a single active instance.
replicaCount: 1

# Install the NyxAgent CRD alongside the operator. Disable if CRDs are
# managed out-of-band (e.g. via argocd sync waves or a separate release).
# When disabled, the operator still runs but will fail to reconcile any
# NyxAgent until its CRD is present in the cluster.
installCRDs: true

# RBAC — when false the chart skips ClusterRole/ClusterRoleBinding/Role
# creation. Operators deployed into multi-tenant clusters may want to
# manage RBAC separately.
rbac:
  create: true

# Leader election — required when replicaCount > 1 to ensure a single
# active controller. Harmless for replicaCount=1.
leaderElection:
  enabled: true

# Prometheus metrics endpoint (controller-runtime metrics).
# When enabled, a ClusterIP Service is created on metrics.port routing to
# the manager pod. secure=true serves HTTPS with a self-signed cert by
# default; flip to false only in development.
metrics:
  enabled: false
  port: 8443
  secure: true

# ServiceMonitor for the Prometheus Operator (#446). Off by default so the
# chart never references monitoring.coreos.com CRDs unless the user opts in.
# Requires metrics.enabled=true to do anything; the template is gated on both.
# When enabled, Prometheus auto-discovers the operator's metrics endpoint
# without manual scrape configuration.
serviceMonitor:
  enabled: false
  # scrapeInterval and scrapeTimeout are forwarded to the ServiceMonitor
  # endpoints[]; defaults align with kubebuilder's manifests/monitor.yaml.
  scrapeInterval: 30s
  scrapeTimeout: 10s
  # Extra labels merged into the ServiceMonitor metadata. Useful when the
  # cluster's Prometheus has a label selector requiring a specific tenancy
  # label (e.g. release: kube-prometheus-stack).
  labels: {}
  # When metrics.secure is true the endpoint scheme is HTTPS and the
  # ServiceMonitor needs to know how to verify the manager's self-signed
  # certificate. Override below when wiring cert-manager or your own CA.
  tlsConfig:
    insecureSkipVerify: true

# Health/liveness probe endpoint. Matches the --health-probe-bind-address
# flag passed to the manager.
probes:
  port: 8081

# Optional PodDisruptionBudget for the manager pod (#464). Default off; set
# enabled: true to protect the operator from voluntary disruption (node drain,
# cluster upgrade). minAvailable: 1 is sensible for replicaCount: 1 with
# leader election; supply maxUnavailable instead for replicaCount > 1.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1   # mutually exclusive with minAvailable

# Pod termination grace period (#512). Must be greater than
# preStop.delaySeconds so the manager has time to receive SIGTERM and run
# controller-runtime's graceful shutdown (leader-lease release, in-flight
# reconcile drain) before the kubelet sends SIGKILL. Default 30s allows for
# the default 5s preStop drain plus a ~25s shutdown budget.
terminationGracePeriodSeconds: 30

# Optional preStop lifecycle sleep on the manager container (#465). Gives a
# coordinated drain window for in-flight reconciliations before SIGTERM.
# Default off; the operator's Reconcile cycles are short so 5s is usually
# plenty when enabled. Keep delaySeconds strictly less than
# terminationGracePeriodSeconds so SIGTERM fires with enough remaining grace
# to complete graceful shutdown (#512).
preStop:
  enabled: false
  delaySeconds: 5

# ServiceAccount used by the manager pod.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  # Use a specific existing SA name; leave empty to auto-derive from release.
  name: ""

podAnnotations: {}
podLabels: {}

# Pod-level security context. Defaults satisfy the Pod Security Standards
# "restricted" profile.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Resource requests and limits for the controller-manager container.
# Defaults match kubebuilder's recommended baseline for small clusters.
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Additional command-line flags passed to /manager. Useful for experimental
# flags that are not yet first-class values above.
extraArgs: []

# Extra environment variables for the controller-manager container. POD_NAME
# and POD_NAMESPACE are always injected via the downward API (used for OTel
# resource attributes when OTEL_ENABLED=true). Add OTEL_* / OTEL_EXPORTER_*
# entries here to enable distributed tracing without rebuilding the image:
# env:
#   - name: OTEL_ENABLED
#     value: "true"
#   - name: OTEL_EXPORTER_OTLP_ENDPOINT
#     value: http://otel-collector.observability:4318
env: []
# extraArgs:
#   - --zap-log-level=debug

nodeSelector: {}
tolerations: []
affinity: {}
