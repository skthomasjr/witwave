{{- /*
VerticalPodAutoscaler for the operator deployment (#1120). Disabled by
default. Requires the VerticalPodAutoscaler CRD from the kubernetes-sigs/
autoscaler addon; this template is inert unless the cluster operator
installs that CRD separately.

The operator is a singleton controller-manager with modest, bursty CPU/
memory usage (reconcile loops during NyxAgent churn). Recommend-mode
(`updateMode: Off`) keeps VPA observing without touching the running pod.
*/ -}}
{{- if .Values.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "nyx-operator.fullname" . }}
  labels:
    {{- include "nyx-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "nyx-operator.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | default "Off" | quote }}
    {{- with .Values.vpa.minReplicas }}
    minReplicas: {{ . }}
    {{- end }}
  {{- with .Values.vpa.resourcePolicy }}
  resourcePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
