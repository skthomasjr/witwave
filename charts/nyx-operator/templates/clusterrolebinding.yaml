{{- if and .Values.rbac.create (eq (default "cluster" .Values.rbac.scope) "cluster") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nyx-operator.fullname" . }}-manager
  labels:
    {{- include "nyx-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nyx-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "nyx-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
