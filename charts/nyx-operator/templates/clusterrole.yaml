{{- if .Values.rbac.create }}
---
# ClusterRole aggregating every permission the nyx-operator reconciler needs.
# Kept in sync with operator/config/rbac/role.yaml — update both when new
# owned resource types are added.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nyx-operator.fullname" . }}-manager
  labels:
    {{- include "nyx-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - persistentvolumeclaims
      - services
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [nyx.ai]
    resources: [nyxagents]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [nyx.ai]
    resources: [nyxagents/status]
    verbs: [get, patch, update]
  - apiGroups: [nyx.ai]
    resources: [nyxagents/finalizers]
    verbs: [update]
{{- end }}
