{{- if and .Values.rbac.create (eq (default "cluster" .Values.rbac.scope) "cluster") }}
---
# ClusterRole aggregating every permission the nyx-operator reconciler needs.
# Kept in sync with operator/config/rbac/role.yaml — update both when new
# owned resource types are added.
#
# Only rendered when rbac.scope=cluster (default). For per-namespace installs
# set rbac.scope=namespace and the chart installs a Role + RoleBinding in each
# rbac.watchNamespaces entry instead (#532).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nyx-operator.fullname" . }}-manager
  labels:
    {{- include "nyx-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - persistentvolumeclaims
      - secrets
      - services
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    # NyxAgent CRs may live in any namespace; the leader-election Role only
    # grants events in the operator's own namespace, so the manager
    # ClusterRole needs cluster-wide events:create/patch for #442.
    verbs: [create, patch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors, podmonitors]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [nyx.ai]
    resources: [nyxagents]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [nyx.ai]
    resources: [nyxagents/status]
    verbs: [get, patch, update]
  - apiGroups: [nyx.ai]
    resources: [nyxagents/finalizers]
    verbs: [update]
  - apiGroups: [nyx.ai]
    resources: [nyxprompts]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [nyx.ai]
    resources: [nyxprompts/status]
    verbs: [get, patch, update]
  - apiGroups: [nyx.ai]
    resources: [nyxprompts/finalizers]
    verbs: [update]
{{- end }}
