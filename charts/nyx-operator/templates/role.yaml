{{- if and .Values.rbac.create (eq (default "cluster" .Values.rbac.scope) "namespace") }}
{{- $fullName := include "nyx-operator.fullname" . -}}
{{- $saName := include "nyx-operator.serviceAccountName" . -}}
{{- $saNamespace := .Release.Namespace -}}
{{- $labels := include "nyx-operator.labels" . -}}
{{- $watchNamespaces := .Values.rbac.watchNamespaces | default (list .Release.Namespace) -}}
# Per-namespace Role + RoleBinding pair for rbac.scope=namespace installs
# (#532). The operator's ServiceAccount (in the release namespace) is granted
# the exact same resource verbs as the ClusterRole variant, but only within
# each entry in rbac.watchNamespaces. No cluster-wide privileges are granted.
#
# When using this mode the operator MUST be started with
# --watch-namespaces=<comma-separated list> so controller-runtime restricts
# its cache to the same namespaces — otherwise it tries to LIST cluster-wide
# and fails at startup. Use values.yaml `extraArgs` to pass the flag.
#
# The nyxagents/status and nyxagents/finalizers subresources remain bound to
# the CRD; they are listed here because the reconciler updates them on each
# Reconcile iteration.
{{- range $ns := $watchNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-manager
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - persistentvolumeclaims
      - secrets
      - services
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors, podmonitors]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [nyx.ai]
    resources: [nyxagents]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [nyx.ai]
    resources: [nyxagents/status]
    verbs: [get, patch, update]
  - apiGroups: [nyx.ai]
    resources: [nyxagents/finalizers]
    verbs: [update]
  - apiGroups: [nyx.ai]
    resources: [nyxprompts]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [nyx.ai]
    resources: [nyxprompts/status]
    verbs: [get, patch, update]
  - apiGroups: [nyx.ai]
    resources: [nyxprompts/finalizers]
    verbs: [update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-manager
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ $saNamespace }}
{{- end }}
{{- end }}
