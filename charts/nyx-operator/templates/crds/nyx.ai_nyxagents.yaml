                      either the Service or the Pod template, regardless of the
                      granular flags below.
                    type: boolean
                  podAnnotations:
                    default: false
                    description: |-
                      PodAnnotations stamps the same annotations onto the Pod template
                      for Prometheus configs using `kubernetes_sd_configs.role: pod`
                      (per-replica metrics). Defaults to false — opt in when needed.
                      Mirrors charts/nyx beta.35 / #472.
                    type: boolean
                  serviceAnnotations:
                    default: true
                    description: |-
                      ServiceAnnotations stamps prometheus.io/{scrape,port,path}
                      annotations onto the agent Service for Prometheus configs using
                      `kubernetes_sd_configs.role: service`. Defaults to true (preserves
                      historical chart behaviour).
                    type: boolean
                type: object
              podDisruptionBudget:
                description: PodDisruptionBudget optionally creates a PDB for the
                  agent Deployment.
                properties:
                  enabled:
                    description: Enabled creates a PodDisruptionBudget for the agent's
                      Deployment.
                    type: boolean
                  maxUnavailable:
                    format: int32
                    type: integer
                  minAvailable:
                    format: int32
                    type: integer
                type: object
              port:
                default: 8000
                description: Port is the HTTP port nyx-harness listens on (Service
                  + probe target).
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              probes:
                description: Probes overrides liveness/readiness probe timing.
                properties:
                  liveness:
                    description: |-
                      ProbeSpec describes a single probe's timing parameters.
                      Defaults match the Helm chart's probes.* defaults.
                    properties:
                      failureThreshold:
                        default: 3
                        format: int32
                        type: integer
                      initialDelaySeconds:
                        default: 10
                        format: int32
                        type: integer
                      periodSeconds:
                        default: 30
                        format: int32
                        type: integer
                      timeoutSeconds:
                        default: 5
                        format: int32
                        type: integer
                    type: object
                  readiness:
                    description: |-
                      ProbeSpec describes a single probe's timing parameters.
                      Defaults match the Helm chart's probes.* defaults.
                    properties:
                      failureThreshold:
                        default: 3
                        format: int32
                        type: integer
                      initialDelaySeconds:
                        default: 10
                        format: int32
                        type: integer
                      periodSeconds:
                        default: 30
                        format: int32
                        type: integer
                      timeoutSeconds:
                        default: 5
                        format: int32
                        type: integer
                    type: object
                type: object
              resources:
                description: Resources are CPU/memory requests and limits for the
                  nyx-harness container.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This is an alpha field and requires enabling the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              serviceType:
                default: ClusterIP
                description: |-
                  ServiceType controls the agent Service.spec.type. Defaults to ClusterIP.
                  Set to NodePort or LoadBalancer to expose the agent outside the
                  cluster without an Ingress (#chart beta.31 / #466).
                enum:
                - ClusterIP
                - NodePort
                - LoadBalancer
                type: string
              sharedStorage:
                description: SharedStorage optionally mounts a pre-existing PVC into
                  every container.
                properties:
                  claimName:
                    description: ClaimName is the name of the existing PersistentVolumeClaim.
                    minLength: 1
                    type: string
                  mountPath:
                    default: /data/shared
                    description: MountPath is the absolute path inside each container.
                    type: string
                required:
                - claimName
                type: object
              terminationGracePeriodSeconds:
                description: |-
                  TerminationGracePeriodSeconds overrides the pod's grace window between
                  SIGTERM and SIGKILL. Defaults to 60s, matching the chart-managed
                  agent pods. Increase for workloads with long-running per-request work
                  (multi-minute jobs, slow webhook deliveries) that need more drain
                  time during voluntary disruption (#458).
                format: int64
                minimum: 0
                type: integer
            required:
            - backends
            - image
            type: object
          status:
            description: NyxAgentStatus defines the observed state of NyxAgent.
            properties:
              conditions:
                description: Conditions follow the standard Kubernetes condition convention.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the generation of the spec most
                  recently reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is a coarse-grained lifecycle indicator.
                enum:
                - Pending
                - Ready
                - Degraded
                - Error
                type: string
              readyReplicas:
                description: ReadyReplicas mirrors the agent Deployment's status.readyReplicas.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
