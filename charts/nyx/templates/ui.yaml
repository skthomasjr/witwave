{{- if .Values.ui.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-ui
  labels:
    app.kubernetes.io/name: {{ $.Release.Name }}-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: helm
spec:
  replicas: {{ .Values.ui.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $.Release.Name }}-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $.Release.Name }}-ui
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: nyx
        app.kubernetes.io/managed-by: helm
    spec:
      automountServiceAccountToken: false
      {{- if .Values.ui.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.ui.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag | default $.Chart.AppVersion }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- if .Values.ui.resources }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          {{- end }}
          env:
            - name: UI_CORS_ALLOW_ORIGIN
              value: {{ .Values.ui.corsAllowOrigin | default "*" | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-ui
  labels:
    app.kubernetes.io/name: {{ $.Release.Name }}-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: helm
spec:
  selector:
    app.kubernetes.io/name: {{ $.Release.Name }}-ui
  ports:
    - name: http
      port: {{ .Values.ui.port | default 80 }}
      targetPort: 80
{{- end }}
