{{- $hasAnyMappings := false }}
{{- range .Values.agents }}
{{- if .gitMappings }}{{- $hasAnyMappings = true }}{{- end }}
{{- range .backends }}
{{- if .gitMappings }}{{- $hasAnyMappings = true }}{{- end }}
{{- end }}
{{- end }}
{{- if $hasAnyMappings }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-git-sync-script
  labels:
    app.kubernetes.io/component: nyx-git-sync
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: helm
data:
  git-sync.sh: |
    #!/bin/sh
    set -e
    MAPPINGS_DIR="${1:-/nyx-mappings}"
    failed=0
    apply_mappings() {
      MAPPINGS_FILE="$1"
      src=""
      dest=""
      while IFS= read -r line; do
        case "$line" in
          *"src:"*)
            src=$(echo "$line" | sed 's/.*src:[[:space:]]*//')
            ;;
          *"dest:"*)
            dest=$(echo "$line" | sed 's/.*dest:[[:space:]]*//')
            if [ -n "$src" ] && [ -n "$dest" ]; then
              case "$src" in
                */)
                  echo "Syncing dir  $src -> $dest"
                  if ! rm -rf "$dest" || ! mkdir -p "$dest" || ! cp -r "${src}." "$dest"; then
                    echo "ERROR: failed to sync dir $src -> $dest" >&2
                    failed=1
                  fi
                  ;;
                *)
                  echo "Syncing file $src -> $dest"
                  if ! mkdir -p "$(dirname "$dest")" || ! cp "$src" "$dest"; then
                    echo "ERROR: failed to sync file $src -> $dest" >&2
                    failed=1
                  fi
                  ;;
              esac
              src=""
              dest=""
            fi
            ;;
        esac
      done < "$MAPPINGS_FILE"
    }
    for f in "$MAPPINGS_DIR"/*/mappings.yaml; do
      [ -f "$f" ] || continue
      echo "Applying mappings from $f"
      apply_mappings "$f"
    done
    if [ "$failed" -ne 0 ]; then
      echo "ERROR: one or more mappings failed" >&2
      exit 1
    fi
{{- end }}
{{- range .Values.agents }}
{{- $agentName := .name }}
{{- if .gitMappings }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-{{ $agentName }}-git-mappings
  labels:
    {{- include "nyx.agentLabels" $agentName | nindent 4 }}
data:
  mappings.yaml: |
    {{- range .gitMappings }}
    - src: /git/{{ .gitSync }}/{{ .src }}
      dest: {{ .dest }}
    {{- end }}
{{- end }}
{{- range .backends }}
{{- if .gitMappings }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-{{ $agentName }}-{{ .name }}-git-mappings
  labels:
    {{- include "nyx.backendLabels" (dict "agentName" $agentName "backendName" .name) | nindent 4 }}
data:
  mappings.yaml: |
    {{- range .gitMappings }}
    - src: /git/{{ .gitSync }}/{{ .src }}
      dest: {{ .dest }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
