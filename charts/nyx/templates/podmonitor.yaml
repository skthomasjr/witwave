{{- if .Values.podMonitor.enabled }}
{{- range $agent := .Values.agents }}
{{- if eq (include "nyx.enabled" $agent) "true" }}
{{- $agentMetricsEnabled := ($agent.metrics).enabled | default $.Values.metrics.enabled }}
{{- if $agentMetricsEnabled }}
---
# PodMonitor for the Prometheus Operator (#582). One per agent, gated on
# both .Values.podMonitor.enabled and the agent's metrics flag (global or
# per-agent override). PodMonitor scrapes backend /metrics endpoints
# directly on the pod, avoiding the per-agent Service (which only
# publishes the harness port). Each enabled backend contributes one
# podMetricsEndpoints[] entry referencing its named container port.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $.Release.Name }}-{{ $agent.name }}-backends
  labels:
    {{- include "nyx.agentLabels" (dict "name" $agent.name "root" $) | nindent 4 }}
    {{- with $.Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $agent.name }}
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  podMetricsEndpoints:
    {{- range $backend := $agent.backends }}
    {{- if eq (include "nyx.enabled" $backend) "true" }}
    - port: {{ printf "%s-metrics" $backend.name | trunc 15 | trimSuffix "-" }}
      path: /metrics
      interval: {{ $.Values.podMonitor.scrapeInterval }}
      scrapeTimeout: {{ $.Values.podMonitor.scrapeTimeout }}
    {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
