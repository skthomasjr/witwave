{{- if .Values.podMonitor.enabled }}
{{- range $agent := .Values.agents }}
{{- if eq (include "nyx.enabled" $agent) "true" }}
{{- $agentMetricsEnabled := ($agent.metrics).enabled | default $.Values.metrics.enabled }}
{{- if $agentMetricsEnabled }}
---
# PodMonitor for the Prometheus Operator (#582). One per agent, gated on
# both .Values.podMonitor.enabled and the agent's metrics flag. Scrapes
# every container in the pod that exposes the named `metrics` port (#643)
# — harness + every enabled backend — in a single endpoint definition.
# Prometheus discovers one target per matching container port.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $.Release.Name }}-{{ $agent.name }}
  labels:
    {{- include "nyx.agentLabels" (dict "name" $agent.name "root" $) | nindent 4 }}
    {{- with $.Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $agent.name }}
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ $.Values.podMonitor.scrapeInterval }}
      scrapeTimeout: {{ $.Values.podMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
{{- end }}
{{- /* MCP tool PodMonitors (#688). One per enabled MCP tool pod so
       kube-prometheus-stack discovers the metrics listener the tool
       binds in-container. Skips the scalar metricsPort entry under
       .Values.mcpTools introduced in #687. */}}
{{- if .Values.metrics.enabled }}
{{- range $name, $tool := .Values.mcpTools }}
{{- if and (kindIs "map" $tool) $tool.enabled }}
{{- $fullName := printf "%s-mcp-%s" $.Release.Name $name }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $fullName }}
  labels:
    app.kubernetes.io/name: {{ $fullName }}
    app.kubernetes.io/component: mcp-tool
    app.kubernetes.io/part-of: nyx
    {{- with $.Values.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $fullName }}
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ $.Values.podMonitor.scrapeInterval }}
      scrapeTimeout: {{ $.Values.podMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
