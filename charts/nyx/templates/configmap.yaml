{{- range .Values.agents }}
{{- $agent := . }}
{{- $firstBackend := index .backends 0 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-backend
  labels:
    {{- include "nyx.agentLabels" .name | nindent 4 }}
data:
  backend.yaml: |
    backend:
      agents:
{{- range .backends }}
        - id: {{ .name }}
          url: http://localhost:{{ .port }}
{{- if .model }}
          model: {{ .model }}
{{- end }}
{{- end }}
      routing:
        default:
          agent: {{ $firstBackend.name }}
{{- if $firstBackend.model }}
          model: {{ $firstBackend.model }}
{{- end }}
        a2a:
          agent: {{ $firstBackend.name }}
{{- if $firstBackend.model }}
          model: {{ $firstBackend.model }}
{{- end }}
        heartbeat:
          agent: {{ $firstBackend.name }}
{{- if $firstBackend.model }}
          model: {{ $firstBackend.model }}
{{- end }}
        job:
          agent: {{ $firstBackend.name }}
{{- if $firstBackend.model }}
          model: {{ $firstBackend.model }}
{{- end }}
        task:
          agent: {{ $firstBackend.name }}
{{- if $firstBackend.model }}
          model: {{ $firstBackend.model }}
{{- end }}
        trigger:
          agent: {{ $firstBackend.name }}
{{- if $firstBackend.model }}
          model: {{ $firstBackend.model }}
{{- end }}
        continuation:
          agent: {{ $firstBackend.name }}
{{- if $firstBackend.model }}
          model: {{ $firstBackend.model }}
{{- end }}
{{- end }}
