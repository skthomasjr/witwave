{{- if .Values.serviceMonitor.enabled }}
{{- range .Values.agents }}
{{- if eq (include "nyx.enabled" .) "true" }}
{{- /* Per-agent metrics.enabled=false must disable SM/PM emission (#1019).
       sprig `default` treats `false` as empty so a bare
       `(.metrics).enabled | default $.Values.metrics.enabled` silently
       falls back to the global value. */}}
{{- $agentMetricsEnabled := $.Values.metrics.enabled }}
{{- if (.metrics) }}{{- if hasKey .metrics "enabled" }}{{- $agentMetricsEnabled = .metrics.enabled }}{{- end }}{{- end }}
{{- if $agentMetricsEnabled }}
---
# ServiceMonitor for the Prometheus Operator (#449). One per agent, gated on
# both .Values.serviceMonitor.enabled and the agent's metrics flag (global or
# per-agent override) so disabled agents render nothing. The chart references
# monitoring.coreos.com CRDs only when the user opts in.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  labels:
    {{- include "nyx.agentLabels" (dict "name" .name "root" $) | nindent 4 }}
    {{- with $.Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  {{- /* Preserve the canonical `app.kubernetes.io/part-of` label from the
         target Service onto every scraped series so alerts match on
         `app_kubernetes_io_part_of="nyx"` instead of the fragile
         `job=~".*nyx.*"` regex (#1264). */}}
  targetLabels:
    - app.kubernetes.io/part-of
  {{- /* Cardinality + size safety (#1076) — mirror of the podMonitor
         block so operators can tune both in lockstep. */}}
  {{- with $.Values.serviceMonitor.sampleLimit }}
  sampleLimit: {{ . }}
  {{- end }}
  {{- with $.Values.serviceMonitor.targetLimit }}
  targetLimit: {{ . }}
  {{- end }}
  {{- with $.Values.serviceMonitor.labelValueLengthLimit }}
  labelValueLengthLimit: {{ . }}
  {{- end }}
  endpoints:
    # Scrape the dedicated metrics listener (#643). Service exposes port
    # "metrics" on .Values.metrics.port (default 9000), targetPort bound
    # to the harness container's named `metrics` port.
    - port: metrics
      path: /metrics
      interval: {{ $.Values.serviceMonitor.scrapeInterval }}
      scrapeTimeout: {{ $.Values.serviceMonitor.scrapeTimeout }}
      {{- with $.Values.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
