{{- range .Values.agents }}
{{- $agent := . }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-test-health
  labels:
    {{- include "nyx.agentLabels" .name | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
  containers:
    - name: test
      image: curlimages/curl:8.7.1
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing nyx-agent health/ready for {{ .name }}..."
          curl -sf http://{{ $.Release.Name }}-{{ .name }}:{{ .port | default 8000 }}/health/ready
          echo ""
          echo "Testing A2A discovery for {{ .name }}..."
          curl -sf http://{{ $.Release.Name }}-{{ .name }}:{{ .port | default 8000 }}/.well-known/agent.json
          echo ""
          echo "Testing backend connectivity for {{ .name }}..."
          curl -sf http://{{ $.Release.Name }}-{{ .name }}:{{ .port | default 8000 }}/agents
          echo ""
          echo "All checks passed for {{ .name }}."
{{- end }}
