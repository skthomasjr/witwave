{{- range .Values.agents }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-test-health
  labels:
    {{- include "nyx.agentLabels" .name | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: curlimages/curl:8.7.1
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing nyx-agent health/ready for {{ .name }}..."
          curl -sf http://{{ $.Release.Name }}-{{ .name }}:8000/health/ready
          echo ""
          echo "Testing A2A discovery for {{ .name }}..."
          curl -sf http://{{ $.Release.Name }}-{{ .name }}:8000/.well-known/agent.json
          echo ""
          echo "All checks passed for {{ .name }}."
{{- end }}
