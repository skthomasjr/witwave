{{- if .Values.dashboard.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-dashboard
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: helm
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  activeDeadlineSeconds: 60
  securityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
  containers:
    - name: test
      image: curlimages/curl:8.7.1
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing dashboard /health..."
          curl -sf --connect-timeout 3 --max-time 10 http://{{ .Release.Name }}-dashboard:{{ .Values.dashboard.port | default 80 }}/health
          echo ""
          echo "Testing dashboard /api/team..."
          curl -sf --connect-timeout 3 --max-time 10 http://{{ .Release.Name }}-dashboard:{{ .Values.dashboard.port | default 80 }}/api/team >/dev/null
          echo "Dashboard checks passed."
{{- end }}
