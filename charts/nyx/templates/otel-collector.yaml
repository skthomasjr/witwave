{{- $tracing := ((.Values.observability).tracing) | default dict -}}
{{- $collector := $tracing.collector | default dict -}}
{{- if and $tracing.enabled $collector.enabled }}
{{- $name := $collector.service.name | default (printf "%s-otel-collector" .Release.Name) -}}
{{- $image := $collector.image | default dict -}}
---
# OpenTelemetry Collector deployed as the chart-managed funnel between
# harness/backend/operator pods and the operator's chosen trace backend
# (Jaeger, Tempo, Grafana Cloud, Datadog, …) — gated on
# observability.tracing.collector.enabled (#634). When disabled, point
# observability.tracing.endpoint at an out-of-band collector instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  labels:
    helm.sh/chart: {{ include "nyx.chart" . }}
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |
{{ toYaml ($collector.config | default dict) | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    helm.sh/chart: {{ include "nyx.chart" . }}
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ $collector.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: otel-collector
        app.kubernetes.io/part-of: nyx
      annotations:
        # Force a pod restart whenever the config ConfigMap changes so
        # exporter tweaks take effect without a manual `kubectl rollout`.
        checksum/config: {{ toYaml ($collector.config | default dict) | sha256sum }}
    spec:
      containers:
        - name: otel-collector
          image: "{{ $image.repository | default "otel/opentelemetry-collector-contrib" }}:{{ $image.tag | default "0.112.0" }}"
          imagePullPolicy: {{ $image.pullPolicy | default "IfNotPresent" }}
          args: ["--config=/etc/otel-collector/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otel-collector
              readOnly: true
          {{- with $collector.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: config
          configMap:
            name: {{ $name }}-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    helm.sh/chart: {{ include "nyx.chart" . }}
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ ($collector.service).type | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
{{- end }}
