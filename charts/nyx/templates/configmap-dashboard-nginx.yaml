{{- if .Values.dashboard.enabled }}
{{/*
Dashboard nginx template — sourced from .Values.agents so the dashboard can
route browser requests directly to each named agent's in-cluster service
(#470). This eliminates the "one agent pod fans out for the whole team"
design: the dashboard pod owns routing, each agent only speaks for itself,
and an outage of any single agent cannot take the whole UI down.

The ConfigMap is mounted at /etc/nginx/templates/ in the dashboard pod; the
nginx-unprivileged entrypoint runs envsubst over it at container start so
${NGINX_LOCAL_RESOLVERS} is substituted before nginx reads the config.
*/}}
{{- $release := .Release.Name }}
{{- /* Cluster DNS zone (#581). Defaults to cluster.local so existing installs
       keep working byte-for-byte. Override `dashboard.clusterDomain` when the
       cluster was bootstrapped with a non-default `--service-dns-domain`
       (e.g. cluster.example) — nginx's resolver doesn't apply /etc/resolv.conf's
       search list, so proxy_pass upstreams must be fully-qualified. Mirrors
       the operator's DashboardSpec.ClusterDomain field. */}}
{{- $clusterDomain := .Values.dashboard.clusterDomain | default "cluster.local" }}
{{- $enabledAgents := list }}
{{- range .Values.agents }}
{{- if eq (include "nyx.enabled" .) "true" }}
{{- $enabledAgents = append $enabledAgents . }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $release }}-dashboard-nginx
  labels:
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: helm
data:
  default.conf.template: |
    server {
      listen 3000;
      server_name _;

      # Required for any proxy_pass that contains a variable (the per-agent
      # regex captures below do). Without it nginx fails with "no resolver
      # defined" at request time — literal upstreams would resolve once at
      # startup, but the per-agent routes below are dynamic and need this.
      # NGINX_LOCAL_RESOLVERS is populated by the nginx-unprivileged image's
      # /docker-entrypoint.d/15-local-resolvers.envsh from /etc/resolv.conf,
      # so this works in any cluster without hardcoding kube-dns addresses.
      resolver ${NGINX_LOCAL_RESOLVERS} valid=30s ipv6=off;

      root /usr/share/nginx/html;
      index index.html;

      # Baseline security headers (#739). The SPA renders agent output via v-html
      # at six sites; DOMPurify is the in-process defense, these headers are the
      # outer ring. `always` forces emission even on non-2xx responses.
      # - default-src 'self'                 — every asset comes from the same origin
      # - script-src 'self'                  — block inline/eval (Vite-built bundle)
      # - style-src 'self' 'unsafe-inline'   — required by PrimeVue runtime styles
      # - img-src 'self' data:               — base64 icons are inlined
      # - connect-src 'self'                 — fetch only to same-origin /api/*
      # - object-src 'none'                  — no <object>/<embed>
      # - frame-ancestors 'none'             — clickjacking (supersedes XFO)
      # - base-uri 'self'                    — prevent base tag hijack
      # - form-action 'self'                 — no off-origin form posts
      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;

      # History-mode fallback so deep-linked routes (e.g. /team) hit index.html
      # rather than returning 404 from nginx's static resolver.
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Dashboard-local health probe (distinct from any upstream agent's /health).
      location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","component":"dashboard"}';
      }

      # Team discovery — served directly by this nginx from .Values.agents at
      # Helm render time. The dashboard client uses this to learn member names
      # and URLs, then fans out to /api/agents/<name>/agents for the full cards.
      # Keeps discovery off the agent pods (no SPOF on any one harness).
      location = /api/team {
        default_type application/json;
        return 200 '[{{- range $i, $agent := $enabledAgents -}}{{- if $i -}},{{- end -}}{"name":{{ $agent.name | quote }},"url":"http://{{ $release }}-{{ $agent.name }}:{{ $agent.port | default 8000 }}"}{{- end -}}]';
      }

{{ range $agent := $enabledAgents }}
      # Per-agent metrics route — scraped at the dedicated metrics port
      # (#643), which is separate from the app port so NetworkPolicy /
      # auth can differ. Per-container offset: metrics_port = app_port +
      # 1000, so colocated pod containers don't fight for a shared port.
      # Must come BEFORE the regex catch-all below for nginx to match
      # the exact path.
      {{- $agentMetricsPort := add (int ($agent.port | default 8000)) 1000 }}
      {{- /* Only render this route when the agent's Service actually
             exposes the metrics port — service.yaml uses the same
             default+override computation (#689). Without this guard the
             dashboard returned 502 for /api/agents/<name>/metrics when
             metrics were disabled. */}}
      {{- $agentMetricsEnabled := (($agent.metrics).enabled | default $.Values.metrics.enabled) }}
      {{- if $agentMetricsEnabled }}
      location = /api/agents/{{ $agent.name }}/metrics {
        proxy_pass http://{{ $release }}-{{ $agent.name }}.{{ $.Release.Namespace }}.svc.{{ $clusterDomain }}:{{ $agentMetricsPort }}/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 310s;
        client_max_body_size 1m;
      }
      {{- end }}

      # Per-agent direct route — browser → dashboard nginx → {{ $release }}-{{ $agent.name }}
      # No cross-agent fan-out through another harness, no localhost-scoped
      # backend URLs on the wire (#470 design note).
      location ~ ^/api/agents/{{ $agent.name }}/(.*)$ {
        proxy_pass http://{{ $release }}-{{ $agent.name }}.{{ $.Release.Namespace }}.svc.{{ $clusterDomain }}:{{ $agent.port | default 8000 }}/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 310s;
        client_max_body_size 1m;
      }
{{ end }}
      # Anything under /api/* that didn't match a per-agent route above is
      # intentionally 404 — the legacy /api/proxy/<name>, /api/conversations/
      # <name>, and /api/team fallbacks were retired once every consumer
      # migrated to direct per-agent routing (#470).
      location /api/ {
        return 404;
      }
    }
{{- end }}
