{{/*
NetworkPolicy (#759). Ships disabled by default; when enabled, emits one
NetworkPolicy per chart-rendered Deployment so operators can control
pod-level reachability without bolting a second chart on top.

Targets:

  * Each entry in `.Values.agents` — the harness/backend combined pod.
    Selector: app.kubernetes.io/name: <agent-name>.
    Policy covers both the app port and the split metrics port.
  * The dashboard pod when `.Values.dashboard.enabled`.
    Selector: app.kubernetes.io/name: <release>-dashboard.
  * Each enabled entry in `.Values.mcpTools.*` — one MCP tool
    Deployment + Service pair.
    Selector: app.kubernetes.io/name: <release>-mcp-<tool>.

Rules built from `.Values.networkPolicy.ingress`:

  allowDashboard=true ……… adds an ingress peer matching the dashboard
                          pod (in the release namespace) on every port
                          of the selected pod. Ignored when
                          dashboard.enabled=false.
  allowSameNamespace=true  adds an ingress peer matching every pod in
                          the release namespace on every port.
  metricsFrom             …  list of raw NetworkPolicyPeer entries
                          permitted to reach the metrics port
                          (app_port + 1000). Narrow scope by default.
  additionalFrom          …  raw peers applied to every port.

All rules are additive — Kubernetes treats multiple `ingress` entries
as a union, so an operator listing three peers grants access to all
three and nothing else. An empty ingress rule set (every knob off,
every list empty) renders a default-closed NetworkPolicy: ingress
fully denied. Egress stays open unless `egressOpen=false`, in which
case only the `egress:` list is permitted.

Uses the typed networking/v1 API (GA since Kubernetes 1.21).
*/}}

{{- define "nyx.np.egressRules" -}}
{{- $np := .np -}}
{{- if $np.egressOpen }}
    - {}
{{- else -}}
{{- range $np.egress }}
    - {{- toYaml . | nindent 6 }}
{{- end }}
{{- end -}}
{{- end -}}

{{- /* Render `ingress` entries for a given pod selector. `metricsPort`
       is the numeric metrics port — the template uses it to scope the
       metricsFrom rule to the right port rather than blanket-allowing
       scrapers on every port of the selected pod. `appPort` (when
       provided) scopes allowDashboard and allowSameNamespace to the
       app listener only so those peers cannot also reach the metrics
       port (#911). A documented opt-in (`allPortsDashboard` /
       `allPortsSameNamespace`) preserves the old all-ports shape for
       operators who really want it. */ -}}
{{- define "nyx.np.ingressRules" -}}
{{- $ing := .ing -}}
{{- $dashboardEnabled := .dashboardEnabled -}}
{{- $dashboardPeer := .dashboardPeer -}}
{{- $sameNsPeer := .sameNsPeer -}}
{{- $metricsPort := .metricsPort -}}
{{- $appPort := .appPort -}}
{{- if and $dashboardEnabled $ing.allowDashboard }}
    - from:
        - {{- toYaml $dashboardPeer | nindent 10 }}
    {{- if and $appPort (not $ing.allPortsDashboard) }}
      ports:
        - protocol: TCP
          port: {{ $appPort }}
    {{- end }}
{{- end }}
{{- if $ing.allowSameNamespace }}
    - from:
        - {{- toYaml $sameNsPeer | nindent 10 }}
    {{- if and $appPort (not $ing.allPortsSameNamespace) }}
      ports:
        - protocol: TCP
          port: {{ $appPort }}
    {{- end }}
{{- end }}
{{- /* Emit the metricsFrom rule whenever a metrics port is applicable.
       Previously this gate was `and $ing.metricsFrom $metricsPort`, which
       silently dropped the rule when a caller passed `metricsPort: 0`
       (#1021) — conflating "no metrics on this NetworkPolicy" with "zero
       is a real port". Callers that need to suppress the rule now pass
       `metricsPort: nil`; a numeric value — including 0 — is treated as
       applicable and emits the peer rule. */}}
{{- if and $ing.metricsFrom (ne (kindOf $metricsPort) "invalid") }}
    - from:
      {{- toYaml $ing.metricsFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $metricsPort }}
{{- end }}
{{- if $ing.additionalFrom }}
    - from:
      {{- toYaml $ing.additionalFrom | nindent 8 }}
{{- end }}
{{- end -}}

{{- if .Values.networkPolicy.enabled }}

{{- $np := .Values.networkPolicy }}
{{- $ing := $np.ingress | default dict }}
{{- $dashboardEnabled := .Values.dashboard.enabled }}
{{- $dashboardPodName := printf "%s-dashboard" .Release.Name }}

{{- /* Compose the reusable peers once so every rendered policy is
       consistent. Kubernetes ignores unknown keys inside a peer, so we
       strictly build peers that match the shipped schema. */ -}}
{{- /* Pin the dashboard peer to the release namespace explicitly
       (#914). Today the dashboard is always co-located with the
       agents, but a future deploy-split that moves it to a dedicated
       namespace would silently block traffic with no code change —
       the implicit same-namespace match becomes a cross-namespace
       mismatch. Passing namespaceSelector with the well-known
       kubernetes.io/metadata.name label pins the match to the
       release namespace and makes the intent explicit. */ -}}
{{- $dashboardPeer := dict
  "podSelector" (dict "matchLabels" (dict "app.kubernetes.io/name" $dashboardPodName))
  "namespaceSelector" (dict "matchLabels" (dict "kubernetes.io/metadata.name" $.Release.Namespace))
}}
{{- $sameNsPeer := dict "podSelector" dict }}

{{/* --- agents (harness + co-located backend containers) --- */}}
{{- range .Values.agents }}
{{- $agentName := .name }}
{{- $containerPort := .port | default 8000 }}
{{- $metricsPort := add (int $containerPort) 1000 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $.Release.Name }}-{{ $agentName }}
  labels:
    {{- include "nyx.agentLabels" (dict "name" $agentName "root" $) | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ $agentName }}
  policyTypes:
    - Ingress
    {{- if not $np.egressOpen }}
    - Egress
    {{- end }}
  ingress:
    {{- include "nyx.np.ingressRules" (dict "ing" $ing "dashboardEnabled" $dashboardEnabled "dashboardPeer" $dashboardPeer "sameNsPeer" $sameNsPeer "metricsPort" $metricsPort "appPort" $containerPort) }}
  {{- if not $np.egressOpen }}
  egress:
    {{- include "nyx.np.egressRules" (dict "np" $np) }}
  {{- end }}
{{- end }}

{{/* --- dashboard --- */}}
{{- if $dashboardEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $.Release.Name }}-dashboard
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/name: {{ $dashboardPodName }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ $dashboardPodName }}
  policyTypes:
    - Ingress
    {{- if not $np.egressOpen }}
    - Egress
    {{- end }}
  ingress:
    {{- /* The dashboard is a user-facing web surface — allowSameNamespace
           and additionalFrom apply, but the "dashboard → dashboard" rule
           is a no-op so we omit it by skipping allowDashboard. */ -}}
    {{- /* Dashboard http port (#911). Scope allowSameNamespace to this
           port only rather than all-ports. */ -}}
    {{- /* metricsPort=nil is the explicit "no metrics rule on this NP"
           sentinel (#1021); a prior `0` passed here conflated "not
           applicable" with a real port value and suppressed any future
           caller that genuinely wanted port 0. */ -}}
    {{- include "nyx.np.ingressRules" (dict "ing" (omit $ing "allowDashboard") "dashboardEnabled" false "dashboardPeer" $dashboardPeer "sameNsPeer" $sameNsPeer "metricsPort" nil "appPort" (.Values.dashboard.port | default 80)) }}
  {{- if not $np.egressOpen }}
  egress:
    {{- include "nyx.np.egressRules" (dict "np" $np) }}
  {{- end }}
{{- end }}

{{/* --- MCP tools (one NP per enabled tool) --- */}}
{{/* #1226: scalar entries under mcpTools are silently skipped by the
     `kindIs "map"` gate, which hid typos like `mcpTools.kubernetes: true`
     (meant to be a nested `enabled: true`). Fail loudly unless the key
     is the dedicated `metricsPort` scalar carried on the same map. */}}
{{- range $toolName, $toolSpec := .Values.mcpTools }}
{{- if not (kindIs "map" $toolSpec) }}
{{-   if ne $toolName "metricsPort" }}
{{-     fail (printf "mcpTools.%s must be a map (with an .enabled field); got a scalar %v. If you meant to set the shared metrics port use mcpTools.metricsPort; otherwise restructure the entry, e.g. `mcpTools.%s.enabled: true`." $toolName $toolSpec $toolName) }}
{{-   end }}
{{- else if hasKey $toolSpec "enabled" }}
{{- if $toolSpec.enabled }}
{{- $fullName := printf "%s-mcp-%s" $.Release.Name $toolName }}
{{- $mcpMetricsPort := ($.Values.mcpTools.metricsPort | default 9000) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullName }}
  labels:
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/name: {{ $fullName }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ $fullName }}
  policyTypes:
    - Ingress
    {{- if not $np.egressOpen }}
    - Egress
    {{- end }}
  ingress:
    {{- /* MCP tools are cluster-shared infra. allowDashboard is ignored
           (dashboards don't talk to MCP servers directly); metrics uses
           the mcpTools.metricsPort knob; additionalFrom can open extra
           agent namespaces if needed. */ -}}
    {{- /* MCP app port is 8000 (FastMCP streamable-http listener, #644).
           Scope allowSameNamespace to this port only (#911). */ -}}
    {{- include "nyx.np.ingressRules" (dict "ing" (omit $ing "allowDashboard") "dashboardEnabled" false "dashboardPeer" $dashboardPeer "sameNsPeer" $sameNsPeer "metricsPort" $mcpMetricsPort "appPort" 8000) }}
    {{- /* #1074: allow nyx-managed pods (agents, dashboard, other MCP
           tools) to reach the :8000 FastMCP listener. Default-on via
           networkPolicy.ingress.allowNyxAgents so enabling NPs
           doesn't black-hole agent → MCP traffic. Match is on the
           canonical `app.kubernetes.io/part-of: nyx` label that every
           chart-rendered pod carries; it narrows the peer set to
           this release's agents without broadening to "every pod in
           the namespace" the way allowSameNamespace does. */ -}}
    {{- if (hasKey $ing "allowNyxAgents" | ternary $ing.allowNyxAgents true) }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: nyx
      ports:
        - protocol: TCP
          port: 8000
    {{- end }}
  {{- if not $np.egressOpen }}
  egress:
    {{- include "nyx.np.egressRules" (dict "np" $np) }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- end }}
