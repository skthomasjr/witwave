{{- if .Values.dashboard.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-dashboard
  labels:
    app.kubernetes.io/name: {{ $.Release.Name }}-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: helm
spec:
  {{- /* hasKey branch so replicas: 0 is actually honored (#912).
         sprig's `default` treats 0 as empty and falls back to the
         default value — which breaks the common operator workflow of
         temporarily scaling the dashboard to zero replicas without
         flipping dashboard.enabled to false. */}}
  {{- if hasKey .Values.dashboard "replicas" }}
  replicas: {{ .Values.dashboard.replicas }}
  {{- else }}
  replicas: 1
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $.Release.Name }}-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $.Release.Name }}-dashboard
        app.kubernetes.io/component: dashboard
        app.kubernetes.io/part-of: nyx
        app.kubernetes.io/managed-by: helm
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        {{- with .Values.dashboard.securityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.dashboard.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.dashboard.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: {{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag | default $.Chart.AppVersion }}
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 3000
          securityContext:
            {{- include "nyx.hardenedContainerSecurityContext" (dict "root" $) | nindent 12 }}
          # Startup probe added (#768) for parity with harness + backends.
          # Slow image pulls on low-spec nodes would otherwise let the liveness
          # probe kill the pod after ~30s of unreadiness; startup suspends
          # liveness/readiness until the container first passes.
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- if .Values.dashboard.resources }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          {{- end }}
          env:
            # Enables /docker-entrypoint.d/15-local-resolvers.envsh to export
            # NGINX_LOCAL_RESOLVERS from /etc/resolv.conf so the `resolver`
            # directive in the ConfigMap template resolves cluster DNS at
            # runtime (needed for proxy_pass URLs with captured variables).
            - name: NGINX_ENTRYPOINT_LOCAL_RESOLVERS
              value: "1"
          volumeMounts:
            # Overrides the baseline template baked into the image with the
            # Helm-rendered config that knows about every enabled agent.
            - name: nginx-template
              mountPath: /etc/nginx/templates
              readOnly: true
            {{- /* #1073: emptyDir carve-outs for readOnlyRootFilesystem=true.
                   nginx writes to /var/cache/nginx (proxy/fastcgi/client caches),
                   /var/run/nginx.pid, and the rendered /etc/nginx/conf.d config. */}}
            - name: nyx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-template
          configMap:
            name: {{ $.Release.Name }}-dashboard-nginx
        - name: nyx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-conf
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-dashboard
  labels:
    app.kubernetes.io/name: {{ $.Release.Name }}-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: nyx
    app.kubernetes.io/managed-by: helm
spec:
  selector:
    app.kubernetes.io/name: {{ $.Release.Name }}-dashboard
  ports:
    - name: http
      port: {{ .Values.dashboard.port | default 80 }}
      targetPort: 3000
{{- end }}
