{{- range $agent := .Values.agents }}
{{- if eq (include "nyx.enabled" $agent) "true" }}
{{- $auto := dict }}
{{- if $agent.autoscaling }}
{{- $auto = $agent.autoscaling }}
{{- else if $.Values.autoscaling }}
{{- $auto = $.Values.autoscaling }}
{{- end }}
{{- if $auto.enabled }}
{{- /* Fail-render when both CPU and memory targets are unset/nulled
       (#913). Previously each metric was gated on its own target, so
       both-null produced `spec.metrics: []` — an invalid HPA that
       admission-rejected with "spec.metrics: Required value" only at
       apply time. Surfacing the mis-config at template-render time
       gives a clear actionable error instead. */}}
{{- if and (not $auto.targetCPUUtilizationPercentage) (not $auto.targetMemoryUtilizationPercentage) }}
{{- fail (printf "autoscaling.enabled=true for agent %q requires at least one of autoscaling.targetCPUUtilizationPercentage or autoscaling.targetMemoryUtilizationPercentage" $agent.name) }}
{{- end }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $.Release.Name }}-{{ $agent.name }}
  labels:
    {{- include "nyx.agentLabels" (dict "name" $agent.name "root" $) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $.Release.Name }}-{{ $agent.name }}
  minReplicas: {{ $auto.minReplicas | default 1 }}
  maxReplicas: {{ $auto.maxReplicas | default 3 }}
  metrics:
    {{- if $auto.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $auto.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $auto.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $auto.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
