{{- range .Values.agents }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyx-{{ .name }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/component: nyx-agent
    app.kubernetes.io/part-of: nyx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/component: nyx-agent
        app.kubernetes.io/part-of: nyx
    spec:
      {{- if .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if (.gitSync).enabled }}
      initContainers:
        - name: git-sync-init
          image: {{ (.gitSync).image | default "registry.k8s.io/git-sync/git-sync:v4.4.0" }}
          args:
            - --repo={{ (.gitSync).repo }}
            - --root=/git
            - --one-time
            {{- if (.gitSync).ref }}
            - --ref={{ (.gitSync).ref }}
            {{- end }}
            {{- if (.gitSync).depth }}
            - --depth={{ (.gitSync).depth | toString }}
            {{- end }}
          {{- if (.gitSync).envFrom }}
          envFrom:
            {{- toYaml (.gitSync).envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
      {{- end }}
      containers:
        {{- if (.gitSync).enabled }}
        - name: git-sync
          image: {{ (.gitSync).image | default "registry.k8s.io/git-sync/git-sync:v4.4.0" }}
          args:
            - --repo={{ (.gitSync).repo }}
            - --root=/git
            - --period={{ (.gitSync).period | default "60s" }}
            {{- if (.gitSync).ref }}
            - --ref={{ (.gitSync).ref }}
            {{- end }}
            {{- if (.gitSync).depth }}
            - --depth={{ (.gitSync).depth | toString }}
            {{- end }}
          {{- if (.gitSync).envFrom }}
          envFrom:
            {{- toYaml (.gitSync).envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
        {{- end }}
        - name: nyx-agent
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          ports:
            - name: http
              containerPort: 8000
            {{- if ((.metrics).enabled | default $.Values.metrics.enabled) }}
            - name: metrics
              containerPort: 8000
            {{- end }}
          env:
            - name: AGENT_NAME
              value: {{ .name }}
            - name: METRICS_ENABLED
              value: {{ (.metrics).enabled | default $.Values.metrics.enabled | toString | quote }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: backend-config
              mountPath: /home/agent/.nyx/backend.yaml
              subPath: backend.yaml
            {{- if (.gitSync).enabled }}
            - name: git-sync-data
              mountPath: /git
            {{- end }}
            {{- if .config }}
            {{- range .config }}
            - name: nyx-agent-config
              mountPath: {{ .mountPath }}
              subPath: {{ .name }}
            {{- end }}
            {{- end }}
            {{- if $.Values.sharedStorage.enabled }}
            - name: nyx-shared
              mountPath: {{ $.Values.sharedStorage.mountPath }}
            {{- end }}
{{- $agentName := .name }}
{{- $agentMetricsEnabled := (.metrics).enabled | default $.Values.metrics.enabled }}
{{- $gitSyncEnabled := (.gitSync).enabled }}
{{- range .backends }}
{{- $storageEnabled := ((.storage).enabled) }}
        - name: {{ .name }}
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          ports:
            - containerPort: {{ .port }}
          env:
            - name: AGENT_NAME
              value: {{ $agentName }}-{{ .name }}
            - name: AGENT_OWNER
              value: {{ $agentName }}
            - name: AGENT_ID
              value: {{ .name }}
            - name: AGENT_URL
              value: http://localhost:{{ .port }}
            - name: BACKEND_PORT
              value: {{ .port | quote }}
            - name: METRICS_ENABLED
              value: {{ $agentMetricsEnabled | toString | quote }}
            {{- if .env }}
            {{- toYaml .env | nindent 12 }}
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if $storageEnabled }}
            {{- $backendNameForStorage := .name }}
            {{- range (.storage).mounts }}
            - name: {{ $agentName }}-{{ $backendNameForStorage }}-storage
              mountPath: {{ .mountPath }}
              subPath: {{ .subPath }}
            {{- end }}
            {{- end }}
            {{- if $gitSyncEnabled }}
            - name: git-sync-data
              mountPath: /git
            {{- end }}
            {{- if $.Values.sharedStorage.enabled }}
            - name: nyx-shared
              mountPath: {{ $.Values.sharedStorage.mountPath }}
            {{- end }}
            {{- if .config }}
            {{- $backendName := .name }}
            {{- range .config }}
            - name: {{ $backendName }}-config
              mountPath: {{ .mountPath }}
              subPath: {{ .name }}
            {{- end }}
            {{- end }}
{{- end }}
      volumes:
        - name: backend-config
          configMap:
            name: nyx-{{ .name }}-backend
        {{- if (.gitSync).enabled }}
        - name: git-sync-data
          emptyDir: {}
        {{- end }}
        {{- if .config }}
        - name: nyx-agent-config
          configMap:
            name: nyx-{{ .name }}-config
        {{- end }}
        {{- range .backends }}
        {{- if (.storage).enabled }}
        - name: {{ $agentName }}-{{ .name }}-storage
          persistentVolumeClaim:
            claimName: {{ (.storage).existingClaim | default (printf "nyx-%s-%s-data" $agentName .name) }}
        {{- end }}
        {{- if .config }}
        - name: {{ .name }}-config
          configMap:
            name: nyx-{{ $agentName }}-{{ .name }}-config
        {{- end }}
        {{- end }}
        {{- if $.Values.sharedStorage.enabled }}
        - name: nyx-shared
          {{- if eq $.Values.sharedStorage.storageType "hostPath" }}
          hostPath:
            path: {{ $.Values.sharedStorage.hostPath }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ $.Values.sharedStorage.existingClaim | default "nyx-shared" }}
          {{- end }}
        {{- end }}
{{- end }}
