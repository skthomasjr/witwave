{{- range .Values.agents }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  labels:
    {{- include "nyx.agentLabels" .name | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "nyx.agentLabels" .name | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- if .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if .gitSyncs }}
      {{- $agent := . }}
      initContainers:
        {{- range .gitSyncs }}
        - name: git-sync-init-{{ .name }}
          image: {{ .image | default $.Values.gitSync.image }}
          args:
            - --repo={{ .repo }}
            - --root=/git
            - --one-time
            {{- if .ref }}
            - --ref={{ .ref }}
            {{- end }}
            {{- if .depth }}
            - --depth={{ .depth | toString }}
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
        {{- end }}
        {{- if include "nyx.hasMappings" $agent }}
        - name: git-map-init
          image: {{ $.Values.gitSync.image }}
          command: ["/bin/sh", "/nyx-scripts/git-sync.sh"]
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            {{- include "nyx.gitMappingMounts" (dict "agent" $agent "release" $.Release.Name) | nindent 12 }}
        {{- end }}
      {{- end }}
      containers:
        {{- if .gitSyncs }}
        {{- $agent := . }}
        {{- range .gitSyncs }}
        - name: git-sync-{{ .name }}
          image: {{ .image | default $.Values.gitSync.image }}
          args:
            - --repo={{ .repo }}
            - --root=/git
            - --period={{ .period | default "60s" }}
            {{- if .ref }}
            - --ref={{ .ref }}
            {{- end }}
            {{- if .depth }}
            - --depth={{ .depth | toString }}
            {{- end }}
            {{- if include "nyx.hasMappings" $agent }}
            - --exechook-command=/nyx-scripts/git-sync.sh
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            {{- if include "nyx.hasMappings" $agent }}
            {{- include "nyx.gitMappingMounts" (dict "agent" $agent "release" $.Release.Name) | nindent 12 }}
            {{- end }}
        {{- end }}
        {{- end }}
        - name: nyx-harness
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .port | default 8000 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .port | default 8000 }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .port | default 8000 }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- if .resources }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          {{- end }}
          env:
            - name: AGENT_NAME
              value: {{ .name }}
            - name: AGENT_PORT
              value: {{ .port | default 8000 | quote }}
            - name: METRICS_ENABLED
              value: {{ (.metrics).enabled | default $.Values.metrics.enabled | toString | quote }}
            {{- if .env }}
            {{- toYaml .env | nindent 12 }}
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: manifest
              mountPath: /home/agent/manifest.json
              subPath: manifest.json
            {{- if .gitSyncs }}
            - name: git-sync-data
              mountPath: /git
            {{- end }}
            {{- $agentNameForGM := .name }}
            {{- range .gitMappings }}
            - name: {{ include "nyx.gmVolumeName" (dict "agentName" $agentNameForGM "context" "agent" "dest" .dest) }}
              mountPath: {{ .dest }}
            {{- end }}
            {{- range .config }}
            - name: nyx-harness-config
              mountPath: {{ .mountPath }}
              subPath: {{ .name }}
            {{- end }}
            {{- if $.Values.sharedStorage.enabled }}
            - name: nyx-shared
              mountPath: {{ $.Values.sharedStorage.mountPath }}
            {{- end }}
{{- $agentName := .name }}
{{- $agentMetricsEnabled := (.metrics).enabled | default $.Values.metrics.enabled }}
{{- $hasGitSyncs := .gitSyncs }}
{{- range .backends }}
{{- $storageEnabled := ((.storage).enabled) }}
        - name: {{ .name }}
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .port }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- if .resources }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          {{- end }}
          env:
            - name: AGENT_NAME
              value: {{ $agentName }}-{{ .name }}
            - name: AGENT_OWNER
              value: {{ $agentName }}
            - name: AGENT_ID
              value: {{ .name }}
            - name: AGENT_URL
              value: http://localhost:{{ .port }}
            - name: BACKEND_PORT
              value: {{ .port | quote }}
            - name: METRICS_ENABLED
              value: {{ $agentMetricsEnabled | toString | quote }}
            {{- if .env }}
            {{- toYaml .env | nindent 12 }}
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if $storageEnabled }}
            {{- $backendNameForStorage := .name }}
            {{- range (.storage).mounts }}
            - name: {{ $agentName }}-{{ $backendNameForStorage }}-storage
              mountPath: {{ .mountPath }}
              subPath: {{ .subPath }}
            {{- end }}
            {{- end }}
            {{- if $hasGitSyncs }}
            - name: git-sync-data
              mountPath: /git
            {{- end }}
            {{- $backendName := .name }}
            {{- range .gitMappings }}
            - name: {{ include "nyx.gmVolumeName" (dict "agentName" $agentName "context" $backendName "dest" .dest) }}
              mountPath: {{ .dest }}
            {{- end }}
            {{- if $.Values.sharedStorage.enabled }}
            - name: nyx-shared
              mountPath: {{ $.Values.sharedStorage.mountPath }}
            {{- end }}
            {{- $backendName := .name }}
            {{- range .config }}
            - name: {{ $backendName }}-config
              mountPath: {{ .mountPath }}
              subPath: {{ .name }}
            {{- end }}
{{- end }}
      volumes:
        - name: manifest
          configMap:
            name: {{ $.Release.Name }}-manifest
        {{- if .gitSyncs }}
        - name: git-sync-data
          emptyDir: {}
        {{- end }}
        {{- if .config }}
        - name: nyx-harness-config
          configMap:
            name: {{ $.Release.Name }}-{{ .name }}-config
        {{- end }}
        {{- range .backends }}
        {{- if (.storage).enabled }}
        - name: {{ $agentName }}-{{ .name }}-storage
          persistentVolumeClaim:
            claimName: {{ (.storage).existingClaim | default (printf "%s-%s-%s-data" $.Release.Name $agentName .name) }}
        {{- end }}
        {{- if .config }}
        - name: {{ .name }}-config
          configMap:
            name: {{ $.Release.Name }}-{{ $agentName }}-{{ .name }}-config
        {{- end }}
        {{- end }}
        {{- if $.Values.sharedStorage.enabled }}
        - name: nyx-shared
          {{- if eq $.Values.sharedStorage.storageType "hostPath" }}
          {{- if not $.Values.sharedStorage.hostPath }}
          {{- fail "sharedStorage.hostPath must be set when storageType is hostPath" }}
          {{- end }}
          hostPath:
            path: {{ $.Values.sharedStorage.hostPath }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ $.Values.sharedStorage.existingClaim | default (printf "%s-shared" $.Release.Name) }}
          {{- end }}
        {{- end }}
        {{- if include "nyx.hasMappings" . }}
        {{- include "nyx.gitMappingVolumes" (dict "agent" . "release" $.Release.Name) | nindent 8 }}
        {{- end }}
{{- end }}
