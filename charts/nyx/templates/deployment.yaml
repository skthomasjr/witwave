{{- range .Values.agents }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyx-{{ .name }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/component: nyx-agent
    app.kubernetes.io/part-of: nyx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/component: nyx-agent
        app.kubernetes.io/part-of: nyx
    spec:
      {{- if .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: nyx-agent
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          ports:
            - containerPort: 8000
          env:
            - name: AGENT_NAME
              value: {{ .name }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: backend-config
              mountPath: /home/agent/.nyx/backend.yaml
              subPath: backend.yaml
            {{- if $.Values.sharedStorage.enabled }}
            - name: nyx-shared
              mountPath: {{ $.Values.sharedStorage.mountPath }}
            {{- end }}
{{- $agentName := .name }}
{{- range .backends }}
        - name: {{ .name }}
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          ports:
            - containerPort: {{ .port }}
          env:
            - name: AGENT_NAME
              value: {{ $agentName }}-{{ .name }}
            - name: AGENT_OWNER
              value: {{ $agentName }}
            - name: AGENT_ID
              value: {{ .name }}
            - name: AGENT_URL
              value: http://localhost:{{ .port }}
            - name: BACKEND_PORT
              value: {{ .port | quote }}
            {{- if .env }}
            {{- toYaml .env | nindent 12 }}
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          {{- if $.Values.sharedStorage.enabled }}
          volumeMounts:
            - name: nyx-shared
              mountPath: {{ $.Values.sharedStorage.mountPath }}
          {{- end }}
{{- end }}
      volumes:
        - name: backend-config
          configMap:
            name: nyx-{{ .name }}-backend
        {{- if $.Values.sharedStorage.enabled }}
        - name: nyx-shared
          {{- if eq $.Values.sharedStorage.storageType "hostPath" }}
          hostPath:
            path: {{ $.Values.sharedStorage.hostPath }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ $.Values.sharedStorage.existingClaim | default "nyx-shared" }}
          {{- end }}
        {{- end }}
{{- end }}
