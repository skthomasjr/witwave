{{- range .Values.agents }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyx-{{ .name }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/component: nyx-agent
    app.kubernetes.io/part-of: nyx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/component: nyx-agent
        app.kubernetes.io/part-of: nyx
    spec:
      {{- if .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if .gitSyncs }}
      {{- $agentForInit := . }}
      {{- $hasMappingsForInit := false }}
      {{- if .gitMappings }}{{- $hasMappingsForInit = true }}{{- end }}
      {{- range .backends }}{{- if .gitMappings }}{{- $hasMappingsForInit = true }}{{- end }}{{- end }}
      initContainers:
        {{- range .gitSyncs }}
        - name: git-sync-init-{{ .name }}
          image: {{ .image | default "registry.k8s.io/git-sync/git-sync:v4.4.0" }}
          args:
            - --repo={{ .repo }}
            - --root=/git
            - --one-time
            {{- if .ref }}
            - --ref={{ .ref }}
            {{- end }}
            {{- if .depth }}
            - --depth={{ .depth | toString }}
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
        {{- end }}
        {{- if $hasMappingsForInit }}
        - name: git-map-init
          image: debian:bookworm-slim
          command: ["/bin/sh", "/nyx-scripts/git-sync.sh"]
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: nyx-git-sync-script
              mountPath: /nyx-scripts
            {{- if $agentForInit.gitMappings }}
            - name: nyx-{{ $agentForInit.name }}-git-mappings
              mountPath: /nyx-mappings/agent
            {{- range $agentForInit.gitMappings }}
            - name: gm-{{ $agentForInit.name }}-agent-{{ .dest | trimPrefix "/home/agent/" | replace "/" "-" | replace "." "" | trimSuffix "-" }}
              mountPath: {{ .dest }}
            {{- end }}
            {{- end }}
            {{- range $agentForInit.backends }}
            {{- if .gitMappings }}
            - name: nyx-{{ $agentForInit.name }}-{{ .name }}-git-mappings
              mountPath: /nyx-mappings/{{ .name }}
            {{- $backendName := .name }}
            {{- range .gitMappings }}
            - name: gm-{{ $agentForInit.name }}-{{ $backendName }}-{{ .dest | trimPrefix "/home/agent/" | replace "/" "-" | replace "." "" | trimSuffix "-" }}
              mountPath: {{ .dest }}
            {{- end }}
            {{- end }}
            {{- end }}
        {{- end }}
      {{- end }}
      containers:
        {{- if .gitSyncs }}
        {{- $agentForGitSync := . }}
        {{- range .gitSyncs }}
        - name: git-sync-{{ .name }}
          image: {{ .image | default "registry.k8s.io/git-sync/git-sync:v4.4.0" }}
          args:
            - --repo={{ .repo }}
            - --root=/git
            - --period={{ .period | default "60s" }}
            {{- if .ref }}
            - --ref={{ .ref }}
            {{- end }}
            {{- if .depth }}
            - --depth={{ .depth | toString }}
            {{- end }}
            {{- $hasMappings := false }}
            {{- if $agentForGitSync.gitMappings }}{{- $hasMappings = true }}{{- end }}
            {{- range $agentForGitSync.backends }}{{- if .gitMappings }}{{- $hasMappings = true }}{{- end }}{{- end }}
            {{- if $hasMappings }}
            - --exechook-command=/bin/sh /nyx-scripts/git-sync.sh
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            {{- $hasMappings := false }}
            {{- if $agentForGitSync.gitMappings }}{{- $hasMappings = true }}{{- end }}
            {{- range $agentForGitSync.backends }}{{- if .gitMappings }}{{- $hasMappings = true }}{{- end }}{{- end }}
            {{- if $hasMappings }}
            - name: nyx-git-sync-script
              mountPath: /nyx-scripts
            {{- if $agentForGitSync.gitMappings }}
            - name: nyx-{{ $agentForGitSync.name }}-git-mappings
              mountPath: /nyx-mappings/agent
            {{- range $agentForGitSync.gitMappings }}
            - name: gm-{{ $agentForGitSync.name }}-agent-{{ .dest | trimPrefix "/home/agent/" | replace "/" "-" | replace "." "" | trimSuffix "-" }}
              mountPath: {{ .dest }}
            {{- end }}
            {{- end }}
            {{- range $agentForGitSync.backends }}
            {{- if .gitMappings }}
            - name: nyx-{{ $agentForGitSync.name }}-{{ .name }}-git-mappings
              mountPath: /nyx-mappings/{{ .name }}
            {{- $backendName := .name }}
            {{- range .gitMappings }}
            - name: gm-{{ $agentForGitSync.name }}-{{ $backendName }}-{{ .dest | trimPrefix "/home/agent/" | replace "/" "-" | replace "." "" | trimSuffix "-" }}
              mountPath: {{ .dest }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
        {{- end }}
        {{- end }}
        - name: nyx-agent
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          ports:
            - name: http
              containerPort: 8000
            {{- if ((.metrics).enabled | default $.Values.metrics.enabled) }}
            - name: metrics
              containerPort: 8000
            {{- end }}
          env:
            - name: AGENT_NAME
              value: {{ .name }}
            - name: METRICS_ENABLED
              value: {{ (.metrics).enabled | default $.Values.metrics.enabled | toString | quote }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: backend-config
              mountPath: /home/agent/.nyx/backend.yaml
              subPath: backend.yaml
            {{- if .gitSyncs }}
            - name: git-sync-data
              mountPath: /git
            {{- end }}
            {{- if .gitMappings }}
            {{- $agentNameForMount := .name }}
            {{- range .gitMappings }}
            - name: gm-{{ $agentNameForMount }}-agent-{{ .dest | trimPrefix "/home/agent/" | replace "/" "-" | replace "." "" | trimSuffix "-" }}
              mountPath: {{ .dest }}
            {{- end }}
            {{- end }}
            {{- if .config }}
            {{- range .config }}
            - name: nyx-agent-config
              mountPath: {{ .mountPath }}
              subPath: {{ .name }}
            {{- end }}
            {{- end }}
            {{- if $.Values.sharedStorage.enabled }}
            - name: nyx-shared
              mountPath: {{ $.Values.sharedStorage.mountPath }}
            {{- end }}
{{- $agentName := .name }}
{{- $agentMetricsEnabled := (.metrics).enabled | default $.Values.metrics.enabled }}
{{- $hasGitSyncs := .gitSyncs }}
{{- $agentGitMappings := .gitMappings }}
{{- range .backends }}
{{- $storageEnabled := ((.storage).enabled) }}
        - name: {{ .name }}
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          ports:
            - containerPort: {{ .port }}
          env:
            - name: AGENT_NAME
              value: {{ $agentName }}-{{ .name }}
            - name: AGENT_OWNER
              value: {{ $agentName }}
            - name: AGENT_ID
              value: {{ .name }}
            - name: AGENT_URL
              value: http://localhost:{{ .port }}
            - name: BACKEND_PORT
              value: {{ .port | quote }}
            - name: METRICS_ENABLED
              value: {{ $agentMetricsEnabled | toString | quote }}
            {{- if .env }}
            {{- toYaml .env | nindent 12 }}
            {{- end }}
          {{- if .envFrom }}
          envFrom:
            {{- toYaml .envFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if $storageEnabled }}
            {{- $backendNameForStorage := .name }}
            {{- range (.storage).mounts }}
            - name: {{ $agentName }}-{{ $backendNameForStorage }}-storage
              mountPath: {{ .mountPath }}
              subPath: {{ .subPath }}
            {{- end }}
            {{- end }}
            {{- if $hasGitSyncs }}
            - name: git-sync-data
              mountPath: /git
            {{- end }}
            {{- if .gitMappings }}
            {{- $backendName := .name }}
            {{- range .gitMappings }}
            - name: gm-{{ $agentName }}-{{ $backendName }}-{{ .dest | trimPrefix "/home/agent/" | replace "/" "-" | replace "." "" | trimSuffix "-" }}
              mountPath: {{ .dest }}
            {{- end }}
            {{- end }}
            {{- if $.Values.sharedStorage.enabled }}
            - name: nyx-shared
              mountPath: {{ $.Values.sharedStorage.mountPath }}
            {{- end }}
            {{- if .config }}
            {{- $backendName := .name }}
            {{- range .config }}
            - name: {{ $backendName }}-config
              mountPath: {{ .mountPath }}
              subPath: {{ .name }}
            {{- end }}
            {{- end }}
{{- end }}
      volumes:
        - name: backend-config
          configMap:
            name: nyx-{{ .name }}-backend
        {{- if .gitSyncs }}
        - name: git-sync-data
          emptyDir: {}
        {{- end }}
        {{- if .config }}
        - name: nyx-agent-config
          configMap:
            name: nyx-{{ .name }}-config
        {{- end }}
        {{- range .backends }}
        {{- if (.storage).enabled }}
        - name: {{ $agentName }}-{{ .name }}-storage
          persistentVolumeClaim:
            claimName: {{ (.storage).existingClaim | default (printf "nyx-%s-%s-data" $agentName .name) }}
        {{- end }}
        {{- if .config }}
        - name: {{ .name }}-config
          configMap:
            name: nyx-{{ $agentName }}-{{ .name }}-config
        {{- end }}
        {{- end }}
        {{- if $.Values.sharedStorage.enabled }}
        - name: nyx-shared
          {{- if eq $.Values.sharedStorage.storageType "hostPath" }}
          hostPath:
            path: {{ $.Values.sharedStorage.hostPath }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ $.Values.sharedStorage.existingClaim | default "nyx-shared" }}
          {{- end }}
        {{- end }}
        {{- $hasMappings := false }}
        {{- if .gitMappings }}{{- $hasMappings = true }}{{- end }}
        {{- range .backends }}{{- if .gitMappings }}{{- $hasMappings = true }}{{- end }}{{- end }}
        {{- if $hasMappings }}
        - name: nyx-git-sync-script
          configMap:
            name: nyx-git-sync-script
        {{- if .gitMappings }}
        - name: nyx-{{ .name }}-git-mappings
          configMap:
            name: nyx-{{ .name }}-git-mappings
        {{- range .gitMappings }}
        - name: gm-{{ $agentName }}-agent-{{ .dest | trimPrefix "/home/agent/" | replace "/" "-" | replace "." "" | trimSuffix "-" }}
          emptyDir: {}
        {{- end }}
        {{- end }}
        {{- range .backends }}
        {{- if .gitMappings }}
        - name: nyx-{{ $agentName }}-{{ .name }}-git-mappings
          configMap:
            name: nyx-{{ $agentName }}-{{ .name }}-git-mappings
        {{- $backendName := .name }}
        {{- range .gitMappings }}
        - name: gm-{{ $agentName }}-{{ $backendName }}-{{ .dest | trimPrefix "/home/agent/" | replace "/" "-" | replace "." "" | trimSuffix "-" }}
          emptyDir: {}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- end }}
{{- end }}
