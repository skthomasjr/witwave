{{- range .Values.agents }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyx-{{ .name }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/component: nyx-agent
    app.kubernetes.io/part-of: nyx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/component: nyx-agent
        app.kubernetes.io/part-of: nyx
    spec:
      {{- if .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: nyx-agent
          image: {{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}
          ports:
            - containerPort: 8000
          env:
            - name: AGENT_NAME
              value: {{ .name }}
          volumeMounts:
            - name: backend-config
              mountPath: /home/agent/.nyx/backend.yaml
              subPath: backend.yaml
      volumes:
        - name: backend-config
          configMap:
            name: nyx-{{ .name }}-backend
{{- end }}
