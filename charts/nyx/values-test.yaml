ui:
  enabled: true
  image:
    repository: ghcr.io/skthomasjr/images/ui
    tag: "0.2.0-beta.34"
  imagePullSecrets:
    - name: ghcr-credentials

dashboard:
  enabled: true
  image:
    repository: ghcr.io/skthomasjr/images/dashboard
    tag: "0.2.0-beta.34"
  imagePullSecrets:
    - name: ghcr-credentials

sharedStorage:
  enabled: true
  storageType: pvc
  mountPath: /data/shared

metrics:
  enabled: true

gitSync:
  image:
    repository: ghcr.io/skthomasjr/images/git-sync
    tag: 0.2.0-beta.34

agents:
  - name: bob
    port: 8099
    image:
      repository: ghcr.io/skthomasjr/images/nyx-harness
      tag: "0.2.0-beta.34"
    imagePullSecrets:
      - name: ghcr-credentials
    env:
      - name: CORS_ALLOW_ORIGINS
        value: "*"
    gitSyncs:
      - name: autonomous-agent
        repo: https://github.com/skthomasjr/autonomous-agent
        ref: main
        depth: 1
        period: 60s
        envFrom:
          - secretRef:
              name: git-sync-credentials
    gitMappings:
      - gitSync: autonomous-agent
        src: .agents/test/bob/.nyx/
        dest: /home/agent/.nyx/

    backends:
      - name: claude
        image:
          repository: ghcr.io/skthomasjr/images/a2-claude
          tag: "0.2.0-beta.34"
        port: 8090
        model: claude-opus-4-6
        envFrom:
          - secretRef:
              name: bob-claude-secrets
        gitMappings:
          - gitSync: autonomous-agent
            src: .agents/test/bob/.claude/
            dest: /home/agent/.claude/
        storage:
          enabled: true
          mounts:
            - subPath: claude-projects
              mountPath: /home/agent/.claude/projects
            - subPath: claude-sessions
              mountPath: /home/agent/.claude/sessions
            - subPath: claude-backups
              mountPath: /home/agent/.claude/backups
            - subPath: memory
              mountPath: /home/agent/memory

      - name: codex
        image:
          repository: ghcr.io/skthomasjr/images/a2-codex
          tag: "0.2.0-beta.34"
        port: 8091
        model: gpt-5.1-codex-max
        envFrom:
          - secretRef:
              name: bob-codex-secrets
        gitMappings:
          - gitSync: autonomous-agent
            src: .agents/test/bob/.codex/
            dest: /home/agent/.codex/
        storage:
          enabled: true
          mounts:
            - subPath: memory
              mountPath: /home/agent/memory

      - name: gemini
        # Disabled: no Gemini API key available for the local test stack.
        # Leave the config intact so re-enabling is a one-liner once a key is
        # provisioned. Flip to true to restore the backend container, PVC,
        # git-mappings ConfigMap, and Service port (#beta.32).
        enabled: false
        image:
          repository: ghcr.io/skthomasjr/images/a2-gemini
          tag: "0.2.0-beta.34"
        port: 8092
        env:
          - name: GEMINI_MAX_HISTORY_TURNS
            value: "100"
        envFrom:
          - secretRef:
              name: bob-gemini-secrets
        gitMappings:
          - gitSync: autonomous-agent
            src: .agents/test/bob/.gemini/
            dest: /home/agent/.gemini/
        storage:
          enabled: true
          mounts:
            - subPath: memory
              mountPath: /home/agent/memory

  - name: fred
    port: 8098
    image:
      repository: ghcr.io/skthomasjr/images/nyx-harness
      tag: "0.2.0-beta.34"
    imagePullSecrets:
      - name: ghcr-credentials
    env:
      - name: CORS_ALLOW_ORIGINS
        value: "*"
    gitSyncs:
      - name: autonomous-agent
        repo: https://github.com/skthomasjr/autonomous-agent
        ref: main
        depth: 1
        period: 60s
        envFrom:
          - secretRef:
              name: git-sync-credentials
    gitMappings:
      - gitSync: autonomous-agent
        src: .agents/test/fred/.nyx/
        dest: /home/agent/.nyx/

    backends:
      - name: claude
        image:
          repository: ghcr.io/skthomasjr/images/a2-claude
          tag: "0.2.0-beta.34"
        port: 8089
        model: claude-opus-4-6
        envFrom:
          - secretRef:
              name: fred-claude-secrets
        gitMappings:
          - gitSync: autonomous-agent
            src: .agents/test/fred/.claude/
            dest: /home/agent/.claude/
        storage:
          enabled: true
          mounts:
            - subPath: claude-projects
              mountPath: /home/agent/.claude/projects
            - subPath: claude-sessions
              mountPath: /home/agent/.claude/sessions
            - subPath: claude-backups
              mountPath: /home/agent/.claude/backups
            - subPath: memory
              mountPath: /home/agent/memory
