# Enable Prometheus metrics for all agents and their backends.
# Override per agent with agents[].metrics.enabled.
metrics:
  # Enable or disable metrics globally.
  enabled: false

  # # Metrics Service for Prometheus scraping.
  # # Created per agent when metrics.enabled is true and service.enabled is true.
  # service:
  #   # Enable the metrics Service.
  #   enabled: false
  #   # Port exposed on the Service (mapped to the nyx-agent container port).
  #   port: 9090
  #   # Scrape path annotated on the Service.
  #   path: /metrics

# Shared storage volume mounted into all agent pods and backend sidecars.
sharedStorage:
  # Enable shared storage.
  enabled: false
  # Mount path inside each container.
  mountPath: /data/shared
  # Storage type: pvc or hostPath.
  # Use hostPath for single-node clusters (e.g. Docker Desktop).
  # Use pvc with a ReadWriteMany-capable storage class for multi-node clusters.
  storageType: pvc
  # PVC storage request size.
  size: 1Gi
  # # Storage class name. Leave empty to use the cluster default.
  # storageClassName: ""
  # # PVC access modes.
  # accessModes:
  #   - ReadWriteMany
  # # Name of a pre-existing PVC to use instead of creating one.
  # existingClaim: ""
  # # Host path on the node. Only used when storageType is hostPath.
  # hostPath: /tmp/nyx-shared

# List of agents to deploy. Each agent runs as a single pod containing
# the nyx-agent orchestrator and one or more backend sidecars.
agents:
  - # Agent name. Used as the pod name prefix, service name, and AGENT_NAME env var.
    name: adam

    # nyx-agent orchestrator image.
    image:
      # Image repository.
      repository: ghcr.io/skthomasjr/images/nyx-agent
      # # Image tag. Defaults to .Chart.AppVersion when omitted.
      # tag: ""
      # # Image pull policy.
      # pullPolicy: IfNotPresent

    # # Image pull secrets for private registries.
    # imagePullSecrets:
    #   - name: ghcr-credentials

    # # Per-agent metrics override. Takes precedence over global metrics.enabled.
    # metrics:
    #   enabled: true

    # # Inline config files mounted into the nyx-agent container.
    # # Each entry is added as a key in a ConfigMap and mounted at mountPath.
    # config:
    #   - name: HEARTBEAT.md
    #     mountPath: /home/agent/.nyx/HEARTBEAT.md
    #     content: |
    #       ---
    #       schedule: "0 * * * *"
    #       ---
    #       What is the current status?
    #   - name: agent-card.md
    #     mountPath: /home/agent/agent-card.md
    #     content: |
    #       An autonomous agent.

    # Backend sidecars. Each entry deploys one backend container alongside nyx-agent.
    backends:
      - # Backend name. Used as the sidecar container name and backend ID in routing.
        name: claude

        # Backend container image.
        image:
          # Image repository.
          repository: ghcr.io/skthomasjr/images/a2-claude
          # # Image tag. Defaults to .Chart.AppVersion when omitted.
          # tag: ""
          # # Image pull policy.
          # pullPolicy: IfNotPresent

        # Port the backend listens on.
        port: 8080

        # Default model for this backend.
        model: claude-opus-4-6

        # # Additional environment variables injected into the backend container.
        # env:
        #   - name: CLAUDE_MODEL
        #     value: claude-opus-4-6

        # # Environment variables sourced from Secrets or ConfigMaps.
        # # See the backend README for required secret keys.
        # envFrom:
        #   - secretRef:
        #       name: adam-claude-secrets

        # # Persistent storage for this backend. A PVC named nyx-<agent>-<backend>-data
        # # is created automatically unless existingClaim is set.
        # storage:
        #   # Enable persistent storage for this backend.
        #   enabled: false
        #   # PVC storage request size.
        #   size: 1Gi
        #   # # Storage class name. Leave empty to use the cluster default.
        #   # storageClassName: ""
        #   # # Name of a pre-existing PVC to use instead of creating one.
        #   # existingClaim: ""
        #   # Subdirectory mounts from the PVC into the container.
        #   # Each entry maps a subPath within the PVC to a container mountPath.
        #   mounts:
        #     - subPath: claude-projects
        #       mountPath: /home/agent/.claude/projects
        #     - subPath: claude-sessions
        #       mountPath: /home/agent/.claude/sessions
        #     - subPath: claude-backups
        #       mountPath: /home/agent/.claude/backups
        #     - subPath: memory
        #       mountPath: /home/agent/memory

        # # Inline config files mounted into the backend container.
        # # Each entry is added as a key in a ConfigMap and mounted at mountPath.
        # config:
        #   - name: agent-card.md
        #     mountPath: /home/agent/agent-card.md
        #     content: |
        #       An autonomous agent named adam.
        #   - name: CLAUDE.md
        #     mountPath: /home/agent/.claude/CLAUDE.md
        #     content: |
        #       # adam
        #       You are adam, an autonomous agent.
        #   - name: hello.md
        #     mountPath: /home/agent/.claude/skills/hello.md
        #     content: |
        #       ---
        #       name: hello
        #       description: A dummy skill.
        #       version: 1.0.0
