# Vue 3 dashboard — the nyx web interface. Disabled by default; enable to
# deploy it alongside the agent harnesses in the same release.
dashboard:
  enabled: false
  image:
    repository: ghcr.io/skthomasjr/images/dashboard
    # # Image tag. Defaults to .Chart.AppVersion when omitted.
    # tag: ""
    # # Image pull policy.
    # pullPolicy: IfNotPresent
  # Service port (the container always listens on 8080; this is the Service port).
  port: 80
  # Number of replicas.
  # replicas: 1
  # # Image pull secrets for private registries.
  # imagePullSecrets:
  #   - name: ghcr-credentials
  # # Resource requests and limits.
  # resources:
  #   requests:
  #     cpu: 50m
  #     memory: 64Mi
  #   limits:
  #     cpu: 250m
  #     memory: 128Mi
  # # Pod-level securityContext (the dashboard image runs as non-root and
  # # binds port 8080, so the Pod Security Standards "restricted" profile is
  # # applicable out of the box when you supply a matching context here).
  # securityContext:
  #   runAsNonRoot: true
  #   runAsUser: 1000
  #   runAsGroup: 1000
  #   fsGroup: 1000

# Ingress for the dashboard. Disabled by default — enable to expose the dashboard externally (#424).
#
# SECURITY (#528): When the dashboard is exposed via Ingress, the nginx pod
# reverse-proxies every enabled agent's API (conversations, triggers, jobs).
# Unauthenticated exposure is treated as unauthenticated remote code execution
# against the cluster, so this chart FAILS TEMPLATE RENDER when ingress.enabled=true
# unless one of the following is configured:
#   1. ingress.auth.enabled=true (chart renders an auth block — default), or
#   2. ingress.auth.allowInsecure=true (explicit opt-out — you own the auth gateway), or
#   3. ingress.annotations includes one of: nginx.ingress.kubernetes.io/auth-url,
#      nginx.ingress.kubernetes.io/auth-signin, or traefik.ingress.kubernetes.io/router.middlewares
#      (you're wiring your own auth proxy / middleware).
# ----------------------------------------------------------------------------
# cert-manager integration (#639).
#
# When enabled, the chart can auto-issue TLS certs for the dashboard ingress
# (and, in the future, for any other TLS surface) through cert-manager. Three
# install modes:
#
#   1. Chart renders its own selfSigned Issuer (default when certManager.enabled=true).
#      Simplest for internal clusters; certs are self-signed so browsers will warn
#      unless you trust the CA.
#
#   2. Chart creates no Issuer; point at an existing (Cluster)Issuer via issuerRef.
#      Typical for production (Let's Encrypt via an ClusterIssuer you already run).
#
#   3. certManager.enabled=false (default): chart does not render any cert-manager
#      resources. If you want TLS, set ingress.tls directly yourself.
#
# Values shape mirrors charts/nyx-operator so operators see the same knobs.
certManager:
  enabled: false
  # Render a chart-owned Issuer. Set false when using an external (Cluster)Issuer
  # via issuerRef below. Note: setting createIssuer=false WITHOUT populating
  # issuerRef.name fails render — the Certificate would otherwise point at a
  # non-existent issuer.
  createIssuer: true
  # Kind of the Issuer the CHART creates when createIssuer=true.
  # "Issuer" is namespaced to the release; "ClusterIssuer" is global.
  # Ignored entirely when createIssuer=false — see issuerRef.kind for the
  # corresponding knob on external issuers.
  issuerKind: Issuer
  # Reference to an existing (Cluster)Issuer. When name is set, createIssuer is
  # ignored and the chart references this issuer instead. issuerRef.kind
  # defaults to "ClusterIssuer" when unset — if you're pointing at a namespaced
  # "Issuer" you MUST set kind explicitly.
  issuerRef:
    name: ""
    kind: ""   # defaults to "ClusterIssuer" when empty; set to "Issuer" for namespaced issuers

ingress:
  enabled: false
  # # Ingress class name (e.g. nginx, traefik).
  # className: nginx
  # # Annotations to add to the Ingress resource.
  # annotations:
  #   nginx.ingress.kubernetes.io/rewrite-target: /
  # # Hostnames and paths.
  # hosts:
  #   - host: nyx.example.com
  #     path: /
  #     pathType: Prefix
  # # TLS configuration.
  # #
  # # Two ways to populate this list:
  # #
  # # (a) Let the chart auto-populate it via certManager.enabled=true AND
  # #     ingress.tls.enabled=true. The chart will synthesize a tls entry from
  # #     ingress.hosts and render a cert-manager Certificate targeting the
  # #     secret below.
  # #
  # # (b) Provide the list directly (skip certManager entirely) for bring-your-own
  # #     TLS setups.
  # tls: []
  # #   - secretName: nyx-dashboard-tls
  # #     hosts:
  # #       - nyx.example.com
  #
  # # cert-manager-driven TLS (#639). Requires certManager.enabled=true above.
  # # When enabled:
  # #   - chart renders a cert-manager Certificate for the ingress host(s)
  # #   - secret name defaults to <release>-dashboard-tls when unset
  # #   - ingress emits a tls: entry automatically
  # # Mutually exclusive with manually populating ingress.tls as a list.
  # tlsEnabled: false
  # tlsSecretName: ""

  # Auth configuration for the dashboard ingress (#528).
  # Default: basic auth, enabled, credentials rendered from ingress.auth.basic
  # into a chart-managed Secret and wired via nginx-ingress auth annotations.
  auth:
    # Master toggle. When true (default), the chart renders an auth block
    # (type=basic -> Secret + nginx auth-* annotations). Set false only in
    # combination with allowInsecure=true or a user-supplied auth annotation.
    enabled: true
    # Auth mechanism. Currently supported: "basic".
    # For oauth2-proxy / custom auth-url setups, set enabled=false and provide
    # nginx.ingress.kubernetes.io/auth-url (or a traefik middleware) in
    # ingress.annotations directly.
    type: basic
    # Default-closed escape hatch. Set to true to deploy the ingress with no
    # chart-managed auth AND no detected user-supplied auth annotation. This
    # exposes every agent API unauthenticated — use only on isolated networks
    # (smoke tests, internal clusters behind a separate auth gateway).
    allowInsecure: false
    # Basic auth settings. Used when type=basic and enabled=true.
    basic:
      # Reference an existing Secret containing an htpasswd `auth` key.
      # When set, the chart does NOT render credentials and does NOT create
      # a Secret — the referenced Secret is used as-is.
      existingSecret: ""
      # Inline htpasswd line(s). Rendered into a chart-managed Secret when
      # existingSecret is empty. Generate with e.g.:
      #   htpasswd -nbB admin 'choose-a-strong-password'
      # Multiple users: supply a multiline string with one htpasswd entry per line.
      # Leaving this empty while enabled=true and existingSecret="" fails
      # template render — the chart refuses to render an empty auth Secret.
      htpasswd: ""
      # Realm shown in the browser auth prompt.
      realm: "nyx dashboard"

# ----------------------------------------------------------------------------
# Replica topology — single-replica default is INTENTIONAL (#559).
#
# Each agent's Deployment renders `replicas: 1` by default (see the Deployment
# template). This is deliberate for per-agent workloads: nyx-harness owns the
# heartbeat scheduler, job scheduler, task scheduler, trigger handler, and
# continuation runner, and running two harness pods for the same agent would
# cause those schedulers to fire twice. Backends are mostly stateless but
# still keep per-session conversation logs on a local volume — running two
# backend pods for the same agent can interleave writes.
#
# The trade-off: with replicas=1 AND PDB/HPA disabled, any voluntary
# disruption (`kubectl drain`, node upgrade, cluster autoscaler scale-down)
# causes a brief outage. Scheduled jobs/heartbeats miss fire windows,
# inbound triggers return 503, and in-flight A2A calls fail.
#
# HA opt-in path (requires coordination — DO NOT just flip replicas > 1):
#   1. Land default resource requests/limits (#553 — already landed).
#   2. Enable `podDisruptionBudget.enabled: true` with `minAvailable: 1` to
#      block node drains until a replacement pod is Ready elsewhere. Safe
#      even at replicas=1 (blocks the drain instead of dropping the pod).
#   3. Only raise `replicas > 1` or `autoscaling.minReplicas >= 2` AFTER
#      backends are updated to use shared storage or externalized session
#      state — otherwise scheduled jobs will double-fire and conversation
#      logs will interleave.
# ----------------------------------------------------------------------------

# Horizontal autoscaling for agent Deployments. Disabled by default — enable
# per-agent via agents[].autoscaling to override these defaults. When enabled,
# the Deployment's replicas field is omitted so the HPA owns replica count
# (#434). NOTE: Enabling autoscaling currently conflicts with the harness's
# singleton schedulers — see the Replica topology note above before enabling.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # # Optional: memory target (requires container resources to be set).
  # targetMemoryUtilizationPercentage: 80

# PodDisruptionBudget for agent Deployments. Disabled by default — enable to
# limit voluntary disruption during node drain and cluster upgrades (#435).
# STRONGLY RECOMMENDED for production: with replicas=1 and PDB disabled, every
# node drain drops the pod immediately, suspending heartbeats/jobs/triggers
# until the new pod is Ready (typically ~30s). Setting `enabled: true` with
# `minAvailable: 1` blocks the drain until a replacement pod is Ready on
# another node — safe even at replicas=1, and the recommended production
# default. Leaving it disabled is fine for dev/test (#559).
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # # Alternative: cap unavailable pods instead of guaranteeing available.
  # maxUnavailable: 1

# Pod termination grace period (#547). Must be strictly greater than
# preStop.delaySeconds so the harness + backends have time to receive SIGTERM
# and run graceful shutdown (drain in-flight A2A requests, flush conversation
# logs, flush Prometheus counters) before the kubelet sends SIGKILL. Default
# 60s preserves prior hardcoded behaviour; the chart's fail guard enforces the
# `preStop.delaySeconds < terminationGracePeriodSeconds` invariant when preStop
# is enabled.
terminationGracePeriodSeconds: 60

# preStop lifecycle hook for graceful drain on pod termination. When enabled,
# every container in the agent pod sleeps for delaySeconds before SIGTERM
# arrives, giving in-flight A2A requests, scheduled jobs, and webhook
# deliveries a coordinated drain window (#447). Off by default — opt in for
# production deployments where graceful shutdown matters. Keep delaySeconds
# strictly less than terminationGracePeriodSeconds so SIGTERM fires with
# enough remaining grace to complete graceful shutdown (#547).
preStop:
  enabled: false
  delaySeconds: 5

# Scheduling controls applied to every agent pod unless the per-agent entry
# overrides them (#603). Mirrors the nyx-operator chart's value names exactly
# so a NyxAgent CRD → chart values translation is 1:1 (pairs with #605).
# Per-agent values REPLACE these (not merge) — matches the existing
# autoscaling / podDisruptionBudget semantics. Leave empty/unset to place
# no scheduling constraints on the pod.
#
# nodeSelector:
#   workload-class: ai-memory-optimized
# tolerations:
#   - key: dedicated
#     operator: Equal
#     value: ai
#     effect: NoSchedule
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#         - matchExpressions:
#             - key: node.kubernetes.io/instance-type
#               operator: In
#               values: [r6i.xlarge, r6i.2xlarge]
# topologySpreadConstraints:
#   # Spread replicas of the same agent across zones. Pairs naturally with
#   # podDisruptionBudget.enabled=true once multi-replica is safe (#559).
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: adam
# priorityClassName: system-cluster-critical
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""

# Liveness and readiness probe timing for all containers.
# Defaults match the values previously hardcoded in templates (#425).
#
# startup gives cold-starting pods a long grace window before kubelet begins
# enforcing readiness/liveness (#580). Backends (Claude Agent SDK, OpenAI
# Agents SDK, google-genai) pay SDK import cost + MCP server handshakes on
# first boot; without a startupProbe, the tight readiness defaults below flap
# NotReady → Ready → NotReady during warm-up and liveness can restart a pod
# before it ever finishes initialising. The defaults here (failureThreshold 30
# × periodSeconds 10 = 5 minutes) are strictly additive: once startup succeeds
# once, kubelet switches to the readiness/liveness cadence below. Point the
# probe at the same health endpoint used by readiness (hardcoded per-container
# in the template: /health/ready for nyx-harness, /health for backends). Bump
# failureThreshold if your cold-start genuinely exceeds 5 minutes.
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startup:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

# Default git-sync image used by all gitSyncs entries unless overridden per-entry.
gitSync:
  # Default git-sync image used by all gitSyncs entries that don't override
  # via .gitSyncs[].image. Tracks .Chart.AppVersion the same way every other
  # image in this chart does, so beta installs get pinned bits instead of
  # silently following ":latest" (#457). Override per-entry for sticky pins.
  image:
    repository: ghcr.io/skthomasjr/images/git-sync
    # tag defaults to .Chart.AppVersion when empty
    tag: ""

  # Default credentials for every agents[].gitSyncs[] entry unless overridden
  # per-entry via agents[].gitSyncs[].credentials. Mirrors the pattern the
  # ingress.auth block already uses for basic-auth (#528) — three mutually
  # exclusive modes, in precedence order:
  #
  #   1. existingSecret — reference a pre-created Secret in the release
  #      namespace. The recommended path for production.
  #
  #   2. inline username + token + acknowledgeInsecureInline=true — chart
  #      renders a Secret for you. Convenient for local dev and smoke tests
  #      (our own values-test.yaml uses this path), but tokens land in etcd
  #      release state + `helm get values` + `kubectl describe`, so NEVER
  #      commit a values file with inline tokens to a shared repo.
  #
  #   3. empty (default) — no auth envFrom rendered. Fine for anonymous
  #      clones of public repos.
  #
  # When both existingSecret and inline token are populated, existingSecret
  # wins and a warning is logged via NOTES.txt. When inline username/token
  # are populated but acknowledgeInsecureInline stays false, chart aborts
  # render with a clear message pointing at this comment.
  credentials:
    existingSecret: ""
    username: ""
    token: ""
    acknowledgeInsecureInline: false

# Enable Prometheus metrics for all agents and their backends.
# When enabled, prometheus.io scrape annotations are added to each agent Service
# and the /metrics endpoint is activated on both nyx-harness and backend containers.
# Override per agent with agents[].metrics.enabled.
metrics:
  # Master toggle for Prometheus metrics. When false, the harness still
  # exposes /metrics but no scrape annotations / ServiceMonitor are
  # rendered.
  enabled: false

  # Where Prometheus scrape annotations land. Both can be true at the
  # same time — Prometheus configs that use both `kubernetes_sd_configs.
  # role: service` and `role: pod` will discover both targets and need
  # standard relabel rules to dedupe (kube-prometheus-stack defaults
  # already do this). Both default to backward-compatible behaviour:
  # serviceAnnotations on, podAnnotations off (#472).
  #
  # Per-agent overrides:
  #   agents[].metrics.serviceAnnotations: false
  #   agents[].metrics.podAnnotations:     true
  serviceAnnotations: true
  podAnnotations: false

# ServiceMonitor for the Prometheus Operator (#449). Off by default so the
# chart never references monitoring.coreos.com CRDs unless the user opts in
# (clusters without the Prometheus Operator installed should leave this off).
# When enabled, one ServiceMonitor is rendered per agent that has metrics
# enabled — symmetric with the nyx-operator chart but adapted for the nyx
# chart's per-agent Service layout.
serviceMonitor:
  enabled: false
  # Forwarded to each ServiceMonitor's endpoints[]; defaults align with the
  # nyx-operator chart and kubebuilder conventions.
  scrapeInterval: 30s
  scrapeTimeout: 10s
  # Extra labels merged into every ServiceMonitor's metadata. Useful when
  # the cluster's Prometheus selects ServiceMonitors by a tenancy label
  # (e.g. release: kube-prometheus-stack).
  labels: {}

# PodMonitor for the Prometheus Operator (#582). Scrapes backend /metrics
# endpoints directly on the pod. Required for backend observability because
# the per-agent Service only publishes the harness port — ServiceMonitor
# cannot reach backend container ports through it. When enabled, one
# PodMonitor is rendered per agent that has metrics enabled, with one
# endpoint per enabled backend. Off by default so the chart never references
# monitoring.coreos.com CRDs unless the user opts in.
podMonitor:
  enabled: false
  # Forwarded to each PodMonitor's podMetricsEndpoints[].
  scrapeInterval: 30s
  scrapeTimeout: 10s
  # Extra labels merged into every PodMonitor's metadata. Useful when
  # the cluster's Prometheus selects PodMonitors by a tenancy label
  # (e.g. release: kube-prometheus-stack).
  labels: {}

# OpenTelemetry tracing (#634). End-to-end opt-in wiring for distributed
# traces across harness, backends, and operator. Disabled by default so
# existing deployments are unaffected.
#
# When observability.tracing.enabled=true, every harness and backend pod
# receives the standard OTel env vars (OTEL_ENABLED, OTEL_EXPORTER_OTLP_ENDPOINT,
# OTEL_TRACES_SAMPLER, OTEL_TRACES_SAMPLER_ARG, OTEL_SERVICE_NAME). The Python
# SDK bootstrap in shared/otel.py and the Go bootstrap in
# operator/internal/tracing/otel.go both honour these variables.
#
# When observability.tracing.collector.enabled=true, the chart also deploys
# an OpenTelemetry Collector (Deployment + Service + ConfigMap) into the
# release namespace. Pods route to that collector automatically unless
# observability.tracing.endpoint is set explicitly to override.
observability:
  tracing:
    # Master toggle. When false, no OTEL_* env vars are injected and the
    # collector template is not rendered — matches existing behaviour.
    enabled: false

    # OTLP endpoint the pods export to. Leave empty to auto-derive from the
    # chart-deployed collector when collector.enabled=true (see below). When
    # pointing at an out-of-band collector, set the full URL including scheme
    # and port — e.g. http://otel-collector.observability:4318 for OTLP/HTTP
    # or http://otel-collector.observability:4317 for OTLP/gRPC.
    endpoint: ""

    # OTel trace sampler name — forwarded verbatim as OTEL_TRACES_SAMPLER.
    # Common values: "parentbased_always_on" (SDK default), "always_on",
    # "always_off", "traceidratio", "parentbased_traceidratio". Leave empty
    # to accept the SDK default.
    sampler: ""

    # OTEL_TRACES_SAMPLER_ARG — only meaningful for ratio-based samplers
    # (e.g. "0.1" for 10% sampling with parentbased_traceidratio).
    samplerArg: ""

    # OpenTelemetry Collector, deployed into the release namespace. Acts as
    # the funnel between the pods and whichever trace backend (Jaeger,
    # Tempo, Grafana Cloud, Datadog, …) is configured in config.exporters.
    #
    # Disable this block and set observability.tracing.endpoint to route
    # directly to an existing out-of-band collector instead.
    collector:
      enabled: false

      image:
        repository: otel/opentelemetry-collector-contrib
        # Tag defaults to an LTS-known-good 0.x release. Bump when a newer
        # contrib image is required (the :latest tag is intentionally
        # avoided so upgrades are deterministic).
        tag: "0.112.0"
        pullPolicy: IfNotPresent

      replicas: 1

      # Service name exposed inside the cluster. Empty → "<release>-otel-collector".
      service:
        type: ClusterIP
        name: ""

      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi

      # Full collector configuration rendered into a ConfigMap mounted at
      # /etc/otel-collector/config.yaml. The default pipeline accepts OTLP
      # on 4317 (gRPC) + 4318 (HTTP) and emits to the `debug` exporter —
      # safe to deploy, but you'll see traces only in the collector's own
      # logs until you wire a real exporter.
      #
      # Example — forward to Jaeger (replace exporters + the traces pipeline):
      #   exporters:
      #     otlp/jaeger:
      #       endpoint: jaeger-collector.observability:4317
      #       tls: { insecure: true }
      #   service:
      #     pipelines:
      #       traces:
      #         receivers: [otlp]
      #         processors: [batch]
      #         exporters: [otlp/jaeger]
      #
      # Example — forward to Tempo (OTLP/HTTP):
      #   exporters:
      #     otlphttp/tempo:
      #       endpoint: http://tempo.observability:4318
      #   service:
      #     pipelines:
      #       traces:
      #         receivers: [otlp]
      #         processors: [batch]
      #         exporters: [otlphttp/tempo]
      config:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318
        processors:
          batch: {}
        exporters:
          debug:
            verbosity: basic
        service:
          pipelines:
            traces:
              receivers: [otlp]
              processors: [batch]
              exporters: [debug]

# Shared storage volume mounted into all agent pods and backend sidecars.
sharedStorage:
  # Enable shared storage.
  enabled: false
  # Mount path inside each container.
  mountPath: /data/shared
  # Storage type: pvc or hostPath.
  # Use hostPath for single-node clusters (e.g. Docker Desktop).
  # Use pvc with a ReadWriteMany-capable storage class for multi-node clusters.
  storageType: pvc
  # PVC storage request size.
  size: 1Gi
  # # Storage class name. Leave empty to use the cluster default.
  # storageClassName: ""
  # # PVC access modes.
  # accessModes:
  #   - ReadWriteMany
  # # Name of a pre-existing PVC to use instead of creating one.
  # existingClaim: ""
  # # Host path on the node. Only used when storageType is hostPath.
  # # Required when storageType is hostPath — must be a non-empty absolute path.
  # hostPath: /tmp/nyx-shared

# Chart-wide defaults applied to every agent pod when the per-agent /
# per-backend entry does not set its own value (#553).
#
# Resource requests and limits default to conservative values so the chart
# installs with Guaranteed/Burstable QoS out of the box instead of BestEffort.
# Without requests, HPA `targetCPUUtilizationPercentage` (see `autoscaling`
# above) is a no-op (FailedGetResourceMetric) and pods are the first to be
# evicted under node pressure. These defaults exist so a vanilla `helm install`
# stands on something reasonable; tune them per workload.
#
# Precedence:
#   agents[].resources                            → overrides harness default
#   agents[].backends[].resources                 → overrides backend default
#   defaults.resources.backends.<backend-name>    → per-backend-type default,
#                                                    keyed by backend.name
#                                                    (claude / codex / gemini)
#   defaults.resources.backend                    → shared fallback for any
#                                                    backend name not listed
#                                                    under .backends above
#   defaults.resources.harness                    → nyx-harness container
#
# Set any leaf to null (`~`) to disable the default and render no resources
# block for that container (back to pre-#553 BestEffort behaviour).
defaults:
  resources:
    # nyx-harness orchestrator is pure-Python infrastructure (no LLM): small,
    # bursty CPU and a low-memory steady state.
    harness:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Shared default for any backend sidecar whose name is not listed under
    # `backends` below. Backends run LLM clients and scale with concurrent
    # sessions, so they need more headroom than nyx-harness.
    backend:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    # Per-backend-type overrides, keyed by backend.name. Users running heavy
    # concurrency (especially on a2-claude, whose memory scales with active
    # Claude Code subprocess sessions) should raise these on the specific
    # backend entry — these defaults are a soft ceiling, not a recommendation.
    backends:
      claude:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      codex:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      gemini:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi

# Default credentials for every agents[].backends[] entry unless overridden
# per-backend via agents[].backends[].credentials. Three mutually exclusive
# paths, mirroring the gitSync.credentials pattern above:
#
#   1. existingSecret — reference a pre-created Secret with the env vars the
#      backend needs (CLAUDE_CODE_OAUTH_TOKEN, OPENAI_API_KEY, GEMINI_API_KEY,
#      or whatever the specific backend reads). Recommended for production.
#
#   2. inline secrets: {} map + acknowledgeInsecureInline=true — chart renders
#      a Secret from the map entries and wires envFrom automatically. Dev only;
#      tokens end up in etcd release state + `helm get values`.
#
#   3. empty (default) — no auth envFrom rendered. Backend starts but will
#      fail at first LLM call. Useful for smoke-testing the harness path
#      without exercising the LLM API.
#
# Chart-global defaults rarely make sense here because each backend type
# takes different credentials — prefer per-backend `agents[].backends[].credentials`
# over chart-global. This block exists mainly so single-backend-type
# deployments (only a2-claude across all agents, say) can set one token once.
backends:
  credentials:
    existingSecret: ""
    secrets: {}                  # map of env-var-name → value; dev only
    acknowledgeInsecureInline: false

# List of agents to deploy. Each agent runs as a single pod containing
# the nyx-harness orchestrator and one or more backend sidecars.
agents:
  - # Agent name. Used as the pod name prefix, service name, and AGENT_NAME env var.
    name: adam

    # Port the nyx-harness listens on. Also used for the Service and health probes.
    # Must be unique per agent when multiple agents share a namespace with hostPort.
    port: 8000

    # nyx-harness orchestrator image.
    image:
      # Image repository.
      repository: ghcr.io/skthomasjr/images/nyx-harness
      # # Image tag. Defaults to .Chart.AppVersion when omitted.
      # tag: ""
      # Image pull policy. Use Always for mutable tags (e.g. latest, beta).
      # pullPolicy: IfNotPresent

    # # Image pull secrets for private registries.
    # imagePullSecrets:
    #   - name: ghcr-credentials

    # # Per-agent scheduling overrides (#603). Each field REPLACES the chart-global
    # # value (nodeSelector / tolerations / affinity / topologySpreadConstraints /
    # # priorityClassName) — same semantics as autoscaling / podDisruptionBudget.
    # # Field names mirror the nyx-operator chart and the NyxAgent CRD (#605).
    # nodeSelector:
    #   workload-class: ai-memory-optimized
    # tolerations:
    #   - key: dedicated
    #     operator: Equal
    #     value: ai
    #     effect: NoSchedule
    # affinity:
    #   podAntiAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 100
    #         podAffinityTerm:
    #           labelSelector:
    #             matchLabels:
    #               app.kubernetes.io/name: adam
    #           topologyKey: kubernetes.io/hostname
    # topologySpreadConstraints:
    #   - maxSkew: 1
    #     topologyKey: topology.kubernetes.io/zone
    #     whenUnsatisfiable: ScheduleAnyway
    #     labelSelector:
    #       matchLabels:
    #         app.kubernetes.io/name: adam
    # priorityClassName: system-cluster-critical

    # # Resource requests and limits for the nyx-harness orchestrator container.
    # # Overrides `defaults.resources.harness` above. nyx-harness is lightweight
    # # (pure Python, no LLM) — CPU and memory needs are low; only raise if a
    # # single agent hosts a very large number of jobs/triggers/webhooks.
    # resources:
    #   requests:
    #     cpu: 100m
    #     memory: 256Mi
    #   limits:
    #     cpu: 500m
    #     memory: 512Mi

    # # Per-agent metrics override. Takes precedence over global metrics.enabled.
    # metrics:
    #   enabled: true

    # # Git-sync sidecars. Each entry clones a git repo into /git on the pod and
    # # keeps it in sync. All containers in the pod share the /git volume.
    # # An init container performs the initial clone so the repo is ready before
    # # the agent starts. Auth credentials are injected via envFrom referencing a
    # # Secret (see git-sync docs for supported env vars, e.g.
    # # GITSYNC_USERNAME / GITSYNC_PASSWORD for HTTPS, or mount an SSH key).
    # gitSyncs:
    #   - # Unique name for this git-sync sidecar.
    #     name: autonomous-agent
    #     # Git repository URL (HTTPS or SSH).
    #     repo: https://github.com/org/repo
    #     # Branch, tag, or commit SHA to sync. Defaults to HEAD.
    #     # ref: main
    #     # Sync interval (e.g. 30s, 1m). Defaults to 60s.
    #     # period: 60s
    #     # Clone depth. 1 is sufficient for config-only repos.
    #     # depth: 1
    #     # git-sync image. Defaults to the internal image (upstream git-sync + rsync).
    #     # image: ghcr.io/skthomasjr/images/git-sync:latest
    #     # Credentials for the sidecar. Three mutually exclusive paths — the
    #     # `credentials:` block takes precedence over the legacy `envFrom:` shape
    #     # when both are set. Leave empty to inherit top-level gitSync.credentials.
    #     # credentials:
    #     #   # Path 1: reference a pre-created Secret (production default).
    #     #   existingSecret: bob-github-pat
    #     #   # Path 2: inline dev credentials. MUST also set acknowledgeInsecureInline=true.
    #     #   username: skthomasjr
    #     #   token: ghp_xxxxxxxxxxxxxxxxxxxx
    #     #   acknowledgeInsecureInline: true
    #     #
    #     # Legacy escape hatch — raw envFrom list for custom auth setups (SSH key
    #     # secrets, multiple secrets, etc.) that the credentials block doesn't cover.
    #     # envFrom:
    #     #   - secretRef:
    #     #       name: git-sync-credentials

    # # Git mappings. After each git-sync, copies files or directories from the
    # # synced repo into the container. Runs once at pod startup via an init
    # # container, then again after every subsequent sync via exechook.
    # # gitSync must match a name in gitSyncs above.
    # gitMappings:
    #   - # Name of the gitSync entry to source from.
    #     gitSync: autonomous-agent
    #     # Source path within the repo (trailing / = directory copy).
    #     src: .agents/active/iris/.nyx/
    #     # Destination path inside the container.
    #     dest: /home/agent/.nyx/

    # # Environment variables sourced from Secrets or ConfigMaps, injected into
    # # the nyx-harness container.
    # envFrom:
    #   - secretRef:
    #       name: adam-secrets

    # # Inline config files mounted into the nyx-harness container.
    # # Each entry is added as a key in a ConfigMap and mounted at mountPath.
    # config:
    #   - name: HEARTBEAT.md
    #     mountPath: /home/agent/.nyx/HEARTBEAT.md
    #     content: |
    #       ---
    #       schedule: "0 * * * *"
    #       ---
    #       What is the current status?
    #   - name: agent-card.md
    #     mountPath: /home/agent/.nyx/agent-card.md
    #     content: |
    #       An autonomous agent.

    # Backend sidecars. Each entry deploys one backend container alongside nyx-harness.
    backends:
      - # Backend name. Used as the sidecar container name and backend ID in routing.
        name: claude

        # Backend container image.
        image:
          # Image repository.
          repository: ghcr.io/skthomasjr/images/a2-claude
          # # Image tag. Defaults to .Chart.AppVersion when omitted.
          # tag: ""
          # # Image pull policy.
          # pullPolicy: IfNotPresent

        # Port the backend listens on. Must be unique across all backends in the same agent.
        port: 8080

        # Default model for this backend.
        model: claude-opus-4-7

        # # Resource requests and limits for this backend container.
        # # Overrides `defaults.resources.backends.claude` above. Claude backends
        # # spawn a Claude Code subprocess per session — memory usage scales with
        # # concurrent sessions and context window size. CPU is bursty during
        # # active queries but mostly idle between them. Operators running heavy
        # # concurrency should raise memory (e.g. 2Gi limit) and CPU.
        # resources:
        #   requests:
        #     cpu: 250m
        #     memory: 512Mi
        #   limits:
        #     cpu: "2"
        #     memory: 2Gi

        # # Git mappings for this backend. Same semantics as agent-level gitMappings
        # # but scoped to this backend container.
        # gitMappings:
        #   - gitSync: autonomous-agent
        #     src: .agents/active/iris/.claude/
        #     dest: /home/agent/.claude/

        # # Additional environment variables injected into the backend container.
        # # Common backend env vars:
        # #   a2-gemini: GEMINI_MAX_HISTORY_TURNS (max turns persisted per session; default 100; 0 = unlimited)
        # #              SESSION_STORE_DIR (session JSON directory; default /home/agent/.gemini/memory/sessions)
        # #              MAX_SESSIONS (LRU cache size; default 10000)
        # #   a2-claude: LOG_PROMPT_MAX_BYTES (max bytes of prompt logged at INFO; default 200; 0 = suppress)
        # #   a2-codex:  CODEX_MODEL (model override; default gpt-5.1-codex)
        # env:
        #   - name: GEMINI_MAX_HISTORY_TURNS
        #     value: "100"

        # # Backend credentials. Three mutually exclusive paths — see
        # # backends.credentials top-level comment for the full picture.
        # # credentials:
        # #   existingSecret: adam-claude-secrets          # production default
        # #
        # #   # OR inline (dev only) — MUST also set acknowledgeInsecureInline=true.
        # #   # `secrets:` is a free-form map of env-var-name → value. The backend
        # #   # reads whichever env vars it needs (CLAUDE_CODE_OAUTH_TOKEN for
        # #   # a2-claude, OPENAI_API_KEY for a2-codex, GEMINI_API_KEY for a2-gemini).
        # #   secrets:
        # #     CLAUDE_CODE_OAUTH_TOKEN: "sk-ant-oat-xxxxxxxxxxxxxxxxxxxx"
        # #   acknowledgeInsecureInline: true
        #
        # # Legacy escape hatch — raw envFrom list for custom auth setups
        # # (SSH-key secrets, multiple secrets, ConfigMaps, etc.) that the
        # # credentials block doesn't cover. When both credentials and envFrom
        # # are set, credentials takes precedence.
        # envFrom:
        #   - secretRef:
        #       name: adam-claude-secrets

        # # Persistent storage for this backend. A PVC named nyx-<agent>-<backend>-data
        # # is created automatically unless existingClaim is set.
        # storage:
        #   # Enable persistent storage for this backend.
        #   enabled: false
        #   # PVC storage request size.
        #   size: 1Gi
        #   # # Storage class name. Leave empty to use the cluster default.
        #   # storageClassName: ""
        #   # # Name of a pre-existing PVC to use instead of creating one.
        #   # existingClaim: ""
        #   # Subdirectory mounts from the PVC into the container.
        #   # Each entry maps a subPath within the PVC to a container mountPath.
        #   mounts:
        #     - subPath: claude-projects
        #       mountPath: /home/agent/.claude/projects
        #     - subPath: claude-sessions
        #       mountPath: /home/agent/.claude/sessions
        #     - subPath: claude-backups
        #       mountPath: /home/agent/.claude/backups
        #     - subPath: memory
        #       mountPath: /home/agent/.claude/memory   # or .codex/memory / .gemini/memory for those backends

        # # Inline config files mounted into the backend container.
        # # Each entry is added as a key in a ConfigMap and mounted at mountPath.
        # config:
        #   - name: agent-card.md
        #     mountPath: /home/agent/.claude/agent-card.md
        #     content: |
