services:
  iris:
    image: nyx-agent:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AGENT_NAME: iris
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GH_REPO: skthomasjr/autonomous-agent
      GH_TOKEN: ${GITHUB_TOKEN_AUTONOMOUS_AGENT}
    volumes:
      - ./.agents/active/iris/.claude:/home/agent/.claude
      - ./.agents/active/iris/.nyx/AGENTS.md:/home/agent/.claude/CLAUDE.md:ro
      - ./.agents/active/iris/.nyx/skills:/home/agent/.claude/skills:ro
      - ./.agents/active/iris/.codex:/home/agent/.codex
      - ./.agents/active/iris/.nyx/AGENTS.md:/home/agent/.codex/AGENTS.md:ro
      - ./.agents/active/iris/.nyx/skills:/home/agent/.codex/skills:ro
      - ./.agents/active/iris/.nyx:/home/agent/.nyx
      - ./.agents/active/iris/logs:/home/agent/logs
      - ./.agents/active/manifest.json:/home/agent/.nyx/manifest.json:ro
      - .:/home/agent/workspace

  nova:
    image: nyx-agent:latest
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      AGENT_NAME: nova
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GH_REPO: skthomasjr/autonomous-agent
      GH_TOKEN: ${GITHUB_TOKEN_AUTONOMOUS_AGENT}
    volumes:
      - ./.agents/active/nova/.claude:/home/agent/.claude
      - ./.agents/active/nova/.nyx/AGENTS.md:/home/agent/.claude/CLAUDE.md:ro
      - ./.agents/active/nova/.nyx/skills:/home/agent/.claude/skills:ro
      - ./.agents/active/nova/.codex:/home/agent/.codex
      - ./.agents/active/nova/.nyx/AGENTS.md:/home/agent/.codex/AGENTS.md:ro
      - ./.agents/active/nova/.nyx/skills:/home/agent/.codex/skills:ro
      - ./.agents/active/nova/.nyx:/home/agent/.nyx
      - ./.agents/active/nova/logs:/home/agent/logs
      - ./.agents/active/manifest.json:/home/agent/.nyx/manifest.json:ro
      - .:/home/agent/workspace

  kira:
    image: nyx-agent:latest
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      AGENT_NAME: kira
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GH_REPO: skthomasjr/autonomous-agent
      GH_TOKEN: ${GITHUB_TOKEN_AUTONOMOUS_AGENT}
    volumes:
      - ./.agents/active/kira/.claude:/home/agent/.claude
      - ./.agents/active/kira/.nyx/AGENTS.md:/home/agent/.claude/CLAUDE.md:ro
      - ./.agents/active/kira/.nyx/skills:/home/agent/.claude/skills:ro
      - ./.agents/active/kira/.codex:/home/agent/.codex
      - ./.agents/active/kira/.nyx/AGENTS.md:/home/agent/.codex/AGENTS.md:ro
      - ./.agents/active/kira/.nyx/skills:/home/agent/.codex/skills:ro
      - ./.agents/active/kira/.nyx:/home/agent/.nyx
      - ./.agents/active/kira/logs:/home/agent/logs
      - ./.agents/active/manifest.json:/home/agent/.nyx/manifest.json:ro
      - .:/home/agent/workspace
