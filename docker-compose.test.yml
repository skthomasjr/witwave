services:
  bob:
    image: nyx-agent:latest
    restart: "no"
    ports:
      - "8099:8000"
    environment:
      AGENT_NAME: bob
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      GH_REPO: skthomasjr/autonomous-agent
      GH_TOKEN: ${GITHUB_TOKEN_AUTONOMOUS_AGENT}
      METRICS_ENABLED: "true"
      WEBHOOK_TEST_HOST: "bob:8000"
      WEBHOOK_TEST_TOKEN: "test-token-abc123"
    volumes:
      - .:/home/agent/workspace
      - ./.agents/test/manifest.json:/home/agent/manifest.json:ro
      - ./.agents/test/bob/.nyx:/home/agent/.nyx
      - ./.agents/test/bob/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/test/bob/logs/trace.jsonl:/home/agent/logs/trace.jsonl

  bob-a2-claude:
    build:
      context: .
      dockerfile: a2-claude/Dockerfile
    image: a2-claude:latest
    restart: "no"
    ports:
      - "8090:8080"
    environment:
      AGENT_NAME: bob-a2-claude
      AGENT_OWNER: bob
      AGENT_ID: claude
      AGENT_URL: http://bob-a2-claude:8080
      AGENT_MD: /home/agent/agent.md
      BACKEND_PORT: 8080
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      CLAUDE_CONFIG_DIR: /home/agent/memory
      METRICS_ENABLED: "true"
    volumes:
      - .:/home/agent/workspace
      - ./.agents/test/bob/.claude/mcp.json:/home/agent/.claude/mcp.json
      - ./.agents/test/bob/.claude/settings.json:/home/agent/.claude/settings.json
      - ./.agents/test/bob/.nyx/agent-card.md:/home/agent/agent.md:ro
      - ./.agents/test/bob/.nyx/AGENTS.md:/home/agent/.claude/CLAUDE.md:ro
      - ./.agents/test/bob/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/test/bob/logs/trace.jsonl:/home/agent/logs/trace.jsonl
      - ./.claude/skills:/home/agent/.claude/skills

  bob-a2-codex:
    build:
      context: .
      dockerfile: a2-codex/Dockerfile
    image: a2-codex:latest
    restart: "no"
    ports:
      - "8091:8080"
    environment:
      AGENT_NAME: bob-a2-codex
      AGENT_OWNER: bob
      AGENT_ID: codex
      AGENT_URL: http://bob-a2-codex:8080
      AGENT_MD: /home/agent/agent.md
      BACKEND_PORT: 8080
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      METRICS_ENABLED: "true"
    volumes:
      - .:/home/agent/workspace
      - ./.agents/test/bob/.codex/config.toml:/home/agent/.codex/config.toml
      - ./.agents/test/bob/.nyx/agent-card.md:/home/agent/agent.md:ro
      - ./.agents/test/bob/.nyx/AGENTS.md:/home/agent/.codex/AGENTS.md:ro
      - ./.agents/test/bob/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/test/bob/logs/trace.jsonl:/home/agent/logs/trace.jsonl
      - ./.claude/skills:/home/agent/.codex/skills

  bob-a2-gemini:
    build:
      context: .
      dockerfile: a2-gemini/Dockerfile
    image: a2-gemini:latest
    restart: "no"
    ports:
      - "8092:8080"
    environment:
      AGENT_NAME: bob-a2-gemini
      AGENT_OWNER: bob
      AGENT_ID: gemini
      AGENT_URL: http://bob-a2-gemini:8080
      AGENT_MD: /home/agent/agent.md
      BACKEND_PORT: 8080
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      METRICS_ENABLED: "true"
    volumes:
      - .:/home/agent/workspace
      - ./.agents/test/bob/.nyx/agent-card.md:/home/agent/agent.md:ro
      - ./.agents/test/bob/.nyx/AGENTS.md:/home/agent/.gemini/AGENTS.md:ro
      - ./.agents/test/bob/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/test/bob/logs/trace.jsonl:/home/agent/logs/trace.jsonl

  fred:
    image: nyx-agent:latest
    restart: "no"
    ports:
      - "8096:8000"
    environment:
      AGENT_NAME: fred
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      METRICS_ENABLED: "true"
    volumes:
      - .:/home/agent/workspace
      - ./.agents/test/manifest.json:/home/agent/manifest.json:ro
      - ./.agents/test/fred/.nyx:/home/agent/.nyx
      - ./.agents/test/fred/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/test/fred/logs/trace.jsonl:/home/agent/logs/trace.jsonl

  fred-a2-claude:
    image: a2-claude:latest
    restart: "no"
    ports:
      - "8086:8080"
    environment:
      AGENT_NAME: fred-a2-claude
      AGENT_OWNER: fred
      AGENT_ID: claude
      AGENT_URL: http://fred-a2-claude:8080
      AGENT_MD: /home/agent/agent.md
      BACKEND_PORT: 8080
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      CLAUDE_CONFIG_DIR: /home/agent/memory
      METRICS_ENABLED: "true"
    volumes:
      - .:/home/agent/workspace
      - ./.agents/test/fred/.claude/mcp.json:/home/agent/.claude/mcp.json
      - ./.agents/test/fred/.claude/settings.json:/home/agent/.claude/settings.json
      - ./.agents/test/fred/.nyx/agent-card.md:/home/agent/agent.md:ro
      - ./.agents/test/fred/.nyx/AGENTS.md:/home/agent/.claude/CLAUDE.md:ro
      - ./.agents/test/fred/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/test/fred/logs/trace.jsonl:/home/agent/logs/trace.jsonl
      - ./.claude/skills:/home/agent/.claude/skills

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: "no"
    ports:
      - "3001:80"
