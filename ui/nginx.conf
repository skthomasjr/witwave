server {
    # Listen on 8080 so the container can run as a non-root user (#beta.32).
    # The Service still exposes port 80 externally; the chart maps Service
    # port 80 -> container port 8080.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files.
    # CORS headers are intentionally scoped to this location block so that
    # any future location blocks (e.g. API proxy routes) do not silently
    # inherit the CORS policy for static assets.
    #
    # UI_CORS_ALLOW_ORIGIN is injected at container startup via envsubst
    # (nginx:alpine processes /etc/nginx/templates/*.template automatically).
    # Override at deploy time to restrict to a known origin, e.g.:
    #   UI_CORS_ALLOW_ORIGIN=https://ui.example.com
    # The default "*" allows any browser to load the static assets, which is
    # appropriate for a public UI.  If API routes are ever added to this nginx
    # config, they must use their own CORS policy — not inherit this one.
    location / {
        try_files $uri $uri/ /index.html;

        add_header Access-Control-Allow-Origin "${UI_CORS_ALLOW_ORIGIN}";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        # UI_CONNECT_SRC scopes CSP connect-src — override at deploy time to
        # restrict browser XHR/fetch targets (e.g. "'self' https://nyx.example.com")
        # instead of the permissive wildcard default (#429).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src ${UI_CONNECT_SRC}; img-src 'self' data:; frame-ancestors 'none';";
        # Defense-in-depth headers recommended by MDN / OWASP (#429). These are
        # independent of CSP and block common clickjacking / MIME-sniffing /
        # referrer-leak attacks on older browsers and crawler chains.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
