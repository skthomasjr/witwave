<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nyx</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" integrity="sha384-JUh163oCRItcbPme8pYnROHQMC6fNKTBWtRG3I3I0erJkzNgL7uxKlNwcrcFKeqF" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js" integrity="sha384-pcBjnGbkyKeOXaoFkmJiuR9E08/6gkmus6/Strimnxtl3uk0Hx23v345pWyC/MMr" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #262626;
      --muted:   #444;
      --dim:     #777;
      --text:    #d4d4d4;
      --bright:  #f0f0f0;
      --accent:  #7c6af7;
      --teal:    #3ecfcf;
      --green:   #4ade80;
      --yellow:  #fbbf24;
      --red:     #f87171;
      --radius:  6px;
      --mono:    'SF Mono','Fira Code','Menlo',monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; }

    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 16px;
      padding: 0 18px; height: 46px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1rem; letter-spacing: .25em; color: var(--bright); }
    .spacer { flex: 1; }
    #hdr-status { font-size: 11px; color: var(--dim); }
    #hdr-status.ok::before { content: '● '; color: var(--green); }
    #hdr-status.err::before { content: '● '; color: var(--red); }

    nav { display: flex; gap: 2px; }
    nav button {
      background: none; border: none; cursor: pointer;
      padding: 5px 13px; border-radius: var(--radius);
      color: var(--dim); font-family: var(--mono); font-size: 12px;
      letter-spacing: .04em; transition: color .12s, background .12s;
    }
    nav button:hover { color: var(--text); background: var(--surface); }
    nav button.active { color: var(--bright); background: var(--surface); }

    /* ── Views ── */
    main { flex: 1; overflow: hidden; }
    .view { display: none; height: 100%; overflow: hidden; }
    .view.active { display: flex; flex-direction: column; }

    /* ════════════════════════════════════
       METRICS VIEW
    ════════════════════════════════════ */
    #metrics-view { overflow-y: auto; padding: 18px; gap: 18px; }

    .toolbar {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .toolbar label { font-size: 11px; color: var(--dim); }
    .toolbar .ts { font-size: 11px; color: var(--dim); margin-left: auto; }
    .toolbar select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 4px 8px; border-radius: var(--radius); cursor: pointer;
    }
    .toolbar select:focus { outline: none; border-color: var(--accent); }
    .icon-btn {
      background: none; border: 1px solid var(--border); color: var(--dim);
      font-family: var(--mono); font-size: 11px; padding: 4px 10px;
      border-radius: var(--radius); cursor: pointer;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--muted); }

    /* Stat cards */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 13px 15px;
    }
    .stat .lbl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .07em; }
    .stat .val { font-size: 1.45rem; color: var(--bright); margin-top: 5px; line-height: 1; }
    .stat .sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* Chart grid */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 14px;
    }
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 15px;
    }
    .chart-card h3 {
      font-size: 10px; color: var(--dim); text-transform: uppercase;
      letter-spacing: .07em; margin-bottom: 12px;
    }
    .chart-card canvas { max-height: 170px; }

    .placeholder-msg {
      color: var(--muted); font-size: 12px;
      padding: 30px; text-align: center;
      grid-column: 1 / -1;
    }

    /* ════════════════════════════════════
       AGENTS VIEW
    ════════════════════════════════════ */
    #agents-view { flex-direction: row; overflow: hidden; }

    /* Left: scrollable agent cards */
    .agents-left {
      flex: 1; min-width: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .agents-left-scroll {
      flex: 1; overflow-y: auto;
      padding: 14px 12px; display: flex; flex-direction: column; gap: 16px;
    }
    .agents-placeholder { color: var(--muted); font-size: 11px; padding: 20px 10px; text-align: center; }
    .agents-footer {
      flex-shrink: 0; padding: 5px 14px;
      border-top: 1px solid var(--border);
      font-size: 10px; color: #333; letter-spacing: .03em;
      user-select: none;
    }

    /* Named agent group — clickable to select */
    .named-agent {
      display: flex; flex-direction: column; gap: 10px;
    }
    .named-agent.selected > .nyx-card { border-color: var(--accent); }

    .nyx-card { cursor: pointer; }

    /* Right: conversation panel */
    .agents-right {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .agents-right-placeholder {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 11px;
    }

    /* Nyx card */
    .nyx-card {
      background: var(--surface); border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: var(--radius); padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      position: relative;
    }
    .nyx-status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; display: inline-block;
    }
    .nyx-status-dot.up { background: var(--green); }
    .nyx-status-dot.down { background: var(--red); }
    .nyx-status-dot.starting { background: var(--yellow); }
    .ac-badge.nyx { display: inline-flex; align-items: center; gap: 5px; }

    .backends-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }

    /* Backend bubble */
    .backend-bubble {
      cursor: pointer;
    }
    .backend-bubble.active-backend { outline: 2px solid var(--accent); outline-offset: 1px; }
    .backend-bubble {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 20px;
      font-size: 11px; border: 1px solid transparent;
    }
    .backend-bubble .bb-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--muted); }
    .backend-bubble .bb-dot.up { background: var(--green) !important; }
    .backend-bubble .bb-dot.down { background: var(--red) !important; }
    .backend-bubble .bb-label { color: var(--bright); white-space: nowrap; }
    .backend-bubble .bb-id { opacity: .55; font-size: 10px; }

    /* Per-type colors — brand accurate */
    .backend-bubble.claude {
      background: color-mix(in srgb, #DA7756 12%, transparent);
      border-color: color-mix(in srgb, #DA7756 35%, transparent);
    }
    .backend-bubble.claude .bb-dot.up { background: var(--green) !important; }
    .backend-bubble.claude .bb-dot.down { background: var(--red) !important; }
    .backend-bubble.codex {
      background: color-mix(in srgb, #74AA9C 12%, transparent);
      border-color: color-mix(in srgb, #74AA9C 35%, transparent);
    }
    .backend-bubble.codex .bb-dot.up { background: var(--green) !important; }
    .backend-bubble.codex .bb-dot.down { background: var(--red) !important; }
    .backend-bubble.gemini {
      background: color-mix(in srgb, #8E44EC 12%, transparent);
      border-color: color-mix(in srgb, #8E44EC 35%, transparent);
    }
    .backend-bubble.gemini .bb-dot.up { background: var(--green) !important; }
    .backend-bubble.gemini .bb-dot.down { background: var(--red) !important; }
    .backend-bubble.unknown {
      background: color-mix(in srgb, var(--muted) 12%, transparent);
      border-color: color-mix(in srgb, var(--muted) 35%, transparent);
    }

    .ac-header { display: flex; align-items: flex-start; justify-content: flex-end; gap: 10px; }
    .ac-name { font-size: .95rem; color: var(--bright); letter-spacing: .04em; }
    .ac-name.sm { font-size: .82rem; }
    .ac-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: var(--border); color: var(--dim); flex-shrink: 0;
    }
    .ac-badge.nyx { background: color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); }
    .ac-badge.backend { background: color-mix(in srgb, var(--teal) 15%, transparent); color: var(--teal); }
    .ac-desc { font-size: 11px; color: var(--dim); line-height: 1.6; }
    .ac-desc p { margin: 0 0 6px; }
    .ac-desc p:last-child { margin-bottom: 0; }
    .ac-desc h1, .ac-desc h2, .ac-desc h3 { font-size: 11px; color: var(--text); margin: 6px 0 3px; }
    .ac-desc ul, .ac-desc ol { padding-left: 16px; margin: 4px 0; }
    .ac-desc li { margin: 2px 0; }
    .ac-desc code { background: var(--border); border-radius: 3px; padding: 1px 4px; font-size: 10px; }
    .ac-desc a { color: var(--accent); text-decoration: none; }
    .ac-meta { display: flex; flex-direction: column; gap: 3px; }
    .ac-row { display: flex; gap: 8px; align-items: baseline; }
    .ac-label { font-size: 10px; color: var(--muted); width: 56px; flex-shrink: 0; }
    .ac-value { font-size: 11px; color: var(--text); word-break: break-all; }
    .ac-skills { display: flex; flex-wrap: wrap; gap: 4px; }
    .ac-skill { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: var(--border); color: var(--dim); }
    .ac-status { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
    .ac-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .ac-dot.up { background: var(--green); }
    .ac-dot.down { background: var(--red); }

    /* Chat toolbar */
    .chat-toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .chat-toolbar .ct-group { display: flex; align-items: center; gap: 5px; }
    .chat-toolbar .ct-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }
    .chat-toolbar select, .chat-toolbar input[type="text"] {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 4px 8px; border-radius: var(--radius); outline: none;
    }
    .chat-toolbar select:focus, .chat-toolbar input[type="text"]:focus { border-color: var(--accent); }
    .chat-toolbar select { cursor: pointer; }
    .chat-toolbar input[type="text"] { width: 160px; }
    .chat-toolbar input[type="text"].session-input { width: 120px; }

    /* A2A chat panel */
    .agent-chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .agent-chat-thread {
      flex: 1; overflow-y: auto; padding: 12px 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .agent-chat-thread .cm { display: flex; flex-direction: column; gap: 2px; }
    .agent-chat-thread .cm.user { align-items: flex-end; }
    .agent-chat-thread .cm.agent { align-items: flex-start; }
    .agent-chat-thread .cm .role {
      font-size: 9px; color: var(--muted); letter-spacing: .05em;
      text-transform: uppercase; padding: 0 4px;
    }
    .agent-chat-thread .cm .bbl {
      font-size: 11px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
      padding: 7px 11px; border-radius: var(--radius); max-width: 75%;
    }
    .agent-chat-thread .cm.user .bbl { background: var(--accent); color: #fff; }
    .agent-chat-thread .cm.agent .bbl { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .agent-chat-thread .cm.thinking .bbl { color: var(--muted); font-style: italic; }
    .agent-chat-thread .cm.error { align-items: flex-start; }
    .agent-chat-thread .cm.error .bbl { background: color-mix(in srgb, var(--red) 8%, transparent); border: 1px solid color-mix(in srgb, var(--red) 30%, transparent); color: var(--text); }
    .agent-chat-thread .cm.error .err-msg { font-size: 11px; color: var(--red); margin-bottom: 6px; }
    .agent-chat-thread .cm.error .err-detail { margin-top: 6px; border-top: 1px solid color-mix(in srgb, var(--red) 20%, transparent); padding-top: 6px; }
    .agent-chat-thread .cm.error .err-detail summary { font-size: 10px; color: var(--dim); cursor: pointer; letter-spacing: .04em; }
    .agent-chat-thread .cm.error .err-detail summary:hover { color: var(--text); }
    .agent-chat-thread .cm.error pre { font-family: var(--mono); font-size: 10px; color: var(--dim); white-space: pre-wrap; word-break: break-all; margin-top: 6px; }
    .agent-chat-thread .empty-chat { color: var(--muted); font-size: 11px; text-align: center; padding: 24px 0; }
    .agent-chat-input {
      display: flex; gap: 8px; padding: 10px 20px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .agent-chat-input input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 12px;
      padding: 7px 11px; border-radius: var(--radius); outline: none;
    }
    .agent-chat-input input:focus { border-color: var(--accent); }
    .agent-chat-input button {
      background: var(--accent); border: none; color: #fff;
      font-family: var(--mono); font-size: 11px; padding: 7px 16px;
      border-radius: var(--radius); cursor: pointer; flex-shrink: 0;
    }
    .agent-chat-input button:disabled { opacity: .45; cursor: default; }

    /* ════════════════════════════════════
       CONVERSATIONS VIEW
    ════════════════════════════════════ */
    #conversations-view { flex-direction: column; overflow: hidden; }

    .conv-toolbar {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      padding: 8px 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .conv-toolbar input, .conv-toolbar select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 4px 8px; border-radius: var(--radius); outline: none;
    }
    .conv-toolbar input { width: 180px; }
    .conv-toolbar input::placeholder { color: var(--muted); }
    .conv-toolbar input:focus, .conv-toolbar select:focus { border-color: var(--accent); }
    .conv-toolbar select { cursor: pointer; }
    .conv-toolbar .ct-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
    .conv-count { font-size: 10px; color: var(--dim); margin-left: auto; }

    .empty { padding: 30px 14px; text-align: center; color: var(--muted); font-size: 11px; }

    /* Unified feed */
    .conv-feed {
      flex: 1; overflow-y: auto; padding: 12px 20px;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* Session divider */
    .conv-session-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 12px 0 6px;
    }
    .conv-session-divider .div-line { flex: 1; height: 1px; background: var(--border); }
    .conv-session-divider .div-label {
      font-size: 10px; color: var(--muted); white-space: nowrap; letter-spacing: .04em;
    }

    /* Messages — same style as agents chat thread */
    .conv-feed .cm { display: flex; flex-direction: column; gap: 2px; }
    .conv-feed .cm.user { align-items: flex-end; }
    .conv-feed .cm.agent { align-items: flex-start; }
    .conv-feed .cm .role {
      font-size: 9px; color: var(--muted); letter-spacing: .05em;
      text-transform: uppercase; padding: 0 4px;
      transition: color .15s, font-size .15s;
    }
    .conv-feed .cm:hover .role {
      color: var(--text); font-size: 10px;
    }
    .conv-feed .cm .bbl {
      font-size: 11px; line-height: 1.55; word-break: break-word;
      padding: 7px 11px; border-radius: var(--radius); max-width: 75%;
    }
    .conv-feed .cm .bbl > *:first-child { margin-top: 0; }
    .conv-feed .cm .bbl > *:last-child { margin-bottom: 0; }
    .conv-feed .cm .bbl ul, .conv-feed .cm .bbl ol { padding-left: 1.4em; }
    .conv-feed .cm.user .bbl { background: var(--accent); color: #fff; white-space: pre-wrap; }
    .conv-feed .cm.agent .bbl { background: var(--surface); border: 1px solid var(--border); color: var(--text); }

    /* Tool trace rows — inline, same side as agent bubbles */
    .tool-row {
      display: flex; flex-direction: column; gap: 2px; align-items: flex-start;
    }
    .tool-row .role {
      font-size: 9px; color: var(--muted); letter-spacing: .05em;
      text-transform: uppercase; padding: 0 4px;
      transition: color .15s, font-size .15s;
    }
    .tool-row:hover .role {
      color: var(--text); font-size: 10px;
    }
    .tool-row .bbl {
      font-size: 11px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
      padding: 7px 11px; border-radius: var(--radius); max-width: 75%;
      background: var(--surface); border: 1px solid color-mix(in srgb, var(--teal) 35%, transparent);
      color: var(--dim);
    }
    .tool-row .tool-name {
      font-family: var(--mono); color: var(--teal); font-weight: 600;
    }
    .tool-row .tool-args {
      margin-top: 4px; font-size: 10px; color: var(--muted);
      white-space: pre-wrap; word-break: break-all;
    }
    .tool-row.tool-result .bbl {
      border-color: color-mix(in srgb, var(--green) 35%, transparent);
    }
    .tool-row.tool-result .tool-name { color: var(--green); }
    .tool-row.tool-error .bbl {
      border-color: color-mix(in srgb, var(--red) 35%, transparent);
    }
    .tool-row.tool-error .tool-name { color: var(--red); }

    /* ════════════════════════════════════
       CALENDAR VIEW
    ════════════════════════════════════ */
    #calendar-view { flex-direction: column; overflow: hidden; }

    .cal-toolbar {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      padding: 8px 16px; border-bottom: 1px solid var(--border);
    }
    .cal-toolbar .cal-title {
      font-size: 13px; color: var(--bright); font-weight: 600;
      min-width: 160px; text-align: center;
    }
    .cal-nav-btn {
      background: none; border: 1px solid var(--border); color: var(--dim);
      font-family: var(--mono); font-size: 12px; padding: 4px 9px;
      border-radius: var(--radius); cursor: pointer;
    }
    .cal-nav-btn:hover { color: var(--text); border-color: var(--muted); }
    .cal-today-btn {
      background: none; border: 1px solid var(--border); color: var(--dim);
      font-family: var(--mono); font-size: 11px; padding: 4px 10px;
      border-radius: var(--radius); cursor: pointer; margin-right: 4px;
    }
    .cal-today-btn:hover { color: var(--text); border-color: var(--muted); }
    .cal-mode-group {
      display: flex; margin-left: auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2px; gap: 2px;
    }
    .cal-mode-btn {
      background: none; border: none; color: var(--dim);
      font-family: var(--mono); font-size: 11px; padding: 3px 11px;
      border-radius: calc(var(--radius) - 1px); cursor: pointer;
      transition: color .12s;
    }
    .cal-mode-btn.active { background: var(--accent); color: #fff; }
    .cal-mode-btn:hover:not(.active) { color: var(--text); }

    /* Month grid */
    .cal-month { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0; }
    .cal-month-head {
      display: grid; grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .cal-dow {
      padding: 6px 0; text-align: center;
      font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em;
    }
    .cal-month-body {
      flex: 1; display: grid;
      grid-template-rows: repeat(6, 1fr);
      grid-template-columns: repeat(7, 1fr);
      overflow: hidden;
    }
    .cal-day {
      border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
      padding: 5px 7px; position: relative; min-height: 0;
    }
    .cal-day:nth-child(7n) { border-right: none; }
    .cal-day.other-month .cal-day-num { color: var(--muted); }
    .cal-day.today {
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      border-top: 2px solid var(--accent);
    }
    .cal-day.today .cal-day-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #fff; font-weight: 600;
    }
    .cal-day-num { font-size: 11px; color: var(--dim); }
    .cal-day-items { display: flex; flex-direction: column; gap: 2px; margin-top: 3px; overflow: hidden; }
    .cal-item {
      font-size: 10px; border-radius: 3px; padding: 1px 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: default;
    }
    .job-item  { background: color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); }
    .task-item { background: color-mix(in srgb, #a78bfa 20%, transparent); color: #a78bfa; }

    /* Week / Day grid */
    .cal-timed { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .cal-timed-head {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .cal-timed-gutter { width: 54px; flex-shrink: 0; border-right: 1px solid var(--border); }
    .cal-timed-cols { flex: 1; display: flex; }
    .cal-timed-col-hdr {
      flex: 1; text-align: center; padding: 5px 0;
      font-size: 10px; color: var(--dim); border-right: 1px solid var(--border);
    }
    .cal-timed-col-hdr:last-child { border-right: none; }
    .cal-timed-col-hdr .col-dow { text-transform: uppercase; letter-spacing: .05em; }
    .cal-timed-col-hdr .col-num {
      font-size: 18px; color: var(--text); line-height: 1.1; margin-top: 2px;
    }
    .cal-timed-col-hdr .col-num.today {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #fff;
    }
    .cal-timed-body { flex: 1; display: flex; overflow-y: auto; position: relative; }
    .cal-timed-hours {
      width: 54px; flex-shrink: 0; position: relative;
      border-right: 1px solid var(--border);
      min-height: 1152px;
    }
    .cal-hour-label {
      height: 48px; display: flex; align-items: flex-start; justify-content: flex-end;
      padding: 0 6px 0 0; padding-top: 1px;
      font-size: 9px; color: var(--muted); letter-spacing: .03em;
    }
    .cal-timed-events { flex: 1; display: flex; position: relative; }
    .cal-timed-event-col {
      flex: 1; position: relative; border-right: 1px solid var(--border);
      min-height: 1152px; /* 24 × 48px — ensures lines cover full scroll area */
      /* Hour line at bottom of each 48px slot, half-hour line at 24px.
         Using a tiled linear-gradient: stops must be in px matching background-size. */
      background-image: linear-gradient(
        to bottom,
        transparent 0px,
        transparent 23px,
        color-mix(in srgb, var(--border) 60%, transparent) 23px,
        color-mix(in srgb, var(--border) 60%, transparent) 24px,
        transparent 24px,
        transparent 47px,
        var(--border) 47px,
        var(--border) 48px
      );
      background-size: 100% 48px;
      background-repeat: repeat-y;
    }
    .cal-timed-event-col:last-child { border-right: none; }
    /* Timed event blocks (week/day view) */
    .cal-timed-item {
      position: absolute; left: 2px; right: 2px;
      border-radius: 3px; padding: 2px 4px;
      font-size: 10px; overflow: hidden; cursor: default;
      white-space: nowrap; text-overflow: ellipsis; z-index: 2;
    }
    .cal-timed-item.job-item  { background: color-mix(in srgb, var(--accent) 30%, transparent); color: var(--accent); border-left: 2px solid var(--accent); }
    .cal-timed-item.task-item { background: color-mix(in srgb, #a78bfa 30%, transparent); color: #a78bfa; border-left: 2px solid #a78bfa; }

    /* Current time indicator */
    .cal-now-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: var(--red); z-index: 10; pointer-events: none;
    }
    .cal-now-line::before {
      content: ''; position: absolute; left: 6px; top: -4px;
      width: 10px; height: 10px; border-radius: 50%; background: var(--red);
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>

    <!-- Conversations -->

        <span class="ct-label">search</span>

        <select id="conv-agent-filter"><option value="">all</option></select>

          <option value="">all</option>
          <option value="user">user</option>
          <option value="agent">agent</option>
        </select>
        <span class="ct-label">tools</span>
        <select id="conv-tool-filter">
          <option value="show">show</option>
          <option value="hide">hide</option>
        </select>
        <span class="ct-label">limit</span>
        <select id="conv-limit">
          <option value="100">100</option>
          <option value="500" selected>500</option>
          <option value="1000">1000</option>
          <option value="5000">5000</option>
        </select>
        <span class="conv-count" id="conv-count"></span>
      </div>
      <div class="conv-feed" id="conv-feed">
        <div class="empty">Loading…</div>
      </div>
    </div>
  </main>
</div>

<script>
// ── Agent URL ────────────────────────────────────────────────────────────────
// UI on port 3001 → bob (test) on 8099
// UI on port 3000 → active on 8000
// Override with window.NYX_AGENT_URL if needed
const AGENT_BASE = (() => {
  if (window.NYX_AGENT_URL) return window.NYX_AGENT_URL.replace(/\/$/, '');
  const h = window.location.hostname;
  const p = window.location.port;
  const agentPort = p === '3001' ? '8099' : '8000';
  return `${window.location.protocol}//${h}:${agentPort}`;
})();

// ── Nav ──────────────────────────────────────────────────────────────────────
const viewEls = {
  agents: document.getElementById('agents-view'),
  conversations: document.getElementById('conversations-view'),
  calendar: document.getElementById('calendar-view'),
  metrics: document.getElementById('metrics-view'),
};
function switchView(name) {
  const btn = document.querySelector(`nav button[data-view="${name}"]`);
  if (!btn || !viewEls[name]) return;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  Object.values(viewEls).forEach(v => v.classList.remove('active'));
  viewEls[name].classList.add('active');
  localStorage.setItem('nyx-active-view', name);
  if (name === 'conversations' && !conv.loaded) loadConversations();
  if (name === 'calendar') loadCalendarData();
  if (name === 'metrics') {
    if (!_metricsLoaded) { _metricsLoaded = true; loadMetrics(); }
    setRefreshInterval(Number(document.getElementById('refresh-interval').value) || 30_000);
  } else {
    if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }
  }
  if (name !== 'calendar') {
    if (_calNowTimer) { clearInterval(_calNowTimer); _calNowTimer = null; }
  }
}

document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});


function setStatus(msg, ok) {
  const el = document.getElementById('hdr-status');
  el.textContent = msg;
  el.className = ok === true ? 'ok' : ok === false ? 'err' : '';
}

// ════════════════════════════════════════════════════════════════════════════
// Prometheus text parser
// ════════════════════════════════════════════════════════════════════════════
function parsePrometheus(text) {
  // Returns Map<familyName, {help, type, samples: [{name, labels, value}]}>
  const out = new Map();
  const SUFFIXES = ['_bucket','_count','_sum','_total','_created','_info'];

  function family(name) {
    for (const s of SUFFIXES) if (name.endsWith(s)) return name.slice(0, -s.length);
    return name;
  }

  for (const line of text.split('\n')) {
    const t = line.trim();
    if (!t) continue;
    if (t.startsWith('# HELP ')) {
      const m = t.match(/^# HELP (\S+) (.*)$/);
      if (m) {
        const f = family(m[1]);
        if (!out.has(f)) out.set(f, { help: m[2], type: '', samples: [] });
        else if (!out.get(f).help) out.get(f).help = m[2];
      }
    } else if (t.startsWith('# TYPE ')) {
      const m = t.match(/^# TYPE (\S+) (\S+)$/);
      if (m) {
        const f = family(m[1]);
        if (!out.has(f)) out.set(f, { help: '', type: m[2], samples: [] });
        else out.get(f).type = m[2];
      }
    } else if (!t.startsWith('#')) {
      const m = t.match(/^([a-zA-Z_:][a-zA-Z0-9_:]*)(\{[^}]*\})?\s+(-?[0-9.+eEinfa]+)/);
      if (!m) continue;
      const name = m[1], lblStr = m[2] || '', val = parseFloat(m[3]);
      if (isNaN(val)) continue;
      const labels = {};
      for (const lm of lblStr.matchAll(/(\w+)="([^"]*)"/g)) labels[lm[1]] = lm[2];
      const f = family(name);
      if (!out.has(f)) out.set(f, { help: '', type: '', samples: [] });
      out.get(f).samples.push({ name, labels, value: val });
    }
  }
  return out;
}

// ── Metric helpers ───────────────────────────────────────────────────────────
function scalarGauge(metrics, key) {
  // Single gauge without labels (or pick first sample)
  const s = metrics.get(key)?.samples || [];
  return s.length ? s[0].value : null;
}

function sumTotal(metrics, key) {
  // Sum all _total samples
  return (metrics.get(key)?.samples || [])
    .filter(s => s.name.endsWith('_total'))
    .reduce((a, s) => a + s.value, 0);
}

function histAvg(metrics, key) {
  const samples = metrics.get(key)?.samples || [];
  const sum = samples.filter(s => s.name.endsWith('_sum')).reduce((a, s) => a + s.value, 0);
  const cnt = samples.filter(s => s.name.endsWith('_count')).reduce((a, s) => a + s.value, 0);
  return cnt > 0 ? sum / cnt : null;
}

function breakdownByLabel(metrics, key, labelName, onlySuffix = '_total') {
  // Returns {labelValue: summedValue}
  const result = {};
  for (const s of (metrics.get(key)?.samples || [])) {
    if (onlySuffix && !s.name.endsWith(onlySuffix)) continue;
    const lv = s.labels[labelName] || '(none)';
    result[lv] = (result[lv] || 0) + s.value;
  }
  return result;
}

// ── Formatting ────────────────────────────────────────────────────────────────
function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  if (n === Math.floor(n)) return String(n);
  return n.toFixed(2);
}
function fmtMs(n) { return n === null ? '—' : Math.round(n * 1000) + ' ms'; }
function fmtSec(n) { return n === null ? '—' : Math.round(n) + ' s'; }

// ── Chart.js defaults ─────────────────────────────────────────────────────────
Chart.defaults.color = '#777';
Chart.defaults.borderColor = '#262626';
Chart.defaults.font.family = "'SF Mono','Fira Code',monospace";
Chart.defaults.font.size = 11;

const PALETTE = ['#7c6af7','#3ecfcf','#4ade80','#fbbf24','#f87171','#fb923c','#a78bfa','#34d399'];
const charts = {};

function upsertChart(id, type, labels, data, opts = {}) {
  const canvas = document.getElementById('chart-' + id);
  if (!canvas) return;
  if (charts[id]) {
    const colors = labels.map((_, i) => PALETTE[i % PALETTE.length]);
    charts[id].data.labels = labels;
    charts[id].data.datasets[0].data = data;
    charts[id].data.datasets[0].backgroundColor = type === 'doughnut' ? colors : colors.map(c => c + 'bb');
    charts[id].data.datasets[0].borderColor = type === 'doughnut' ? colors : colors;
    charts[id].update('none');
    return;
  }
  const colors = labels.map((_, i) => PALETTE[i % PALETTE.length]);
  charts[id] = new Chart(canvas.getContext('2d'), {
    type,
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: type === 'doughnut' ? colors : colors.map(c => c + 'bb'),
        borderColor: type === 'doughnut' ? colors : colors,
        borderWidth: type === 'doughnut' ? 0 : 1,
        borderRadius: type === 'bar' ? 3 : 0,
        ...opts.dataset,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, animation: false,
      plugins: {
        legend: { display: type === 'doughnut', position: 'right', labels: { boxWidth: 10, padding: 8, font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ` ${fmtNum(ctx.raw)}` } },
      },
      scales: type !== 'doughnut' ? {
        x: { grid: { color: '#1a1a1a' }, ticks: { maxRotation: 40, minRotation: 0 } },
        y: { grid: { color: '#1a1a1a' }, beginAtZero: true },
      } : undefined,
      ...opts.chart,
    }
  });
}

function ensureCard(id, title) {
  if (document.getElementById('card-' + id)) return;
  const grid = document.getElementById('chart-grid');
  const card = document.createElement('div');
  card.className = 'chart-card'; card.id = 'card-' + id;
  card.innerHTML = `<h3>${title}</h3><canvas id="chart-${id}"></canvas>`;
  grid.appendChild(card);
}

// ── Render metrics ────────────────────────────────────────────────────────────
function renderMetrics(m) {
  // ── Stat cards ──────────────────────────────────────────────────────────
  const uptime = scalarGauge(m, 'agent_uptime_seconds');
  const activeSessions = scalarGauge(m, 'agent_active_sessions');
  const runningTasks = scalarGauge(m, 'agent_running_tasks');
  const tasksTotal = sumTotal(m, 'agent_tasks');
  const a2aReqs = sumTotal(m, 'agent_a2a_requests');
  const heartbeatRuns = sumTotal(m, 'agent_heartbeat_runs');
  const jobRuns = sumTotal(m, 'agent_job_runs');
  const busMessages = sumTotal(m, 'agent_bus_messages');
  const runningSchedTasks = scalarGauge(m, 'agent_sched_task_running_items');
  const webhooksShed = sumTotal(m, 'agent_webhooks_delivery_shed');

  const statDefs = [
    { label: 'Uptime',               val: fmtSec(uptime) },
    { label: 'Active Sessions',      val: fmtNum(activeSessions) },
    { label: 'Running Tasks',        val: fmtNum(runningTasks) },
    { label: 'Running Sched Tasks',  val: fmtNum(runningSchedTasks) },
    { label: 'Tasks Total',          val: fmtNum(tasksTotal) },
    { label: 'A2A Requests',         val: fmtNum(a2aReqs) },
    { label: 'Heartbeats',           val: fmtNum(heartbeatRuns) },
    { label: 'Job Runs',             val: fmtNum(jobRuns) },
    { label: 'Bus Messages',         val: fmtNum(busMessages) },
    { label: 'Webhooks Shed',        val: fmtNum(webhooksShed) },
  ];

  document.getElementById('stat-row').innerHTML = statDefs.map(s =>
    `<div class="stat"><div class="lbl">${s.label}</div><div class="val">${s.val}</div></div>`
  ).join('');

  // ── Charts ───────────────────────────────────────────────────────────────
  document.getElementById('chart-placeholder').style.display = 'none';

  // Tasks by outcome
  (() => {
    const bd = breakdownByLabel(m, 'agent_tasks', 'status');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('tasks-outcome', 'Tasks by Outcome');
    upsertChart('tasks-outcome', 'bar', labels, data);
  })();

  // A2A requests by outcome
  (() => {
    const bd = breakdownByLabel(m, 'agent_a2a_requests', 'status');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('a2a-outcome', 'A2A Requests by Outcome');
    upsertChart('a2a-outcome', 'bar', labels, data);
  })();

  // Heartbeat runs by outcome
  (() => {
    const bd = breakdownByLabel(m, 'agent_heartbeat_runs', 'status');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('hb-outcome', 'Heartbeat Runs by Outcome');
    upsertChart('hb-outcome', 'bar', labels, data);
  })();

  // Job runs by name
  (() => {
    const bd = breakdownByLabel(m, 'agent_job_runs', 'name');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('job-runs', 'Job Runs by Name');
    upsertChart('job-runs', 'bar', labels, data);
  })();

  // Task runs by name
  (() => {
    const bd = breakdownByLabel(m, 'agent_sched_task_runs', 'name');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('task-runs', 'Task Runs by Name');
    upsertChart('task-runs', 'bar', labels, data);
  })();

  // Bus messages by kind
  (() => {
    const bd = breakdownByLabel(m, 'agent_bus_messages', 'kind');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('bus-kind', 'Bus Messages by Kind');
    upsertChart('bus-kind', 'doughnut', labels, data);
  })();

  // A2A request duration avg
  (() => {
    const avg = histAvg(m, 'agent_a2a_request_duration_seconds');
    if (avg === null) return;
    ensureCard('a2a-dur', 'A2A Avg Request Duration');
    document.getElementById('card-a2a-dur').querySelector('h3').textContent =
      `A2A Avg Request Duration: ${fmtMs(avg)}`;
    // Show histogram buckets as bar chart
    const samples = (m.get('agent_a2a_request_duration_seconds')?.samples || [])
      .filter(s => s.name.endsWith('_bucket') && s.labels.le !== '+Inf');
    if (!samples.length) return;
    const labels = samples.map(s => s.labels.le + 's');
    const data = samples.map(s => s.value);
    upsertChart('a2a-dur', 'bar', labels, data);
  })();

  // Model requests
  (() => {
    const bd = breakdownByLabel(m, 'agent_model_requests', 'model');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('model-reqs', 'Requests by Model');
    upsertChart('model-reqs', 'doughnut', labels, data);
  })();

  // Trigger requests by endpoint
  (() => {
    const bd = breakdownByLabel(m, 'agent_triggers_requests', 'code');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('trigger-codes', 'Trigger Requests by Response Code');
    upsertChart('trigger-codes', 'bar', labels, data);
  })();

  // Webhook deliveries
  (() => {
    const bd = breakdownByLabel(m, 'agent_webhooks_delivery', 'result');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('webhooks', 'Webhook Deliveries by Result');
    upsertChart('webhooks', 'bar', labels, data);
  })();

  // Continuation runs
  (() => {
    const bd = breakdownByLabel(m, 'agent_continuation_runs', 'status');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('cont-runs', 'Continuation Runs by Outcome');
    upsertChart('cont-runs', 'bar', labels, data);
  })();

  // Task restarts (nyx-harness)
  (() => {
    const bd = breakdownByLabel(m, 'agent_task_restarts', 'task');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('task-restarts', 'Agent Task Restarts by Task');
    upsertChart('task-restarts', 'bar', labels, data);
  })();

  // Webhook deliveries shed
  (() => {
    const bd = breakdownByLabel(m, 'agent_webhooks_delivery_shed', 'subscription');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('webhooks-shed', 'Webhook Deliveries Shed by Subscription');
    upsertChart('webhooks-shed', 'bar', labels, data);
  })();

  // --- a2_ backend metrics (if backends have been called) ---

  // Backend task duration avg
  (() => {
    const avg = histAvg(m, 'a2_task_duration_seconds');
    if (avg === null) return;
    ensureCard('a2-task-dur', `Backend Avg Task Duration: ${fmtMs(avg)}`);
    const samples = (m.get('a2_task_duration_seconds')?.samples || [])
      .filter(s => s.name.endsWith('_bucket') && s.labels.le !== '+Inf');
    if (!samples.length) return;
    upsertChart('a2-task-dur', 'bar', samples.map(s => s.labels.le + 's'), samples.map(s => s.value));
  })();

  // Backend query duration by backend
  (() => {
    const samples = m.get('a2_sdk_query_duration_seconds')?.samples || [];
    const byBackend = {};
    for (const s of samples) {
      const k = s.labels.backend || s.labels.agent_id || 'unknown';
      byBackend[k] = byBackend[k] || { sum: 0, cnt: 0 };
      if (s.name.endsWith('_sum')) byBackend[k].sum += s.value;
      if (s.name.endsWith('_count')) byBackend[k].cnt += s.value;
    }
    const labels = Object.keys(byBackend);
    if (!labels.length) return;
    const data = labels.map(k => byBackend[k].cnt > 0 ? (byBackend[k].sum / byBackend[k].cnt) * 1000 : 0);
    ensureCard('a2-query-dur', 'Backend Avg Query Duration (ms)');
    upsertChart('a2-query-dur', 'bar', labels, data);
  })();

  // Tool calls
  (() => {
    const bd = breakdownByLabel(m, 'a2_sdk_tool_calls', 'tool');
    const sorted = Object.entries(bd).sort((a, b) => b[1] - a[1]).slice(0, 12);
    if (!sorted.length) return;
    ensureCard('tool-calls', 'Tool Calls by Tool (top 12)');
    upsertChart('tool-calls', 'bar', sorted.map(e => e[0]), sorted.map(e => e[1]));
  })();

  // Backend task restarts
  (() => {
    const bd = breakdownByLabel(m, 'a2_task_restarts', 'task');
    const labels = Object.keys(bd), data = Object.values(bd);
    if (!labels.length) return;
    ensureCard('a2-task-restarts', 'Backend Task Restarts by Task');
    upsertChart('a2-task-restarts', 'bar', labels, data);
  })();
}

// ════════════════════════════════════════════════════════════════════════════
// AGENTS
// ════════════════════════════════════════════════════════════════════════════

let _agentTeam = [];
let _selectedAgent = null;
let _chatThread = null;
let _chatInput = null;
let _chatSendBtn = null;

async function loadAgents(isRefresh = false) {
  try {
    const r = await fetch(`${AGENT_BASE}/team`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const team = await r.json();
    if (isRefresh && _agentTeam) {
      refreshAgentCards(team);
    } else {
      _agentTeam = team;
      renderAgentCards(_agentTeam);
      // Restore previously selected agent after initial load
      const saved = _savedAgentSelection();
      if (saved && saved.agentName) {
        const member = team.find(m => m.name === saved.agentName);
        if (member) {
          const left = document.getElementById('agents-left');
          left.querySelectorAll('.named-agent').forEach((g, i) => {
            if (team[i] && team[i].name === saved.agentName) g.classList.add('selected');
          });
          selectAgent(member);
          // Restore backend selection after panel is built
          if (saved.backendId) {
            const sel = document.getElementById('chat-backend-select');
            if (sel) { sel.value = saved.backendId; sel.dispatchEvent(new Event('change')); }
          }
        }
      }
    }
    _agentTeam = team;
    const footer = document.getElementById('agents-footer');
    if (footer) footer.textContent = 'updated ' + new Date().toLocaleTimeString();
    setStatus('connected', true);
  } catch (e) {
    if (!isRefresh) {
      document.getElementById('agents-placeholder').textContent =
        `Could not load: ${e.message}`;
    }
    setStatus(`unreachable — ${AGENT_BASE}`, false);
  }
}

function refreshAgentCards(team) {
  const left = document.getElementById('agents-left');
  team.forEach((member, i) => {
    const group = left.querySelector(`.named-agent[data-idx="${i}"]`);
    if (!group) return; // new agent appeared — will be handled on next full render

    const agents = member.agents || [];
    const nyx = agents.find(a => a.role === 'nyx');
    const backends = agents.filter(a => a.role === 'backend');
    const reachable = nyx && !!nyx.card;

    // Update nyx status dot
    const nyxDot = group.querySelector('.nyx-status-dot');
    if (nyxDot) {
      nyxDot.className = `nyx-status-dot ${reachable ? 'up' : 'down'}`;
      nyxDot.title = reachable ? 'online' : 'offline';
    }

    // Update description if changed
    const f = nyx ? agentCardFields(nyx) : null;
    if (f && f.desc) {
      const descEl = group.querySelector('.ac-desc');
      const newDesc = DOMPurify.sanitize(marked.parse(f.desc));
      if (descEl && descEl.innerHTML !== newDesc) descEl.innerHTML = newDesc;
    }

    // Update backend bubble dots
    backends.forEach(b => {
      const bubble = group.querySelector(`.backend-bubble[title="${CSS.escape(b.url || '')}"] .bb-dot, .backend-bubble .bb-dot`);
      // match by label text instead
      group.querySelectorAll('.backend-bubble').forEach(el => {
        const label = el.querySelector('.bb-label');
        if (label && label.textContent === b.id) {
          const dot = el.querySelector('.bb-dot');
          if (dot) dot.className = `bb-dot ${!!b.card ? 'up' : 'down'}`;
        }
      });
    });

    // If this member is currently selected, refresh the backend dropdown model if models changed
    if (_selectedAgent && _selectedAgent.name === member.name) {
      _selectedAgent = member;
    }
  });

  // If team size changed, do a full re-render
  if (team.length !== left.querySelectorAll('.named-agent').length) {
    _agentTeam = team;
    renderAgentCards(team);
    // Re-apply selected highlight after full re-render
    if (_selectedAgent) {
      left.querySelectorAll('.named-agent').forEach((g, i) => {
        if (team[i] && team[i].name === _selectedAgent.name) g.classList.add('selected');
      });
    }
  }
}

function agentCardFields(a) {
  const card = a.card || {};
  return {
    name: card.name || a.id,
    desc: (card.description || '').trim(),
    version: card.version || '',
    url: card.url || a.url || '',
    proto: card.protocolVersion || '',
    skills: card.skills || [],
    caps: Object.entries(card.capabilities || {}).filter(([, v]) => v === true).map(([k]) => k),
    reachable: !!a.card,
  };
}

function renderMeta(fields, compact = false) {
  const { url, version, proto, caps, skills, reachable } = fields;
  const capsStr = caps.join(', ');
  return `
    <div class="ac-meta">
      ${url ? `<div class="ac-row"><span class="ac-label">url</span><span class="ac-value">${escHtml(url)}</span></div>` : ''}
      ${version ? `<div class="ac-row"><span class="ac-label">version</span><span class="ac-value">${escHtml(version)}</span></div>` : ''}
      ${!compact && proto ? `<div class="ac-row"><span class="ac-label">protocol</span><span class="ac-value">${escHtml(proto)}</span></div>` : ''}
      ${!compact && capsStr ? `<div class="ac-row"><span class="ac-label">caps</span><span class="ac-value">${escHtml(capsStr)}</span></div>` : ''}
    </div>
  `;
}

function backendType(id) {
  const s = (id || '').toLowerCase();
  if (s.includes('claude')) return 'claude';
  if (s.includes('codex') || s.includes('openai') || s.includes('gpt')) return 'codex';
  if (s.includes('gemini') || s.includes('google')) return 'gemini';
  return 'unknown';
}

// ── Left: agent cards ─────────────────────────────────────────────────────────

function renderAgentCards(team) {
  const left = document.getElementById('agents-left');
  document.getElementById('agents-placeholder').style.display = 'none';

  if (!team.length) {
    left.innerHTML = '<div class="agents-placeholder">No agents found.</div>';
    return;
  }

  left.innerHTML = '';
  team.forEach((member, i) => {
    const agents = member.agents || [];
    const nyx = agents.find(a => a.role === 'nyx');
    const backends = agents.filter(a => a.role === 'backend');
    const reachable = nyx && !!nyx.card;

    const group = document.createElement('div');
    group.className = 'named-agent';
    group.dataset.idx = i;

    let backendsHtml = '';
    if (backends.length) {
      backendsHtml = `<div class="backends-row">`;
      for (const b of backends) {
        const type = backendType(b.id);
        const reachableB = !!b.card;
        const agentName = (b.card && b.card.name) ? b.card.name : b.id;
        backendsHtml += `<div class="backend-bubble ${type}" data-backend-id="${escHtml(b.id)}" title="${escHtml(b.url || '')}">
          <div class="bb-dot ${reachableB ? 'up' : 'down'}"></div>
          <span class="bb-label">${escHtml(b.id)}</span>
          <span class="bb-id">/ ${escHtml(agentName)}</span>
        </div>`;
      }
      backendsHtml += `</div>`;
    }

    let html = '';
    if (!reachable && member.error) {
      html = `<div class="nyx-card">
        <div class="ac-header">
          <div class="ac-name">${escHtml(member.name || member.url)}</div>
          <span class="ac-badge nyx">nyx</span>
        </div>
        <div class="ac-status"><div class="ac-dot down"></div><span>unreachable</span></div>
      </div>`;
    } else if (nyx) {
      const f = agentCardFields(nyx);
      html = `<div class="nyx-card">
        <div class="ac-header">
          <span class="ac-badge nyx"><div class="nyx-status-dot ${reachable ? 'up' : 'down'}" title="${reachable ? 'online' : 'offline'}"></div>${escHtml(member.name || f.name)}</span>
        </div>
        ${f.desc ? `<div class="ac-desc">${DOMPurify.sanitize(marked.parse(f.desc))}</div>` : ''}
        ${backendsHtml}
      </div>`;
    }

    group.innerHTML = html;

    const nyxCard = group.querySelector('.nyx-card');
    if (nyxCard) nyxCard.addEventListener('click', () => {
      left.querySelectorAll('.named-agent').forEach(g => g.classList.remove('selected'));
      group.classList.add('selected');
      selectAgent(member);
    });

    // Backend bubble clicks: select agent (if not already) then sync the dropdown
    group.querySelectorAll('.backend-bubble[data-backend-id]').forEach(bubble => {
      bubble.addEventListener('click', e => {
        e.stopPropagation();
        const bid = bubble.dataset.backendId;
        const alreadySelected = group.classList.contains('selected');
        left.querySelectorAll('.named-agent').forEach(g => g.classList.remove('selected'));
        group.classList.add('selected');
        if (!alreadySelected) selectAgent(member);
        // Sync dropdown to this backend
        const sel = document.getElementById('chat-backend-select');
        if (sel && sel.value !== bid) {
          sel.value = bid;
          sel.dispatchEvent(new Event('change'));
        }
      });
    });

    left.appendChild(group);
  });
}

// ── Right: conversation panel ─────────────────────────────────────────────────

let _selectedBackendId = null;
let _chatSessionId = null;
const _sessionMap = {};   // "agentName|backendId" → sessionId
const _panelCache = {};   // agentName → { threadHtml, backendId }

function _sessionKey(agentName, backendId) {
  return `${agentName}|${backendId}`;
}

function _getOrCreateSession(agentName, backendId) {
  const key = _sessionKey(agentName, backendId);
  if (!_sessionMap[key]) _sessionMap[key] = a2aTaskId();
  return _sessionMap[key];
}

// ── localStorage persistence ──────────────────────────────────────────────────
function _saveAgentState() {
  try {
    localStorage.setItem('nyx-harness-selection', JSON.stringify({
      agentName: _selectedAgent ? _selectedAgent.name : null,
      backendId: _selectedBackendId,
    }));
    localStorage.setItem('nyx-panel-cache', JSON.stringify(_panelCache));
    localStorage.setItem('nyx-session-map', JSON.stringify(_sessionMap));
  } catch (e) { /* localStorage full or unavailable */ }
}

function _loadAgentState() {
  try {
    const cache = localStorage.getItem('nyx-panel-cache');
    if (cache) Object.assign(_panelCache, JSON.parse(cache));
    const sessions = localStorage.getItem('nyx-session-map');
    if (sessions) Object.assign(_sessionMap, JSON.parse(sessions));
  } catch (e) {}
}

function _savedAgentSelection() {
  try {
    const s = localStorage.getItem('nyx-harness-selection');
    return s ? JSON.parse(s) : null;
  } catch (e) { return null; }
}

function syncBubbleHighlight(bid) {
  const left = document.getElementById('agents-left');
  left.querySelectorAll('.backend-bubble').forEach(el => el.classList.remove('active-backend'));
  left.querySelectorAll('.named-agent.selected .backend-bubble').forEach(el => {
    el.classList.toggle('active-backend', el.dataset.backendId === bid);
  });
}

function _buildAgentPanel(agentName, backends, right) {
  const defaultModel = backends.length ? (backends[0].model || '') : '';
  const backendOptions = backends.map((b, i) => {
    const label = b.id + ' / ' + ((b.card && b.card.name) ? b.card.name : b.id);
    return `<option value="${escHtml(b.id)}" ${i === 0 ? 'selected' : ''}>${escHtml(label)}</option>`;
  }).join('');

  right.innerHTML = `<div class="agent-chat" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;">
    <div class="chat-toolbar">
      <div class="ct-group">
        <span class="ct-label">backend agent</span>
        <select id="chat-backend-select">${backendOptions}</select>
      </div>
      <div class="ct-group">
        <span class="ct-label">model</span>
        <input type="text" id="chat-model-input" value="${escHtml(defaultModel)}" placeholder="default" />
      </div>
      <button class="icon-btn" id="chat-clear-btn" style="margin-left:auto">clear</button>
    </div>
    <div class="agent-chat-thread"><div class="empty-chat">Send a message to start.</div></div>
    <div class="agent-chat-input">
      <input type="text" placeholder="Message ${escHtml(agentName || 'agent')}…" />
      <button>send</button>
    </div>
  </div>`;

  _chatThread = right.querySelector('.agent-chat-thread');
  _chatInput = right.querySelector('.agent-chat-input input');
  _chatSendBtn = right.querySelector('.agent-chat-input button');

  const clearBtn = right.querySelector('#chat-clear-btn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (_chatThread) _chatThread.innerHTML = '<div class="empty-chat">Send a message to start.</div>';
    });
  }

  const backendSel = right.querySelector('#chat-backend-select');
  if (backendSel) {
    backendSel.addEventListener('change', () => {
      _selectedBackendId = backendSel.value;
      _chatSessionId = _getOrCreateSession(agentName, _selectedBackendId);
      const b = backends.find(x => x.id === _selectedBackendId);
      const modelInput = right.querySelector('#chat-model-input');
      if (modelInput && b) modelInput.value = b.model || '';
      syncBubbleHighlight(_selectedBackendId);
    });
  }

  _chatSendBtn.addEventListener('click', () => doSend(agentName));
  _chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(agentName); }
  });
}

function selectAgent(member) {
  const agentName = member.name;
  const backends = (member.agents || []).filter(a => a.role === 'backend');
  const right = document.getElementById('agents-right');
  const prevName = _selectedAgent ? _selectedAgent.name : null;

  // Save current panel into cache before switching away
  if (prevName && prevName !== agentName && right.firstElementChild) {
    const liveThread = right.querySelector('.agent-chat-thread');
    _panelCache[prevName] = {
      threadHtml: liveThread ? liveThread.innerHTML : '',
      backendId: _selectedBackendId,
    };
    _saveAgentState();
  }

  _selectedAgent = member;
  _selectedBackendId = backends.length ? backends[0].id : null;

  if (_panelCache[agentName]) {
    // Restore cached panel
    const cache = _panelCache[agentName];
    _buildAgentPanel(agentName, backends, right);
    // Restore the backend selection
    const backendSel = right.querySelector('#chat-backend-select');
    if (backendSel && cache.backendId) {
      backendSel.value = cache.backendId;
      backendSel.dispatchEvent(new Event('change'));
    }
    // Use the actual selected value; the cached backendId may no longer exist in
    // the select options, in which case the browser silently ignores the assignment
    // above and the select stays at its default — don't persist the stale id (#403).
    _selectedBackendId = (backendSel && backendSel.value) ? backendSel.value : _selectedBackendId;
    // Restore conversation thread
    if (_chatThread && cache.threadHtml) _chatThread.innerHTML = cache.threadHtml;
  } else {
    _buildAgentPanel(agentName, backends, right);
  }

  _chatSessionId = _getOrCreateSession(agentName, _selectedBackendId);
  syncBubbleHighlight(_selectedBackendId);
  if (_chatInput) _chatInput.focus();
  _saveAgentState();
}

// ── A2A helpers ───────────────────────────────────────────────────────────────

function a2aTaskId() {
  return crypto.randomUUID();
}

async function a2aSend(agentName, text, backendId, model, sessionId) {
  const params = {
    message: {
      messageId: a2aTaskId(),
      contextId: sessionId || undefined,
      role: 'user',
      parts: [{ kind: 'text', text }],
    }
  };
  if (model) params.message.metadata = { model };

  const body = { jsonrpc: '2.0', id: 1, method: 'message/send', params };
  const qs = backendId ? `?backend=${encodeURIComponent(backendId)}` : '';
  const r = await fetch(`${AGENT_BASE}/proxy/${encodeURIComponent(agentName)}${qs}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return await r.json();
}

async function loadAgentConversations(nyxUrl, thread) {
  try {
    const r = await fetch(nyxUrl.replace(/\/$/, '') + '/conversations?limit=50');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const entries = await r.json();
    renderChatThread(thread, entries);
  } catch (e) {
    thread.innerHTML = `<div class="empty-chat">Could not load conversation: ${escHtml(e.message)}</div>`;
  }
}

function renderChatThread(thread, entries) {
  if (!entries.length) {
    thread.innerHTML = '<div class="empty-chat">No messages yet. Say something!</div>';
    return;
  }
  thread.innerHTML = entries.map(e => {
    const role = e.role === 'user' ? 'user' : 'agent';
    const body = role === 'agent'
      ? DOMPurify.sanitize(marked.parse(e.text || ''))
      : escHtml(e.text || '');
    return `<div class="cm ${role}">
      <div class="role">${escHtml(e.agent || role)}</div>
      <div class="bbl">${body}</div>
    </div>`;
  }).join('');
  thread.scrollTop = thread.scrollHeight;
}

function appendChatMessage(thread, role, text, label) {
  const empty = thread.querySelector('.empty-chat');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = `cm ${role}`;
  const body = role === 'agent'
    ? DOMPurify.sanitize(marked.parse(text || ''))
    : escHtml(text || '');
  div.innerHTML = `<div class="role">${escHtml(label || role)}</div><div class="bbl">${body}</div>`;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
}

function appendChatError(thread, message, detail) {
  const empty = thread.querySelector('.empty-chat');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'cm error';
  let detailHtml = '';
  if (detail) {
    const pretty = typeof detail === 'string' ? detail : JSON.stringify(detail, null, 2);
    detailHtml = `<details class="err-detail"><summary>details</summary><pre>${escHtml(pretty)}</pre></details>`;
  }
  div.innerHTML = `<div class="role">error</div><div class="bbl"><span class="err-msg">${escHtml(message)}</span>${detailHtml}</div>`;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
}

async function doSend(agentName) {
  const text = _chatInput.value.trim();
  if (!text || !_chatThread) return;

  // Snapshot all mutable globals now — before any await — so the response
  // always lands in the thread it was sent from, even if the user switches agents.
  const thread = _chatThread;
  const sendBtn = _chatSendBtn;
  const inputEl = _chatInput;
  const backendSel = document.getElementById('chat-backend-select');
  const modelInput = document.getElementById('chat-model-input');
  const backendId = backendSel ? backendSel.value : _selectedBackendId;
  const model = modelInput ? modelInput.value.trim() || null : null;
  const sessionId = _chatSessionId;
  const member = _selectedAgent;

  inputEl.value = '';
  sendBtn.disabled = true;
  appendChatMessage(thread, 'user', text, 'you');
  const thinking = document.createElement('div');
  thinking.className = 'cm thinking';
  thinking.innerHTML = '<div class="bbl">…</div>';
  thread.appendChild(thinking);
  thread.scrollTop = thread.scrollHeight;
  // After the await, the user may have switched agents. Check if this thread
  // is still live in the DOM; if not, write into the cache so it appears on return.
  function commitToThread(fn) {
    fn(thread);
    // Always update cache so localStorage stays current
    _panelCache[agentName] = Object.assign(_panelCache[agentName] || {}, {
      threadHtml: thread.innerHTML,
      backendId,
    });
    _saveAgentState();
  }

  try {
    const result = await a2aSend(agentName, text, backendId, model, sessionId);
    thinking.remove();
    const parts = result?.result?.parts || result?.result?.status?.message?.parts || [];
    const replyText = parts.filter(p => p.kind === 'text').map(p => p.text).join('');
    if (replyText) {
      const bInfo = backendId && member ? (member.agents || []).find(a => a.id === backendId) : null;
      const bFullName = (bInfo && bInfo.card && bInfo.card.name) ? bInfo.card.name : backendId;
      const bType = bFullName ? backendType(bFullName) : '';
      const bTypeLabel = bType ? bType.charAt(0).toUpperCase() + bType.slice(1) : '';
      const replyLabel = backendId ? `${agentName} (${bTypeLabel} / ${bFullName})` : agentName;
      commitToThread(t => appendChatMessage(t, 'agent', replyText, replyLabel));
    } else if (result?.error) {
      commitToThread(t => appendChatError(t, result.error.message || 'The agent returned an error.', result.error));
    } else {
      commitToThread(t => appendChatError(t, 'Received an unexpected response.', result?.result || result));
    }
  } catch (e) {
    thinking.remove();
    commitToThread(t => appendChatError(t, e.message || 'Something went wrong.'));
  }
  sendBtn.disabled = false;
  if (document.contains(inputEl)) inputEl.focus();
}

_loadAgentState();
loadAgents();
setInterval(() => loadAgents(true), 30000);

async function loadMetrics() {
  try {

    document.getElementById('metrics-ts').textContent = 'updated ' + new Date().toLocaleTimeString();

    document.getElementById('chart-placeholder').style.display = 'block';
    document.getElementById('chart-placeholder').textContent =
      `Cannot reach ${AGENT_BASE}/metrics`;
  }
}

function setRefreshInterval(ms) {

let _metricsLoaded = false;
