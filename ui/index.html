const conv = {
  loaded: false,
  entries: [],      // all conversation entries, sorted oldest→newest
  traceEntries: [], // all tool trace entries, sorted oldest→newest
  agents: new Set(),
  filterAgent: '',
  filterRole: '',
  filterSearch: '',
  filterTools: 'show',
  convLimit: 500,
};

function _saveConvState() {
  try {
    localStorage.setItem('nyx-conv-state', JSON.stringify({
      filterAgent:  conv.filterAgent,
      filterRole:   conv.filterRole,
      filterSearch: conv.filterSearch,
      filterTools:  conv.filterTools,
      convLimit:    conv.convLimit,
    }));
  } catch (e) {}
}

function _restoreConvState() {
  try {
    const s = localStorage.getItem('nyx-conv-state');
    if (!s) return;
    const saved = JSON.parse(s);
    conv.filterAgent  = saved.filterAgent  || '';
    conv.filterRole   = saved.filterRole   || '';
    conv.filterSearch = saved.filterSearch || '';
    conv.filterTools  = saved.filterTools  || 'show';
    conv.convLimit    = saved.convLimit     || 500;
    document.getElementById('conv-search').value       = conv.filterSearch;
    document.getElementById('conv-agent-filter').value = conv.filterAgent;
    document.getElementById('conv-role-filter').value  = conv.filterRole;
    document.getElementById('conv-tool-filter').value  = conv.filterTools;
    document.getElementById('conv-limit').value        = conv.convLimit;
  } catch (e) {}
}

async function loadConversations() {
  const feed = document.getElementById('conv-feed');
  try {
    const limit = conv.convLimit;
    const [convResp, traceResp] = await Promise.all([
      fetch(`${AGENT_BASE}/conversations?limit=${limit}`),
      fetch(`${AGENT_BASE}/trace?limit=${limit}`),
    ]);
    conv.entries = convResp.ok ? await convResp.json() : [];
    conv.traceEntries = traceResp.ok ? await traceResp.json() : [];
    conv.agents = new Set(conv.entries.map(e => e.agent).filter(Boolean));
    populateConvAgentFilter();
    _restoreConvState();
    renderConvFeed();
    conv.loaded = true;
  } catch (e) {
    conv.loaded = false;
    feed.innerHTML = `<div class="empty">Could not load conversations.<br>${escHtml(e.message)}</div>`;
  }
}

function populateConvAgentFilter() {
  const sel = document.getElementById('conv-agent-filter');
  const current = sel.value;
  sel.innerHTML = '<option value="">all</option>' +
    [...conv.agents].sort().map(a =>
      `<option value="${escHtml(a)}"${a === current ? ' selected' : ''}>${escHtml(a)}</option>`
    ).join('');
}

function renderConvFeed() {
  const feed = document.getElementById('conv-feed');
  const { filterAgent, filterRole, filterSearch, filterTools } = conv;
  const search = filterSearch.toLowerCase();
  const showTools = filterTools !== 'hide';

  // Filter conversation entries
  let entries = conv.entries.filter(e => {
    if (filterAgent && e.agent !== filterAgent) return false;
    if (filterRole && e.role !== filterRole) return false;
    if (search && !(e.text || '').toLowerCase().includes(search)) return false;
    return true;
  });

  // Build a set of session IDs present after filtering
  const visibleSids = new Set(entries.map(e => e.session_id));

  // Build trace map: session_id → sorted tool events (with result names resolved)
  const traceMap = {};
  if (showTools) {
    for (const t of conv.traceEntries) {
      const sid = t.session_id;
      if (!visibleSids.has(sid)) continue;
      if (!traceMap[sid]) traceMap[sid] = [];
      traceMap[sid].push({ ...t });
    }
  }

  if (!entries.length) {
    feed.innerHTML = '<div class="empty">No messages match filters.</div>';
    document.getElementById('conv-count').textContent = '';
    return;
  }

  document.getElementById('conv-count').textContent =
    `${entries.length} message${entries.length !== 1 ? 's' : ''} · ${visibleSids.size} session${visibleSids.size !== 1 ? 's' : ''}`;

  // Merge conversation entries and trace events per session, grouped by session in order
  // Sessions ordered by their first message timestamp (oldest first)
  const sessionOrder = [];
  const sessionMap = {};
  for (const e of entries) {
    const sid = e.session_id || 'unknown';
    if (!sessionMap[sid]) { sessionMap[sid] = []; sessionOrder.push(sid); }
    sessionMap[sid].push({ ...e, _kind: 'msg' });
  }

  const html = [];
  for (const sid of sessionOrder) {
    const msgs = sessionMap[sid];
    const first = msgs[0];
    const agentLabel = first?.agent || '?';
    const date = first?.ts ? new Date(first.ts).toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const sidShort = sid.slice(0, 8);


    html.push(`<div class="conv-session-divider"><div class="div-line"></div><div class="div-label">${escHtml(sidShort)} · ${escHtml(date)} · ${escHtml(agentLabel)}</div><div class="div-line"></div></div>`);

    // Merge messages and trace events, sorted by ts
    const traceEvents = (traceMap[sid] || []).map(t => ({ ...t, _kind: 'tool' }));
    const combined = [...msgs, ...traceEvents].sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));

    for (const item of combined) {
      if (item._kind === 'msg') {
        html.push(renderConvMsg(item));
      } else {
        html.push(renderToolRow(item));
      }
    }
  }

  feed.innerHTML = html.join('');
  // Scroll to bottom (latest)
  feed.scrollTop = feed.scrollHeight;
}

function renderConvMsg(m) {
  const role = m.role === 'user' ? 'user' : 'agent';
  const sid = m.session_id ? ' · ' + escHtml(m.session_id) : '';
  const tok = (role === 'agent' && m.tokens) ? ' · ' + m.tokens.toLocaleString() + ' tok' : '';
  const label = role === 'agent'
    ? `${escHtml(m.agent || 'agent')}${m.model ? ' · ' + escHtml(m.model) : ''}${tok} · ${fmtTime(m.ts)}${sid}`
    : `you · ${fmtTime(m.ts)}${sid}`;
  return `<div class="cm ${role}">
    <div class="role">${label}</div>
    <div class="bbl">${role === 'agent' ? DOMPurify.sanitize(marked.parse((m.text || '').trim())) : escHtml(m.text || '')}</div>
  </div>`;
}

function renderToolRow(t) {
  const et = t.event_type || '';
  const isUse    = et === 'tool_use';
  const isResult = et === 'tool_result';
  const isError  = isResult && t.is_error;

  let cls = '';
  let label = '';
  let args = '';

  if (isUse) {
    label = `tool_use · ${t.name || 'tool'}`;
    if (t.input && typeof t.input === 'object') {
      args = Object.entries(t.input)
        .map(([k, v]) => `${k}: ${typeof v === 'string' ? v : JSON.stringify(v)}`)
        .join('\n');
    }
  } else if (isResult) {
    cls = isError ? 'tool-error' : 'tool-result';
    label = `tool_result · ${t.name || t._callName || 'tool'}`;
    args = Array.isArray(t.content)
      ? t.content.map(c => c.text ?? JSON.stringify(c)).join('\n')
      : (typeof t.content === 'string' ? t.content : JSON.stringify(t.content, null, 2));
  } else {
    // Other event types (response, context_usage, etc.) — show as info row
    label = et || 'event';
    const { ts, session_id, event_type, agent, agent_id, model, chunks, _kind, ...rest } = t;
    if (Object.keys(rest).length) {
      args = Object.entries(rest)
        .filter(([, v]) => v !== null && v !== undefined && v !== '')
        .map(([k, v]) => `${k}: ${typeof v === 'string' ? v : JSON.stringify(v)}`)
        .join('\n');
    }
  }

  const isResponse = et === 'response';
  const argsHtml = args ? `<div class="tool-args">${escHtml(args)}</div>` : '';
  const roleParts = [];
  if (t.agent) roleParts.push(escHtml(t.agent));
  if (t.model) roleParts.push(escHtml(t.model));
  roleParts.push(fmtTime(t.ts));
  if (t.session_id) roleParts.push(escHtml(t.session_id));
  return `<div class="tool-row ${cls}">
    <div class="role">${roleParts.join(' · ')}</div>
    <div class="bbl">${label ? `<span class="tool-name">${escHtml(label)}</span>` : ''}${argsHtml}</div>
  </div>`;
}

document.getElementById('conv-agent-filter').addEventListener('change', e => {
  conv.filterAgent = e.target.value; renderConvFeed(); _saveConvState();
});
document.getElementById('conv-role-filter').addEventListener('change', e => {
  conv.filterRole = e.target.value; renderConvFeed(); _saveConvState();
});
document.getElementById('conv-tool-filter').addEventListener('change', e => {
  conv.filterTools = e.target.value; renderConvFeed(); _saveConvState();
});
document.getElementById('conv-limit').addEventListener('change', e => {
  conv.convLimit = Number(e.target.value); _saveConvState(); conv.loaded = false; loadConversations();
});
let _searchDebounce;
document.getElementById('conv-search').addEventListener('input', e => {
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(() => { conv.filterSearch = e.target.value; renderConvFeed(); _saveConvState(); }, 200);
});

// ════════════════════════════════════════════════════════════════════════════
// CALENDAR
// ════════════════════════════════════════════════════════════════════════════
const cal = {
  date: new Date(),   // anchor: current month/week/day being shown
  mode: 'month',      // 'month' | 'week' | 'day'
  jobs: [],           // [{name, schedule, running}] from GET /jobs
  tasks: [],          // [{name, window_start, days_expr, running}] from GET /tasks
};

const DAYS_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_LONG = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];

function calToday() {
  const d = new Date();
  return { y: d.getFullYear(), m: d.getMonth(), d: d.getDate() };
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth() === b.getMonth() &&
         a.getDate() === b.getDate();
}

// ── Title string ──────────────────────────────────────────────────────────────
function calTitle() {
  const d = cal.date;
  if (cal.mode === 'month') return MONTHS_LONG[d.getMonth()] + ' ' + d.getFullYear();
  if (cal.mode === 'week') {
    const sun = new Date(d); sun.setDate(d.getDate() - d.getDay());
    const sat = new Date(sun); sat.setDate(sun.getDate() + 6);
    const ms = MONTHS_LONG[sun.getMonth()].slice(0,3);
    const me = MONTHS_LONG[sat.getMonth()].slice(0,3);
    if (sun.getMonth() === sat.getMonth())
      return `${ms} ${sun.getDate()} – ${sat.getDate()}, ${sun.getFullYear()}`;
    return `${ms} ${sun.getDate()} – ${me} ${sat.getDate()}, ${sat.getFullYear()}`;
  }
  // day
  return DAYS_SHORT[d.getDay()] + ', ' + MONTHS_LONG[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

// ── Navigation ────────────────────────────────────────────────────────────────
function calNavigate(dir) {
  const d = cal.date;
  if (cal.mode === 'month') {
    cal.date = new Date(d.getFullYear(), d.getMonth() + dir, 1);
  } else if (cal.mode === 'week') {
    const next = new Date(d);
    next.setDate(d.getDate() + dir * 7);
    cal.date = next;
  } else {
    const next = new Date(d);
    next.setDate(d.getDate() + dir);
    cal.date = next;
  }
  renderCalendar();
}

function calGoToday() {
  cal.date = new Date();
  renderCalendar();
}

// ── Hour grid helper ──────────────────────────────────────────────────────────
function buildHourLabels() {
  let html = '';
  for (let h = 0; h < 24; h++) {
    const label = h === 0 ? '' : (h < 12 ? `${h} am` : h === 12 ? '12 pm' : `${h-12} pm`);
    html += `<div class="cal-hour-label">${label}</div>`;
  }
  return html;
}

/** Parse "HH:MM" → { h, m } or null. */
function parseHHMM(s) {
  if (!s) return null;
  const m = /^(\d{1,2}):(\d{2})/.exec(s);
  if (!m) return null;
  const h = parseInt(m[1], 10), min = parseInt(m[2], 10);
  if (h < 0 || h > 23 || min < 0 || min > 59) return null;
  return { h, m: min };
}

/** Extract the earliest concrete (non-*) hour and minute from a cron string. */
function cronToHHMM(schedule) {
  if (!schedule) return null;
  const parts = schedule.trim().split(/\s+/);
  if (parts.length < 2) return null;
  const minPart = parts[0], hourPart = parts[1];
  const minVal  = /^\d+$/.test(minPart)  ? parseInt(minPart, 10)  : 0;
  const hourVal = /^\d+$/.test(hourPart) ? parseInt(hourPart, 10) : null;
  if (hourVal === null) return null; // wildcard hour — can't place in timed view
  return { h: hourVal, m: minVal };
}

/**
 * Return true if the cron day-of-week field dowField matches the given JS
 * day-of-week value dow (0 = Sunday … 6 = Saturday).
 *
 * Supports:
 *   *           — matches every day
 *   single digit — e.g. "1" matches Monday (dow === 1); "7" also maps to Sunday
 *   comma list  — e.g. "1,3,5" matches Mon, Wed, Fri
 *   range       — e.g. "1-5" matches Mon–Fri
 *   step        — e.g. "*\/2" degrades to show on all days (uncommon in practice)
 *
 * Degrades gracefully: any pattern not recognised returns true (show on all days)
 * so an imperfect parse never hides a real event.
 */
function cronDowMatchesDay(dowField, dow) {
  if (!dowField || dowField === '*') return true;
  // Normalise: both 0 and 7 represent Sunday in cron
  const normDow = dow === 0 ? [0, 7] : [dow];
  // comma-separated list (may include ranges)
  const segments = dowField.split(',');
  for (const seg of segments) {
    const rangeMatch = seg.match(/^(\d+)-(\d+)$/);
    if (rangeMatch) {
      const lo = parseInt(rangeMatch[1], 10), hi = parseInt(rangeMatch[2], 10);
      if (normDow.some(d => d >= lo && d <= hi)) return true;
    } else if (/^\d+$/.test(seg.trim())) {
      const val = parseInt(seg.trim(), 10);
      if (normDow.includes(val)) return true;
    } else {
      // Unknown pattern (step, name abbreviation handled on server, etc.) — show on all days
      return true;
    }
  }
  return false;
}

/** Build absolute-positioned event blocks for a single day column. */
function buildTimedEventsForDay(date, jobs, tasks) {
  const PX_PER_MIN = 48 / 60;
  const MIN_HEIGHT = 24; // px

  let html = '';

  for (const job of (jobs || [])) {
    const t = cronToHHMM(job.schedule);
    if (!t) continue;
    const top = Math.round((t.h * 60 + t.m) * PX_PER_MIN);
    const height = Math.max(MIN_HEIGHT, 48);
    html += `<div class="cal-timed-item job-item" style="top:${top}px;height:${height}px;" title="Job: ${escHtml(job.name)} (${escHtml(job.schedule)})">${escHtml(job.name)}</div>`;
  }

  for (const task of (tasks || [])) {
    const t = parseHHMM(task.window_start);
    if (!t) continue;
    const top = Math.round((t.h * 60 + t.m) * PX_PER_MIN);
    const height = Math.max(MIN_HEIGHT, 48);
    html += `<div class="cal-timed-item task-item" style="top:${top}px;height:${height}px;" title="Task: ${escHtml(task.name)} @ ${escHtml(task.window_start)}">${escHtml(task.name)}</div>`;
  }

  return html;
}

function buildEventColInner(nowLine = '', eventsHtml = '') {
  // 24 hours × 48px = 1152px total. The inner div drives scroll height;
  // the now-line sits inside it so z-index stacks correctly against the gradient.
  return `<div style="height:${24*48}px;position:relative;">${eventsHtml}${nowLine}</div>`;
}

function nowLineTop() {
  const now = new Date();
  return (now.getHours() * 60 + now.getMinutes()) / (24 * 60) * (24 * 48);
}

// ── Month view ────────────────────────────────────────────────────────────────
function renderMonth() {
  const today = calToday();
  const year = cal.date.getFullYear(), month = cal.date.getMonth();
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();

  // We always render 6 rows × 7 cols = 42 cells
  const cells = [];
  for (let i = 0; i < firstDay; i++)
    cells.push({ d: daysInPrev - firstDay + 1 + i, other: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ d, other: false, year, month });
  let nextD = 1;
  while (cells.length < 42) cells.push({ d: nextD++, other: true });

  const dowHtml = DAYS_SHORT.map(s => `<div class="cal-dow">${s}</div>`).join('');
  const cellsHtml = cells.map(c => {
    const isToday = !c.other && c.year === today.y && c.month === today.m && c.d === today.d;
    const cls = ['cal-day', c.other ? 'other-month' : '', isToday ? 'today' : ''].filter(Boolean).join(' ');
    const numHtml = `<span class="cal-day-num">${c.d}</span>`;
    let itemsHtml = '';
    if (!c.other && (cal.jobs.length || cal.tasks.length)) {
      const cellDate = new Date(c.year, c.month, c.d);
      const dow = cellDate.getDay(); // 0=Sun
      const dots = [];
      for (const job of cal.jobs) {
        if (!job.schedule) continue;
        // Parse the day-of-week field (index 4) from the 5-part cron expression.
        const cronParts = job.schedule.trim().split(/\s+/);
        const jobDowField = cronParts.length >= 5 ? cronParts[4] : '*';
        if (cronDowMatchesDay(jobDowField, dow)) {
          dots.push(`<span class="cal-item job-item" title="Job: ${escHtml(job.name)} (${escHtml(job.schedule)})">${escHtml(job.name)}</span>`);
        }
      }
      for (const task of cal.tasks) {
        if (!task.window_start) continue;
        // days_expr is the cron day-of-week expression for this task (e.g. "*", "1-5", "0,6").
        const taskDowField = task.days_expr || '*';
        if (cronDowMatchesDay(taskDowField, dow)) {
          dots.push(`<span class="cal-item task-item" title="Task: ${escHtml(task.name)} @ ${escHtml(task.window_start)}">${escHtml(task.name)}</span>`);
        }
      }
      if (dots.length) itemsHtml = `<div class="cal-day-items">${dots.join('')}</div>`;
    }
    return `<div class="${cls}">${numHtml}${itemsHtml}</div>`;
  }).join('');

  return `<div class="cal-month">
    <div class="cal-month-head">${dowHtml}</div>
    <div class="cal-month-body">${cellsHtml}</div>
  </div>`;
}

// ── Week view ─────────────────────────────────────────────────────────────────
function renderWeek() {
  const today = new Date();
  const anchor = cal.date;
  const sun = new Date(anchor); sun.setDate(anchor.getDate() - anchor.getDay());

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(sun); d.setDate(sun.getDate() + i);
    return d;
  });

  const colHdrs = days.map(d => {
    const isToday = isSameDay(d, today);
    const numHtml = isToday
      ? `<div class="col-num today">${d.getDate()}</div>`
      : `<div class="col-num">${d.getDate()}</div>`;
    return `<div class="cal-timed-col-hdr"><div class="col-dow">${DAYS_SHORT[d.getDay()]}</div>${numHtml}</div>`;
  }).join('');

  const eventCols = days.map(d => {
    const isToday = isSameDay(d, today);
    const nowLine = isToday ? `<div class="cal-now-line" id="cal-now-line" style="top:${nowLineTop()}px;"></div>` : '';
    const eventsHtml = buildTimedEventsForDay(d, cal.jobs, cal.tasks);
    return `<div class="cal-timed-event-col">${buildEventColInner(nowLine, eventsHtml)}</div>`;
  }).join('');

  return `<div class="cal-timed">
    <div class="cal-timed-head">
      <div class="cal-timed-gutter"></div>
      <div class="cal-timed-cols">${colHdrs}</div>
    </div>
    <div class="cal-timed-body">
      <div class="cal-timed-hours">${buildHourLabels()}</div>
      <div class="cal-timed-events">${eventCols}</div>
    </div>
  </div>`;
}

// ── Day view ──────────────────────────────────────────────────────────────────
function renderDay() {
  const today = new Date();
  const d = cal.date;
  const isToday = isSameDay(d, today);
  const numHtml = isToday
    ? `<div class="col-num today">${d.getDate()}</div>`
    : `<div class="col-num">${d.getDate()}</div>`;
  const nowLine = isToday ? `<div class="cal-now-line" id="cal-now-line" style="top:${nowLineTop()}px;"></div>` : '';
  const eventsHtml = buildTimedEventsForDay(d, cal.jobs, cal.tasks);

  return `<div class="cal-timed">
    <div class="cal-timed-head">
      <div class="cal-timed-gutter"></div>
      <div class="cal-timed-cols">
        <div class="cal-timed-col-hdr"><div class="col-dow">${DAYS_SHORT[d.getDay()]}</div>${numHtml}</div>
      </div>
    </div>
    <div class="cal-timed-body">
      <div class="cal-timed-hours">${buildHourLabels()}</div>
      <div class="cal-timed-events">
        <div class="cal-timed-event-col">${buildEventColInner(nowLine, eventsHtml)}</div>
      </div>
    </div>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
let _calNowTimer = null;

async function loadCalendarData() {
  try {
    const [jobsResp, tasksResp] = await Promise.all([
      fetch(`${AGENT_BASE}/jobs`),
      fetch(`${AGENT_BASE}/tasks`),
    ]);
    cal.jobs  = jobsResp.ok  ? await jobsResp.json()  : [];
    cal.tasks = tasksResp.ok ? await tasksResp.json() : [];
  } catch (_e) {
    // /jobs and /tasks may not exist on older deployments — degrade gracefully
    cal.jobs  = [];
    cal.tasks = [];
  }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = calTitle();

  if (_calNowTimer) { clearInterval(_calNowTimer); _calNowTimer = null; }

  const body = document.getElementById('cal-body');
  if (cal.mode === 'month')      body.innerHTML = renderMonth();
  else if (cal.mode === 'week')  body.innerHTML = renderWeek();
  else                           body.innerHTML = renderDay();

  // Scroll timed views to ~8am
  if (cal.mode !== 'month') {
    const timedBody = body.querySelector('.cal-timed-body');
    if (timedBody) timedBody.scrollTop = 8 * 48;

    // Keep now-line current
    _calNowTimer = setInterval(() => {
      const line = document.getElementById('cal-now-line');
      if (line) line.style.top = nowLineTop() + 'px';
    }, 60_000);
  }
}

// ── Wire up controls ──────────────────────────────────────────────────────────
document.getElementById('cal-prev').addEventListener('click',  () => calNavigate(-1));
document.getElementById('cal-next').addEventListener('click',  () => calNavigate(+1));
document.getElementById('cal-today').addEventListener('click', () => calGoToday());

// Restore saved calendar mode
const _savedCalMode = localStorage.getItem('nyx-cal-mode');
if (_savedCalMode && ['month','week','day'].includes(_savedCalMode)) {
  cal.mode = _savedCalMode;
  document.querySelectorAll('.cal-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.calMode === _savedCalMode);
  });
}

document.querySelectorAll('.cal-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cal-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cal.mode = btn.dataset.calMode;
    localStorage.setItem('nyx-cal-mode', cal.mode);
    renderCalendar();
  });
});


// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pad(n) { return String(n).padStart(2, '0'); }
function fmtTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    const h = String(d.getHours() % 12 || 12).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    const ms = String(d.getMilliseconds()).padStart(3, '0');
    const ampm = d.getHours() < 12 ? 'AM' : 'PM';
    return `${h}:${m}:${s}.${ms} ${ampm}`;
  }
  catch { return ts; }
}
function fmtDateTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
      d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch { return ts; }
}

// Restore last active view — must run after all functions are defined
switchView(localStorage.getItem('nyx-active-view') || 'agents');
