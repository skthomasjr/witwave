name: Wait for sibling CI
description: >-
  Block until every other workflow run on $GITHUB_SHA has completed with a
  `success` or `skipped` conclusion. Treats `in_progress` and `queued` as
  "wait, then re-check" and refuses the calling job if any sibling finishes
  with any other conclusion. Filters out the calling run itself via
  $GITHUB_RUN_ID so a workflow never waits on itself.

inputs:
  timeout-seconds:
    description: Maximum total wall-clock time to spend waiting before refusing.
    required: false
    default: "900"
  poll-interval:
    description: Seconds between `gh run list` polls while siblings are still in flight.
    required: false
    default: "15"

runs:
  using: composite
  steps:
    - name: Wait for sibling CI workflows
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        COMMIT_SHA: ${{ github.sha }}
        SELF_RUN_ID: ${{ github.run_id }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        POLL_INTERVAL: ${{ inputs.poll-interval }}
      run: |
        set -euo pipefail

        deadline=$(( $(date +%s) + TIMEOUT_SECONDS ))

        while true; do
          mapfile -t lines < <(
            gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --commit "$COMMIT_SHA" \
              --limit 50 \
              --json databaseId,name,status,conclusion \
              | jq -r --argjson self "$SELF_RUN_ID" \
                  '.[] | select(.databaseId != $self) | "\(.databaseId)\t\(.name)\t\(.status)\t\(.conclusion)"'
          )

          in_flight=0
          failed=""

          for line in "${lines[@]}"; do
            [ -z "$line" ] && continue
            IFS=$'\t' read -r _ name status conclusion <<< "$line"
            case "$status" in
              completed)
                case "$conclusion" in
                  success|skipped) ;;
                  *) failed+="  - ${name} (${conclusion})"$'\n' ;;
                esac
                ;;
              *)
                in_flight=$(( in_flight + 1 ))
                ;;
            esac
          done

          if [ -n "$failed" ]; then
            echo "::error title=Gate refused::Sibling CI workflows did not succeed on ${COMMIT_SHA:0:12}:"
            printf '%s' "$failed"
            exit 1
          fi

          if [ "$in_flight" -eq 0 ]; then
            echo "All sibling CI workflows on ${COMMIT_SHA:0:12} succeeded (or none ran). Proceeding."
            exit 0
          fi

          now=$(date +%s)
          if [ "$now" -ge "$deadline" ]; then
            echo "::error title=Gate refused::Timed out after ${TIMEOUT_SECONDS}s waiting for ${in_flight} sibling workflow(s) on ${COMMIT_SHA:0:12}."
            exit 1
          fi

          echo "Waiting on ${in_flight} sibling workflow(s) on ${COMMIT_SHA:0:12}..."
          sleep "$POLL_INTERVAL"
        done
