name: Release — Helm charts

# Canonical publisher for every Helm chart under charts/ (currently
# charts/nyx and charts/nyx-operator). release.yaml used to publish
# charts/nyx in parallel which raced this workflow on the same tag
# (#1257); that job has been removed — all chart packaging/pushing
# is owned here. Container images are built by release.yaml.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"

jobs:
  package-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      # Keep charts independent so a failure packaging one doesn't block
      # the other, and so the OCI push per chart is atomic.
      fail-fast: false
      matrix:
        chart:
          - nyx
          - nyx-operator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Set chart version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/${{ matrix.chart }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/${{ matrix.chart }}/Chart.yaml

      - name: Package chart
        run: helm package charts/${{ matrix.chart }} --destination /tmp/charts

      - name: Push chart to GHCR
        run: helm push /tmp/charts/${{ matrix.chart }}-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
