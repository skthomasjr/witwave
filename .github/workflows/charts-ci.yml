name: Charts CI

on:
  pull_request:
    paths:
      - "charts/**"
      - "tools/**"
      - ".github/workflows/charts-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "charts/**"
      - "tools/**"
      - ".github/workflows/charts-ci.yml"

# Lint + render + schema-validate every Helm chart in this repo on every
# relevant PR (#838). Catches syntax drift, template regressions, schema
# vs values desync (#843), and malformed YAML before a tag ships. Does
# not install the chart end-to-end — that lives in a separate workflow
# once an ephemeral kind cluster is wired up.
jobs:
  lint-and-render:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - charts/nyx
          - charts/nyx-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: helm lint (default values)
        run: helm lint ${{ matrix.chart }}

      # Some charts fail render with default values by design (#760 guard
      # rejects placeholder tokens). Tolerate ONLY that specific guard's
      # error message ("REPLACE_ME") — any other render failure must
      # surface loudly (#1258). The previous `|| true` hid genuine
      # template regressions behind the same exit code as the expected
      # #760 guard.
      - name: helm template (default values)
        run: |
          helm template ci-default ${{ matrix.chart }} --validate=false \
            > /tmp/${{ matrix.chart }}-default.yaml 2> /tmp/helm-err \
            || (grep -q 'REPLACE_ME' /tmp/helm-err && echo 'tolerated #760 guard') \
            || (cat /tmp/helm-err; exit 1)

      - name: helm template (values-test.yaml when present)
        run: |
          if [ -f "${{ matrix.chart }}/values-test.yaml" ]; then
            # Replace placeholder tokens so the deploy-time guard passes.
            sed 's/REPLACE_ME_WITH_GENERATED_TOKEN/ci-fake-token/g' \
              "${{ matrix.chart }}/values-test.yaml" \
              > /tmp/values-test-ci.yaml
            helm template ci-test "${{ matrix.chart }}" -f /tmp/values-test-ci.yaml > /tmp/render.yaml
            echo "rendered $(grep -c '^kind:' /tmp/render.yaml) resources"
          else
            echo "no values-test.yaml for ${{ matrix.chart }}, skipping"
          fi

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      # values.schema.json sits alongside values.yaml and values-test.yaml.
      # `helm lint` with --strict honours the schema when present, so we
      # explicitly run it for every values file in charts that ship a
      # schema (#843).
      - name: helm lint --strict against schema (nyx)
        run: |
          helm lint charts/nyx --strict
          # values-test.yaml exercises the same schema.
          sed 's/REPLACE_ME_WITH_GENERATED_TOKEN/ci-fake-token/g' \
            charts/nyx/values-test.yaml > /tmp/values-test-ci.yaml
          helm lint charts/nyx --strict --values /tmp/values-test-ci.yaml

      - name: helm lint --strict (nyx-operator)
        run: |
          if [ -f charts/nyx-operator/values.schema.json ]; then
            helm lint charts/nyx-operator --strict
          else
            helm lint charts/nyx-operator --strict || true
            echo "nyx-operator has no schema.json yet; ran --strict anyway"
          fi

  operator-webhook-tls-modes:
    # Coverage for the two webhook TLS branches in nyx-operator (#846):
    #   * cert-manager — chart issues the serving cert, no caBundle needed.
    #   * BYO Secret  — operator supplies a pre-created tls.crt + tls.key
    #                   Secret and a base64-PEM caBundle.
    # Both branches are load-bearing and have historically drifted
    # (fail-fast guards added after BYO installs silently produced a
    # webhook server with no serving cert). This job renders each mode
    # with helm and asserts the rendered YAML matches expected-shape
    # invariants.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Render + verify cert-manager branch
        run: |
          helm template op charts/nyx-operator \
            --set webhooks.enabled=true \
            --set webhooks.certManager.enabled=true \
            --set webhooks.certManager.createIssuer=true \
            > /tmp/op-certmanager.yaml
          python3 - <<'PY'
          import sys, yaml
          docs = [d for d in yaml.safe_load_all(open("/tmp/op-certmanager.yaml")) if d]
          kinds = [d.get("kind") for d in docs]
          assert "MutatingWebhookConfiguration" in kinds, kinds
          assert "ValidatingWebhookConfiguration" in kinds, kinds
          assert "Certificate" in kinds, "cert-manager branch must render a Certificate"
          assert "Issuer" in kinds, "createIssuer=true branch must render an Issuer"
          for d in docs:
              if d.get("kind") in ("MutatingWebhookConfiguration", "ValidatingWebhookConfiguration"):
                  anns = (d.get("metadata") or {}).get("annotations") or {}
                  assert "cert-manager.io/inject-ca-from" in anns, (
                      f"{d['kind']}: cert-manager branch must stamp the inject-ca-from annotation"
                  )
          print("cert-manager branch: OK")
          PY

      - name: Render + verify BYO Secret branch
        run: |
          CA_B64=$(printf 'FAKE CA BUNDLE' | base64 -w0)
          helm template op charts/nyx-operator \
            --set webhooks.enabled=true \
            --set webhooks.existingSecret=my-tls-secret \
            --set-string webhooks.caBundle="${CA_B64}" \
            > /tmp/op-byo.yaml
          CA_B64="${CA_B64}" python3 - <<'PY'
          import os, yaml
          ca_b64 = os.environ["CA_B64"]
          docs = [d for d in yaml.safe_load_all(open("/tmp/op-byo.yaml")) if d]
          kinds = [d.get("kind") for d in docs]
          assert "MutatingWebhookConfiguration" in kinds, kinds
          assert "ValidatingWebhookConfiguration" in kinds, kinds
          assert "Certificate" not in kinds, (
              "BYO branch must NOT render a cert-manager Certificate "
              "(operator supplies the Secret out-of-band)"
          )
          for d in docs:
              if d.get("kind") in ("MutatingWebhookConfiguration", "ValidatingWebhookConfiguration"):
                  webhooks = d.get("webhooks") or []
                  assert webhooks, f"{d['kind']}: no webhook entries rendered"
                  for w in webhooks:
                      cb = ((w.get("clientConfig") or {}).get("caBundle"))
                      assert cb == ca_b64, (
                          f"{d['kind']}: caBundle must be literally stamped, "
                          f"got {cb!r} want {ca_b64!r}"
                      )
                  anns = (d.get("metadata") or {}).get("annotations") or {}
                  assert "cert-manager.io/inject-ca-from" not in anns, (
                      f"{d['kind']}: BYO branch must NOT stamp the cert-manager inject annotation"
                  )
          print("BYO Secret branch: OK")
          PY

      - name: Render + verify fail-fast guards
        run: |
          # BYO without caBundle → render must fail loudly.
          if helm template op charts/nyx-operator \
              --set webhooks.enabled=true \
              --set webhooks.existingSecret=my-secret \
              > /dev/null 2>&1; then
            echo "ERROR: BYO branch without caBundle should fail but did not" >&2
            exit 1
          fi
          # Neither cert-manager nor BYO → render must fail loudly.
          # (cert-manager defaults to enabled in values.yaml, so we flip
          # it off explicitly for this negative case.)
          if helm template op charts/nyx-operator \
              --set webhooks.enabled=true \
              --set webhooks.certManager.enabled=false \
              > /dev/null 2>&1; then
            echo "ERROR: webhooks.enabled without any TLS mode should fail but did not" >&2
            exit 1
          fi
          echo "fail-fast guards: OK"

  mcp-tools-pytest:
    # Unit-test coverage for tools/* pure helpers (#852). Runs against
    # the real production source (no mocking the helpers) so argv
    # injection guards, secret redaction rules, and tempfile lifecycle
    # behaviour are exercised end-to-end. Heavy deps (mcp SDK,
    # kubernetes, PyYAML) install via pip; no cluster is touched.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml prometheus_client mcp kubernetes httpx

      - name: pytest tools/helm
        run: pytest -q tools/helm/test_server.py
        env:
          PYTHONPATH: shared

  psa-restricted:
    # Static PSS-restricted verification for the rendered chart (#847).
    # Loads every Pod / PodTemplateSpec-bearing resource from the
    # rendered output and asserts each container carries the four fields
    # PSS-restricted enforces: runAsNonRoot=true, allowPrivilegeEscalation=false,
    # seccompProfile.type in {RuntimeDefault, Localhost}, and
    # capabilities.drop contains ALL. Values may be set at the Pod or
    # container level; the check honours the pod-level inheritance so
    # a pod-wide `seccompProfile` covers all containers.
    #
    # Runs statically (no cluster) so PR authors get the same signal
    # `kubectl label ns … pod-security.kubernetes.io/enforce=restricted`
    # would give them at apply time.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Render charts (values-test with placeholder-token swap)
        run: |
          sed 's/REPLACE_ME_WITH_GENERATED_TOKEN/ci-fake-token/g' \
            charts/nyx/values-test.yaml > /tmp/values-test-ci.yaml
          helm template nyx charts/nyx -f /tmp/values-test-ci.yaml > /tmp/nyx.yaml
          helm template op charts/nyx-operator > /tmp/nyx-operator.yaml

      - name: PSS-restricted static check
        run: |
          python3 <<'PY'
          import sys, yaml, pathlib

          POD_BEARING = {
              "Pod", "Deployment", "StatefulSet", "DaemonSet",
              "Job", "CronJob", "ReplicaSet",
          }

          def find_pod_specs(obj):
              """Yield every PodSpec contained in obj."""
              if not isinstance(obj, dict):
                  return
              kind = obj.get("kind")
              if kind == "Pod":
                  yield obj.get("spec") or {}
                  return
              if kind == "CronJob":
                  jt = (((obj.get("spec") or {}).get("jobTemplate") or {})
                        .get("spec") or {})
                  yield from find_template(jt)
                  return
              if kind in POD_BEARING:
                  yield from find_template(obj.get("spec") or {})

          def find_template(spec):
              t = (spec.get("template") or {}).get("spec") or {}
              if t:
                  yield t

          def violations_for_pod(pod_spec, src):
              podSC = pod_spec.get("securityContext") or {}
              pod_seccomp = (podSC.get("seccompProfile") or {}).get("type")
              pod_runAsNonRoot = podSC.get("runAsNonRoot")
              # PSS-restricted enforces security context requirements on
              # ephemeral debug containers too (#1266). `kubectl debug`
              # injects them at runtime and they're subject to the same
              # namespace admission policy as permanent containers — if
              # our chart ever declares them statically they must carry
              # the full SC baseline.
              containers = (pod_spec.get("containers") or []) + \
                           (pod_spec.get("initContainers") or []) + \
                           (pod_spec.get("ephemeralContainers") or [])
              for c in containers:
                  sc = c.get("securityContext") or {}
                  seccomp = (sc.get("seccompProfile") or {}).get("type") or pod_seccomp
                  runAsNonRoot = sc.get("runAsNonRoot")
                  if runAsNonRoot is None:
                      runAsNonRoot = pod_runAsNonRoot
                  allowEsc = sc.get("allowPrivilegeEscalation")
                  caps_drop = ((sc.get("capabilities") or {}).get("drop")) or []

                  ctx = f"{src} container={c.get('name')}"
                  if runAsNonRoot is not True:
                      yield f"{ctx}: runAsNonRoot is not true"
                  if allowEsc is not False:
                      yield f"{ctx}: allowPrivilegeEscalation is not false"
                  if seccomp not in {"RuntimeDefault", "Localhost"}:
                      yield f"{ctx}: seccompProfile.type is {seccomp!r}, need RuntimeDefault|Localhost"
                  if "ALL" not in caps_drop:
                      yield f"{ctx}: capabilities.drop must contain ALL (got {caps_drop})"

          violations = []
          for path in ("/tmp/nyx.yaml", "/tmp/nyx-operator.yaml"):
              raw = pathlib.Path(path).read_text()
              for doc in yaml.safe_load_all(raw):
                  if not doc:
                      continue
                  src = f"{pathlib.Path(path).name}:{doc.get('kind')}/{(doc.get('metadata') or {}).get('name')}"
                  for spec in find_pod_specs(doc):
                      violations.extend(violations_for_pod(spec, src))

          if violations:
              print("PSS-restricted violations detected:", file=sys.stderr)
              for v in violations:
                  print(f"  - {v}", file=sys.stderr)
              sys.exit(1)
          print("OK — all rendered pods satisfy PSS-restricted requirements.")
          PY
