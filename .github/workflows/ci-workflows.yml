name: CI — Workflows

# Lints GitHub Actions workflow files themselves. Workflow syntax and
# shell snippets are easy to break while editing unrelated CI gates, so
# keep a tiny dedicated guard on .github/workflows/**.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"

concurrency:
  group: ci-workflows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: actionlint
        run: |
          set -euo pipefail
          find .github/workflows -maxdepth 1 \( -name '*.yml' -o -name '*.yaml' \) -print0 |
            xargs -0 go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
