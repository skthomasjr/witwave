name: CI — Charts

on:
  pull_request:
    paths:
      - "charts/**"
      - "tools/**"
      - "operator/**"
      - ".github/workflows/ci-charts.yml"
  push:
    branches: ["main"]
    paths:
      - "charts/**"
      - "tools/**"
      - "operator/**"
      - ".github/workflows/ci-charts.yml"

# Explicit workflow-level permissions (matches ci-ww.yml + ci-dashboard.yml).
# Defensive against org default-permission drift — lint + render is
# strictly read-only; no reason any job in this workflow should need
# write access to contents, packages, or anything else.
permissions:
  contents: read

# Lint + render + schema-validate every Helm chart in this repo on every
# relevant PR (#838). Catches syntax drift, template regressions, schema
# vs values desync (#843), and malformed YAML before a tag ships. Does
# not install the chart end-to-end — that lives in a separate workflow
# once an ephemeral kind cluster is wired up.
jobs:
  lint-and-render:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - charts/witwave
          - charts/witwave-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: helm lint (default values)
        run: helm lint ${{ matrix.chart }}

      # Some charts fail render with default values by design (#760 guard
      # rejects placeholder tokens). Tolerate ONLY that specific guard's
      # error message — any other render failure must surface loudly
      # (#1258, #1376). Anchored match on the full known error phrase
      # instead of the bare "REPLACE_ME" substring so unrelated errors
      # that happen to mention the token name still fail CI.
      - name: helm template (default values)
        run: |
          # matrix.chart is "charts/witwave" — the inner slash means
          # the output path becomes /tmp/charts/<name>-default.yaml,
          # which requires /tmp/charts/ to exist. On a fresh runner
          # that dir is absent, so the redirect fails silently and
          # the grep/cat fallback trips on a missing /tmp/helm-err
          # too (#1449). Create the parent before the redirect.
          mkdir -p /tmp/charts
          helm template ci-default ${{ matrix.chart }} --validate=false \
            > /tmp/${{ matrix.chart }}-default.yaml 2> /tmp/helm-err \
            || (grep -qE 'REPLACE_ME_WITH_GENERATED_TOKEN|refusing to render placeholder token' /tmp/helm-err \
                && echo 'tolerated #760 guard') \
            || (cat /tmp/helm-err; exit 1)

      - name: helm template (values-test.yaml when present)
        run: |
          if [ -f "${{ matrix.chart }}/values-test.yaml" ]; then
            # Replace placeholder tokens so the deploy-time guard passes.
            sed 's/REPLACE_ME_WITH_GENERATED_TOKEN/ci-fake-token/g' \
              "${{ matrix.chart }}/values-test.yaml" \
              > /tmp/values-test-ci.yaml
            helm template ci-test "${{ matrix.chart }}" -f /tmp/values-test-ci.yaml > /tmp/render.yaml
            echo "rendered $(grep -c '^kind:' /tmp/render.yaml) resources"
          else
            echo "no values-test.yaml for ${{ matrix.chart }}, skipping"
          fi

      # #1682: every witwave-prefixed metric named in the rendered
      # PrometheusRule must be declared in source. PromQL with a missing
      # series silently returns no data — alerts then never fire and
      # operators mistake the absence for system-healthy. The script
      # renders the chart with prometheusRule.enabled=true, extracts
      # metric tokens from each alert's expr block (structurally — never
      # from description text), strips Prometheus auto-suffixes, and
      # greps the source for each. Witwave chart only — operator chart
      # ships no PrometheusRule.
      - name: PrometheusRule metrics referenced but not declared (#1682)
        if: matrix.chart == 'charts/witwave'
        run: |
          python3 -m pip install --quiet pyyaml
          scripts/check-prom-rule-metrics.sh

      # #1698: every alert in the rendered PrometheusRule must have a
      # matching `## <lowercased>` H2 anchor in docs/runbooks.md. The
      # convention is documented at docs/runbooks.md:6-8 — on-call gets
      # a runbook link in the alert body, so a missing runbook entry
      # blanks that link. CI fails when an alert lacks coverage.
      - name: PrometheusRule alerts have runbook coverage (#1698)
        if: matrix.chart == 'charts/witwave'
        run: scripts/check-runbook-coverage.sh

      # The operator chart templates hand-maintain RBAC so they can
      # express Helm gates such as rbac.secretsWrite and metrics.enabled.
      # Keep the effective permission surface aligned with the canonical
      # controller-gen role before a release ships.
      - name: Operator RBAC matches canonical manager role
        if: matrix.chart == 'charts/witwave-operator'
        run: |
          python3 -m pip install --quiet pyyaml
          scripts/check-rbac-drift.sh

      # Regression coverage for the documented 600s startup grace window
      # when users provide partial operator values files that omit probes.
      - name: Operator startup probe default matches values docs (#1642)
        if: matrix.chart == 'charts/witwave-operator'
        run: scripts/check-operator-startup-default.sh

      # #1626: ingress.auth.enabled=true with empty htpasswd AND empty
      # existingSecret must fail render unconditionally — even when
      # dashboard.enabled=false (the default). Previously the guard sat
      # inside the dashboard.enabled gate in templates/ingress.yaml, so
      # the misconfiguration was silently tolerated until someone flipped
      # dashboard.enabled on. The matrix entry only matters for the
      # witwave chart; skip for witwave-operator.
      - name: helm template (#1626 empty-htpasswd guard)
        if: matrix.chart == 'charts/witwave'
        run: |
          # Negative case: empty htpasswd, empty existingSecret, dashboard
          # off. Must fail with the #1626 message.
          if helm template ci-1626-bad charts/witwave \
              --set ingress.enabled=true \
              --set ingress.auth.enabled=true \
              --set ingress.auth.type=basic \
              --set ingress.auth.basic.htpasswd="" \
              --set ingress.auth.basic.existingSecret="" \
              > /dev/null 2> /tmp/helm-1626-err; then
            echo "ERROR: empty htpasswd + empty existingSecret should fail render but did not" >&2
            exit 1
          fi
          if ! grep -q '#1626' /tmp/helm-1626-err; then
            echo "ERROR: render failed but #1626 marker missing from error message:" >&2
            cat /tmp/helm-1626-err >&2
            exit 1
          fi
          # Positive case: htpasswd populated → must render cleanly.
          # $2y$ / $05$ are bcrypt header fields, not shell variables;
          # the single-quoting on the htpasswd literal below is correct.
          # shellcheck disable=SC2016
          helm template ci-1626-ok charts/witwave \
              --set ingress.enabled=true \
              --set ingress.auth.enabled=true \
              --set ingress.auth.type=basic \
              --set 'ingress.auth.basic.htpasswd=admin:$2y$05$abcdefghijklmnopqrstuv' \
              > /dev/null
          # Positive case: existingSecret populated → must render cleanly.
          helm template ci-1626-ok-existing charts/witwave \
              --set ingress.enabled=true \
              --set ingress.auth.enabled=true \
              --set ingress.auth.type=basic \
              --set ingress.auth.basic.existingSecret=my-htpasswd-secret \
              > /dev/null
          echo "#1626 empty-htpasswd guard: OK"

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      # values.schema.json sits alongside values.yaml and optional
      # supplemental values files.
      # `helm lint` with --strict honours the schema when present, so we
      # explicitly run it for every values file in charts that ship a
      # schema (#843).
      - name: helm lint --strict against schema (witwave)
        run: |
          helm lint charts/witwave --strict
          if [ -f charts/witwave/values-test.yaml ]; then
            # values-test.yaml exercises the same schema when the legacy
            # Helm-based smoke deployment is present.
            sed 's/REPLACE_ME_WITH_GENERATED_TOKEN/ci-fake-token/g' \
              charts/witwave/values-test.yaml > /tmp/values-test-ci.yaml
            helm lint charts/witwave --strict --values /tmp/values-test-ci.yaml
          else
            echo "no values-test.yaml for charts/witwave, skipping legacy test-values schema lint"
          fi

      - name: helm lint --strict (witwave-operator)
        run: |
          if [ -f charts/witwave-operator/values.schema.json ]; then
            helm lint charts/witwave-operator --strict
          else
            helm lint charts/witwave-operator --strict || true
            echo "witwave-operator has no schema.json yet; ran --strict anyway"
          fi

  operator-webhook-tls-modes:
    # Coverage for the two webhook TLS branches in witwave-operator (#846):
    #   * cert-manager — chart issues the serving cert, no caBundle needed.
    #   * BYO Secret  — operator supplies a pre-created tls.crt + tls.key
    #                   Secret and a base64-PEM caBundle.
    # Both branches are load-bearing and have historically drifted
    # (fail-fast guards added after BYO installs silently produced a
    # webhook server with no serving cert). This job renders each mode
    # with helm and asserts the rendered YAML matches expected-shape
    # invariants.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Render + verify cert-manager branch
        run: |
          helm template op charts/witwave-operator \
            --set webhooks.enabled=true \
            --set webhooks.certManager.enabled=true \
            --set webhooks.certManager.createIssuer=true \
            > /tmp/op-certmanager.yaml
          python3 - <<'PY'
          import sys, yaml
          docs = [d for d in yaml.safe_load_all(open("/tmp/op-certmanager.yaml")) if d]
          kinds = [d.get("kind") for d in docs]
          assert "MutatingWebhookConfiguration" in kinds, kinds
          assert "ValidatingWebhookConfiguration" in kinds, kinds
          assert "Certificate" in kinds, "cert-manager branch must render a Certificate"
          assert "Issuer" in kinds, "createIssuer=true branch must render an Issuer"
          for d in docs:
              if d.get("kind") in ("MutatingWebhookConfiguration", "ValidatingWebhookConfiguration"):
                  anns = (d.get("metadata") or {}).get("annotations") or {}
                  assert "cert-manager.io/inject-ca-from" in anns, (
                      f"{d['kind']}: cert-manager branch must stamp the inject-ca-from annotation"
                  )
          print("cert-manager branch: OK")
          PY

      - name: Render + verify BYO Secret branch
        run: |
          CA_B64=$(printf 'FAKE CA BUNDLE' | base64 -w0)
          helm template op charts/witwave-operator \
            --set webhooks.enabled=true \
            --set webhooks.existingSecret=my-tls-secret \
            --set-string webhooks.caBundle="${CA_B64}" \
            > /tmp/op-byo.yaml
          CA_B64="${CA_B64}" python3 - <<'PY'
          import os, yaml
          ca_b64 = os.environ["CA_B64"]
          docs = [d for d in yaml.safe_load_all(open("/tmp/op-byo.yaml")) if d]
          kinds = [d.get("kind") for d in docs]
          assert "MutatingWebhookConfiguration" in kinds, kinds
          assert "ValidatingWebhookConfiguration" in kinds, kinds
          assert "Certificate" not in kinds, (
              "BYO branch must NOT render a cert-manager Certificate "
              "(operator supplies the Secret out-of-band)"
          )
          for d in docs:
              if d.get("kind") in ("MutatingWebhookConfiguration", "ValidatingWebhookConfiguration"):
                  webhooks = d.get("webhooks") or []
                  assert webhooks, f"{d['kind']}: no webhook entries rendered"
                  for w in webhooks:
                      cb = ((w.get("clientConfig") or {}).get("caBundle"))
                      assert cb == ca_b64, (
                          f"{d['kind']}: caBundle must be literally stamped, "
                          f"got {cb!r} want {ca_b64!r}"
                      )
                  anns = (d.get("metadata") or {}).get("annotations") or {}
                  assert "cert-manager.io/inject-ca-from" not in anns, (
                      f"{d['kind']}: BYO branch must NOT stamp the cert-manager inject annotation"
                  )
          print("BYO Secret branch: OK")
          PY

      - name: Render + verify fail-fast guards
        run: |
          # BYO without caBundle → render must fail loudly.
          if helm template op charts/witwave-operator \
              --set webhooks.enabled=true \
              --set webhooks.existingSecret=my-secret \
              > /dev/null 2>&1; then
            echo "ERROR: BYO branch without caBundle should fail but did not" >&2
            exit 1
          fi
          # Neither cert-manager nor BYO → render must fail loudly.
          # (cert-manager defaults to enabled in values.yaml, so we flip
          # it off explicitly for this negative case.)
          if helm template op charts/witwave-operator \
              --set webhooks.enabled=true \
              --set webhooks.certManager.enabled=false \
              > /dev/null 2>&1; then
            echo "ERROR: webhooks.enabled without any TLS mode should fail but did not" >&2
            exit 1
          fi
          echo "fail-fast guards: OK"

  operator-service-selectors:
    # Coverage for #1643: the metrics Service's selector must include
    # `control-plane: controller-manager` so it matches the
    # ServiceMonitor's matchLabels (and the deployment's pod-template
    # label). Same invariant applies to the webhook Service whose
    # rendered comment claims it already filters on that label. Without
    # the selector match, Prometheus's ServiceMonitor would not pick up
    # any endpoints and operator scraping would silently be empty.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Render + verify metrics + webhook Service selectors (#1643)
        run: |
          helm template op charts/witwave-operator \
            --set metrics.enabled=true \
            --set webhooks.enabled=true \
            --set webhooks.certManager.enabled=true \
            --set webhooks.certManager.createIssuer=true \
            > /tmp/op-selectors.yaml
          python3 - <<'PY'
          import sys, yaml
          docs = [d for d in yaml.safe_load_all(open("/tmp/op-selectors.yaml")) if d]
          checked = set()
          for d in docs:
              if d.get("kind") != "Service":
                  continue
              name = (d.get("metadata") or {}).get("name") or ""
              if not (name.endswith("-metrics") or name.endswith("-webhook")):
                  continue
              selector = (d.get("spec") or {}).get("selector") or {}
              cp = selector.get("control-plane")
              assert cp == "controller-manager", (
                  f"#1643: Service {name!r} spec.selector must include "
                  f"`control-plane: controller-manager` to match the pod label and "
                  f"the ServiceMonitor matchLabels. Got selector={selector!r}"
              )
              checked.add(name)
          assert any(n.endswith("-metrics") for n in checked), (
              f"metrics Service not rendered; only saw {checked}"
          )
          assert any(n.endswith("-webhook") for n in checked), (
              f"webhook Service not rendered; only saw {checked}"
          )
          print(f"#1643 selector check OK for: {sorted(checked)}")
          PY

      - name: Render + verify PodDisruptionBudget selector (#1666)
        run: |
          # #1666 mirrors #1643: the PDB selector must include
          # `control-plane: controller-manager` so it matches the
          # operator pod's full label set. Without it, the PDB silently
          # selects the wrong (or zero) pods and never honours
          # disruption budget on voluntary evictions.
          helm template op charts/witwave-operator \
            --set podDisruptionBudget.enabled=true \
            > /tmp/op-pdb.yaml
          python3 - <<'PY'
          import yaml
          docs = [d for d in yaml.safe_load_all(open("/tmp/op-pdb.yaml")) if d]
          pdbs = [d for d in docs if d.get("kind") == "PodDisruptionBudget"]
          assert pdbs, "no PodDisruptionBudget rendered with podDisruptionBudget.enabled=true"
          for d in pdbs:
              name = (d.get("metadata") or {}).get("name") or ""
              selector = ((d.get("spec") or {}).get("selector") or {}).get("matchLabels") or {}
              cp = selector.get("control-plane")
              assert cp == "controller-manager", (
                  f"#1666: PDB {name!r} spec.selector.matchLabels must include "
                  f"`control-plane: controller-manager` to match the pod label "
                  f"(mirrors the #1643 fix on metrics + webhook Service selectors). "
                  f"Got matchLabels={selector!r}"
              )
          print(f"#1666 PDB selector check OK for: {sorted((d.get('metadata') or {}).get('name') for d in pdbs)}")
          PY

      - name: Render + grep metrics Service selector (#1643, fast-path)
        run: |
          # Cheap secondary check that doesn't require PyYAML — extracts
          # the metrics Service block by line range and greps for the
          # required selector label. Mirrors the verify command in the
          # PR body so anyone can repro locally.
          helm template op charts/witwave-operator \
            --set metrics.enabled=true \
            > /tmp/op-metrics-only.yaml
          # Slice from the metrics Service's `kind: Service` to the next
          # document separator and grep within it. awk handles the slice
          # so newlines don't trip up grep -B context.
          awk '/^kind: Service$/{flag=1} flag{print} /^---$/ && flag{exit}' \
            /tmp/op-metrics-only.yaml \
            | grep -A 20 '^spec:' \
            | grep -A 5 '^  selector:' \
            | grep -q '    control-plane: controller-manager'
          echo "#1643 grep fast-path: OK"

  prometheusrule-parity:
    # #1746: the operator's PrometheusRule reconciler emits the same
    # alert set as charts/witwave/templates/prometheusrule.yaml. CI
    # diffs the two surfaces so chart-side threshold tweaks or alert
    # additions never silently drift away from operator-rendered agents.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: operator/go.sum

      - name: Run PrometheusRule parity check
        run: operator/scripts/check-prometheusrule-parity.sh

  mcp-tools-pytest:
    # Unit-test coverage for tools/* pure helpers (#852). Runs against
    # the real production source (no mocking the helpers) so argv
    # injection guards, secret redaction rules, and tempfile lifecycle
    # behaviour are exercised end-to-end. Heavy deps (mcp SDK,
    # kubernetes, PyYAML) install via pip; no cluster is touched.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml prometheus_client mcp kubernetes httpx

      - name: pytest tools/helm
        run: pytest -q tools/helm/test_server.py
        env:
          PYTHONPATH: shared

  psa-restricted:
    # Static PSS-restricted verification for the rendered chart (#847).
    # Loads every Pod / PodTemplateSpec-bearing resource from the
    # rendered output and asserts each container carries the four fields
    # PSS-restricted enforces: runAsNonRoot=true, allowPrivilegeEscalation=false,
    # seccompProfile.type in {RuntimeDefault, Localhost}, and
    # capabilities.drop contains ALL. Values may be set at the Pod or
    # container level; the check honours the pod-level inheritance so
    # a pod-wide `seccompProfile` covers all containers.
    #
    # Runs statically (no cluster) so PR authors get the same signal
    # `kubectl label ns … pod-security.kubernetes.io/enforce=restricted`
    # would give them at apply time.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Render charts
        run: |
          if [ -f charts/witwave/values-test.yaml ]; then
            sed 's/REPLACE_ME_WITH_GENERATED_TOKEN/ci-fake-token/g' \
              charts/witwave/values-test.yaml > /tmp/values-test-ci.yaml
            helm template witwave charts/witwave -f /tmp/values-test-ci.yaml > /tmp/witwave.yaml
          else
            echo "no values-test.yaml for charts/witwave, rendering default values"
            helm template witwave charts/witwave > /tmp/witwave.yaml
          fi
          helm template op charts/witwave-operator > /tmp/witwave-operator.yaml

      # #1377: render a THIRD variant with every opt-in component on so
      # PSA audits new flags before they hit a real cluster. Append to
      # /tmp/witwave.yaml so the PSS walker below picks them up.
      - name: Render PSA-audit variant (all features on)
        # #1405: fail loudly on values-psa-audit.yaml render errors.
        # The prior `|| echo "failed; continuing"` suppressed the exit
        # status and defeated the stated purpose (catch new optional
        # components before they hit a real cluster).
        run: |
          if [ -f charts/witwave/values-psa-audit.yaml ]; then
            echo "---" >> /tmp/witwave.yaml
            helm template witwave charts/witwave -f charts/witwave/values-psa-audit.yaml \
              >> /tmp/witwave.yaml
          else
            echo "[PSA] no values-psa-audit.yaml present — skipping"
          fi

      - name: PSS-restricted static check
        run: |
          python3 <<'PY'
          import sys, yaml, pathlib

          POD_BEARING = {
              "Pod", "Deployment", "StatefulSet", "DaemonSet",
              "Job", "CronJob", "ReplicaSet",
          }

          def find_pod_specs(obj):
              """Yield every PodSpec contained in obj."""
              if not isinstance(obj, dict):
                  return
              kind = obj.get("kind")
              if kind == "Pod":
                  yield obj.get("spec") or {}
                  return
              if kind == "CronJob":
                  jt = (((obj.get("spec") or {}).get("jobTemplate") or {})
                        .get("spec") or {})
                  yield from find_template(jt)
                  return
              if kind in POD_BEARING:
                  yield from find_template(obj.get("spec") or {})

          def find_template(spec):
              t = (spec.get("template") or {}).get("spec") or {}
              if t:
                  yield t

          def violations_for_pod(pod_spec, src):
              podSC = pod_spec.get("securityContext") or {}
              pod_seccomp = (podSC.get("seccompProfile") or {}).get("type")
              pod_runAsNonRoot = podSC.get("runAsNonRoot")
              # PSS-restricted enforces security context requirements on
              # ephemeral debug containers too (#1266). `kubectl debug`
              # injects them at runtime and they're subject to the same
              # namespace admission policy as permanent containers — if
              # our chart ever declares them statically they must carry
              # the full SC baseline.
              containers = (pod_spec.get("containers") or []) + \
                           (pod_spec.get("initContainers") or []) + \
                           (pod_spec.get("ephemeralContainers") or [])
              for c in containers:
                  sc = c.get("securityContext") or {}
                  seccomp = (sc.get("seccompProfile") or {}).get("type") or pod_seccomp
                  runAsNonRoot = sc.get("runAsNonRoot")
                  if runAsNonRoot is None:
                      runAsNonRoot = pod_runAsNonRoot
                  allowEsc = sc.get("allowPrivilegeEscalation")
                  caps_drop = ((sc.get("capabilities") or {}).get("drop")) or []

                  ctx = f"{src} container={c.get('name')}"
                  if runAsNonRoot is not True:
                      yield f"{ctx}: runAsNonRoot is not true"
                  if allowEsc is not False:
                      yield f"{ctx}: allowPrivilegeEscalation is not false"
                  if seccomp not in {"RuntimeDefault", "Localhost"}:
                      yield f"{ctx}: seccompProfile.type is {seccomp!r}, need RuntimeDefault|Localhost"
                  if "ALL" not in caps_drop:
                      yield f"{ctx}: capabilities.drop must contain ALL (got {caps_drop})"

          violations = []
          for path in ("/tmp/witwave.yaml", "/tmp/witwave-operator.yaml"):
              raw = pathlib.Path(path).read_text()
              for doc in yaml.safe_load_all(raw):
                  if not doc:
                      continue
                  src = f"{pathlib.Path(path).name}:{doc.get('kind')}/{(doc.get('metadata') or {}).get('name')}"
                  for spec in find_pod_specs(doc):
                      violations.extend(violations_for_pod(spec, src))

          if violations:
              print("PSS-restricted violations detected:", file=sys.stderr)
              for v in violations:
                  print(f"  - {v}", file=sys.stderr)
              sys.exit(1)
          print("OK — all rendered pods satisfy PSS-restricted requirements.")
          PY
