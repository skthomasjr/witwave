name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: harness
            file: harness/Dockerfile
            context: .
          - image: claude
            file: backends/claude/Dockerfile
            context: .
          - image: codex
            file: backends/codex/Dockerfile
            context: .
          - image: gemini
            file: backends/gemini/Dockerfile
            context: .
          - image: operator
            file: operator/Dockerfile
            context: operator
          - image: git-sync
            file: helpers/git-sync/Dockerfile
            context: helpers/git-sync
          - image: mcp-kubernetes
            file: tools/kubernetes/Dockerfile
            context: .
          - image: mcp-helm
            file: tools/helm/Dockerfile
            context: .
          - image: mcp-prometheus
            file: tools/prometheus/Dockerfile
            context: .
          - image: dashboard
            file: clients/dashboard/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-beta.') }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VERSION is consumed by Dockerfiles that need to embed the release
          # version into the binary at build time — currently the operator
          # uses it for ldflags injection of DefaultImageTag (#440). Other
          # images ignore the build-arg, which is harmless.
          build-args: |
            VERSION=${{ github.ref_name }}

  publish-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package and push charts
        run: |
          for chart in charts/nyx charts/nyx-operator; do
            helm package "$chart" --version "${{ steps.version.outputs.version }}" --app-version "${{ steps.version.outputs.version }}"
          done
          for pkg in *.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository_owner }}/charts
          done
