name: Release — Container Images

# Chart publishing lives in .github/workflows/release-helm.yml — this workflow
# only builds and pushes container images. The previous `publish-charts` job
# raced with release-helm.yml on the same tag (both packaged and pushed
# charts/witwave to oci://ghcr.io/.../charts), producing duplicate OCI pushes
# and occasionally two differing chart manifests for the same version
# (#1257). Keep image builds here; charts are owned by release-helm.yml.
#
# Multi-platform structure: each (image, platform) builds on its NATIVE
# runner — linux/amd64 on `ubuntu-latest`, linux/arm64 on `ubuntu-24.04-arm`.
# The previous shape used `docker/setup-qemu-action` to cross-build arm64
# under emulation on amd64 runners, which made the claude/codex/gemini
# images take 35-50 minutes each (the `go install` of the seven Go tools
# baked into the image is especially miserable under QEMU). Native arm64
# brings those down to 10-15 minutes. Per-arch images push by digest
# only; a `merge` job per image stitches the digests into a multi-arch
# manifest list at the user-facing tags and signs that manifest with
# cosign.
#
# BuildKit layer cache lives in the registry at
# `:buildcache-linux-<arch>` per image; populated on each successful
# build (`mode=max`) and consulted by the next release. Releases where
# the Dockerfile substance hasn't changed get nearly free rebuilds on
# the heavy `apt-get` / `go install` / `pip install` layers.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"

jobs:
  gate:
    name: Wait for sibling CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/wait-for-sibling-ci

  build:
    needs: gate
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        image:
          - { name: harness,        file: harness/Dockerfile,          context: .                  }
          - { name: claude,         file: backends/claude/Dockerfile,  context: .                  }
          - { name: codex,          file: backends/codex/Dockerfile,   context: .                  }
          - { name: gemini,         file: backends/gemini/Dockerfile,  context: .                  }
          - { name: echo,           file: backends/echo/Dockerfile,    context: .                  }
          - { name: operator,       file: operator/Dockerfile,         context: operator           }
          - { name: git-sync,       file: helpers/git-sync/Dockerfile, context: helpers/git-sync   }
          - { name: mcp-kubernetes, file: tools/kubernetes/Dockerfile, context: .                  }
          - { name: mcp-helm,       file: tools/helm/Dockerfile,       context: .                  }
          - { name: mcp-prometheus, file: tools/prometheus/Dockerfile, context: .                  }
          - { name: dashboard,      file: clients/dashboard/Dockerfile, context: .                 }
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      # #1460: OIDC token for cosign keyless signing. Per-arch images
      # carry their own SLSA provenance + SBOM via buildx; the manifest
      # list itself is signed in the merge job.
      id-token: write

    steps:
      - name: Compute platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # See header comment on the v-strip rationale (operator
      # DefaultImageTag must match the tag GHCR receives).
      - name: Compute stripped version
        id: tag_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (labels only at build time)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image.name }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Push by digest only — no user-facing tag at this stage.
          # The `merge` job downstream stitches per-arch digests into
          # a multi-arch manifest list at the real tags.
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          # #1598: SLSA provenance + SBOM attached to the per-arch
          # image. The multi-arch manifest list itself is signed (not
          # attested) in the merge job.
          provenance: true
          sbom: true
          # BuildKit registry cache, scoped per (image, platform).
          # First build after this change is cold; subsequent releases
          # hit nearly every heavy layer (apt, Go toolchain, pip).
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image.name }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image.name }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max
          build-args: |
            VERSION=${{ steps.tag_version.outputs.version }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    name: Merge ${{ matrix.image }} manifest
    strategy:
      fail-fast: false
      matrix:
        image:
          - harness
          - claude
          - codex
          - gemini
          - echo
          - operator
          - git-sync
          - mcp-kubernetes
          - mcp-helm
          - mcp-prometheus
          - dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download digests for ${{ matrix.image }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-beta.') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image }}:${{ steps.meta.outputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # #1460: cosign keyless signature on the multi-arch manifest
      # list. Per-arch images each carry their own provenance + SBOM
      # attestations from the build step above; the manifest list
      # itself gets the cosign signature so `cosign verify <image>:<tag>`
      # resolves cleanly for consumers pulling by tag.
      - name: Sign manifest list
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image }}
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          DIGEST=$(
            docker buildx imagetools inspect "${IMAGE_REF}:${IMAGE_VERSION}" --format '{{json .Manifest}}' \
              | jq -r .digest
          )
          cosign sign --yes "${IMAGE_REF}@${DIGEST}"
