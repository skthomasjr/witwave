name: Release

# Chart publishing lives in .github/workflows/release-helm.yml — this workflow
# only builds and pushes container images. The previous `publish-charts` job
# raced with release-helm.yml on the same tag (both packaged and pushed
# charts/witwave to oci://ghcr.io/.../charts), producing duplicate OCI pushes
# and occasionally two differing chart manifests for the same version
# (#1257). Keep image builds here; charts are owned by release-helm.yml.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # #1460: OIDC token for cosign keyless signing. The token is
      # scoped per-job and expires in minutes; GitHub's OIDC endpoint
      # is the authoritative issuer and cosign exchanges this for a
      # short-lived Fulcio certificate bound to the workflow identity.
      # No long-lived signing key in this repo.
      id-token: write

    strategy:
      matrix:
        include:
          - image: harness
            file: harness/Dockerfile
            context: .
          - image: claude
            file: backends/claude/Dockerfile
            context: .
          - image: codex
            file: backends/codex/Dockerfile
            context: .
          - image: gemini
            file: backends/gemini/Dockerfile
            context: .
          - image: echo
            file: backends/echo/Dockerfile
            context: .
          - image: operator
            file: operator/Dockerfile
            context: operator
          - image: git-sync
            file: helpers/git-sync/Dockerfile
            context: helpers/git-sync
          - image: mcp-kubernetes
            file: tools/kubernetes/Dockerfile
            context: .
          - image: mcp-helm
            file: tools/helm/Dockerfile
            context: .
          - image: mcp-prometheus
            file: tools/prometheus/Dockerfile
            context: .
          - image: dashboard
            file: clients/dashboard/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # #1598 prerequisite: buildx with the docker-container driver is
      # required to attach attestations (provenance / SBOM) to the
      # pushed image. The default `docker` driver on the GHA runner
      # rejects `provenance: true` with "Attestation is not supported
      # for the docker driver." setup-buildx-action installs a fresh
      # builder backed by docker-container, which BuildKit drives via
      # gRPC and which fully supports the OCI attestation referrer
      # graph. No extra config — the action handles install + register.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Strip the leading `v` from the tag so VERSION matches the image
      # tag docker-metadata-action actually writes to GHCR. Without this,
      # the operator binary gets DefaultImageTag=v0.7.2 while the images
      # publish as `:0.7.2`, and the reconciler's ImagePullBackOffs are
      # indistinguishable from "image doesn't exist." For non-tag runs
      # (branch pushes), GITHUB_REF_NAME has no `v` prefix and the strip
      # is a no-op — safe either way.
      - name: Compute stripped version
        id: tag_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-beta.') }}

      - name: Build and push ${{ matrix.image }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # #1598: SLSA 2 attestations attached as OCI referrers next to
          # the image manifest. Buildx generates both at build time:
          #   - provenance — SLSA build provenance predicate (what was
          #     built, when, by whom, with what inputs). mode=max
          #     includes the full build graph; default for public repos.
          #   - sbom — Software Bill of Materials via the BuildKit
          #     scanner (syft underneath). Lists every package and
          #     version baked into the image.
          # Verifiable post-release with `cosign verify-attestation
          # --type slsaprovenance|spdxjson <image>@<digest>`. SECURITY.md
          # carries the consumer-side recipe.
          provenance: true
          sbom: true
          # VERSION is consumed by Dockerfiles that need to embed the release
          # version into the binary at build time — currently the operator
          # uses it for ldflags injection of DefaultImageTag (#440). Other
          # images ignore the build-arg, which is harmless.
          #
          # Uses VERSION from the stripped-tag computed above so it
          # matches the actual image tag on GHCR (docker-metadata-action
          # strips `v` from semver tags — images land as `foo:0.7.2`,
          # not `foo:v0.7.2`). Before this match, the operator was built
          # with `DefaultImageTag=v0.7.2` and the reconciler would
          # request e.g. `git-sync:v0.7.2`, which GHCR rejected with
          # ImagePullBackOff. See #<pending-issue>.
          build-args: |
            VERSION=${{ steps.tag_version.outputs.version }}

      # #1460: cosign keyless signing of every pushed image. Uses
      # Sigstore's public-good Fulcio CA + Rekor transparency log —
      # no long-lived key material in this repo. The signature is
      # written to GHCR as a sibling OCI artifact next to the image
      # (same registry path, suffix .sig on the digest). Verification
      # recipe lives in SECURITY.md § Verifying signed container
      # images.
      #
      # Signed BY DIGEST, not tag: tags are mutable (a `latest` push
      # reuses the tag); digests are immutable content hashes. Signing
      # the tag would let a later mutation leave an old signature
      # attached to new bits. Signing the digest means the signature
      # is tied to the exact content we just pushed, full stop.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign ${{ matrix.image }} image
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/images/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_REF}@${DIGEST}"
