name: CI — Secrets scan

# Scans the repository for accidentally-committed secrets via gitleaks.
# The repo is public (#1462 context) — workflow logs are public with a
# 90-day retention, so any plaintext that slips past registered-secret
# masking stays searchable for three months. Catching it pre-merge is
# the only meaningful mitigation; this workflow runs on every PR and
# on main so drift is detected even when developers skip local hooks.
#
# Allow-list lives in `.gitleaks.toml` at the repo root; use that to
# silence known-safe strings (example tokens in docs, test fixtures).
# Do NOT silence real secrets — rotate them per SECURITY.md.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly sweep on Monday mornings. Catches secrets that slipped in
    # via a merged PR whose diff path wasn't scanned (e.g. large
    # rename / history rewrite) and reacts to new gitleaks detection
    # rules published upstream.
    - cron: "17 13 * * 1"

concurrency:
  group: ci-secrets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # The scan itself is read-only. Some GitHub Action integrations
  # require `security-events: write` to upload SARIF to the Security
  # tab; we skip that for now (the action's own failure surface is
  # enough) and can opt in later.
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so scheduled sweeps don't miss secrets that
          # landed on earlier commits. PR / push runs get shallow
          # fetches by default, which is fine for diff-scoped scans;
          # explicit full-fetch here costs ~10s on this repo and makes
          # the schedule branch catch historical slip-ups.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Use the github-native token for PR annotations. No special
          # permissions needed beyond contents:read above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point at the repo-local config so allow-list edits land in
          # code review, not opaque env vars.
          GITLEAKS_CONFIG: .gitleaks.toml
          # Fail the job on any finding — zero tolerance by default.
          # Silence false positives by adding them to the allow-list,
          # not by lowering this threshold.
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"
