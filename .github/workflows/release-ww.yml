name: Release — ww CLI

# Tag-triggered release for the ww CLI. Mirrors the flat-tag pattern
# established by release.yaml (container images) and release-helm.yml
# (Helm charts) — every `v*.*.*` tag produces a ww binary release for
# every platform plus a Homebrew formula.
#
# Prerequisites for a successful run:
#   1. The Homebrew tap repo github.com/witwave-ai/homebrew-ww must exist
#      (it does as of the v0.4 series; seeded with a README so goreleaser
#      can push Formula/). Tap owner/name is pinned in
#      clients/ww/.goreleaser.yml under brews[].repository.
#   2. A fine-grained PAT scoped to witwave-ai/homebrew-ww with
#      Contents: Read-and-Write must be configured as the
#      `HOMEBREW_TAP_GITHUB_TOKEN` secret on this repo. The default
#      GITHUB_TOKEN cannot push across owners.
#
# Without (2), this workflow succeeds at building + uploading the
# binaries to the GitHub Release but fails at the Homebrew publish step.
# That's a supported interim state — users can `go install` or download
# binaries from Releases while brew is being wired up.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"
      - "v*.*.*-rc.*"

concurrency:
  group: release-ww-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    # #1378: hard-gate the whole job on tag refs so any future
    # workflow_dispatch / pull_request / pull_request_target addition
    # can't accidentally reach the tap PAT via step-level env inheritance.
    if: github.ref_type == 'tag'
    permissions:
      # goreleaser needs contents:write to create the release + upload
      # assets. packages:write reserved for future container-based
      # goreleaser steps if we ever add one.
      # #1357: id-token:write grants OIDC to cosign keyless signing.
      contents: write
      packages: write
      id-token: write

    # #1598 item 2: expose subject hashes so the slsa-github-generator
    # callable workflow (provenance job below) can sign a SLSA predicate
    # over the just-built artifacts.
    outputs:
      subjects: ${{ steps.subjects.outputs.subjects }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser reads tag history to compute the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: clients/ww/go.mod
          cache: true
          cache-dependency-path: clients/ww/go.sum

      # #1357: install cosign so goreleaser's sign stanza can emit
      # keyless signatures + SBOM attestations.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (for SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          workdir: clients/ww
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for the Homebrew formula to be pushed to the
          # witwave-ai/homebrew-ww tap. Fine-grained PAT with
          # Contents: Read-and-Write on that repo (the default
          # GITHUB_TOKEN cannot push across owners). Without this
          # secret, goreleaser fails loudly at the formula-publish
          # step but the binaries + GitHub Release still ship.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # #1598 items 2 + 4: compute SLSA subjects.
      #
      # Subject set:
      #   - Every release archive in dist/ (.tar.gz) — provenance covers
      #     the binaries users actually consume via brew / curl install /
      #     direct download (item 2).
      #   - The embedded witwave-operator chart's content-hash —
      #     SHA256 of the chart's file contents (sorted-find ->
      #     per-file SHA256 -> SHA256 of the concatenated list). This
      #     is the cryptographic bridge for "ww-embedded chart bytes ==
      #     published OCI chart bytes" (item 4 of #1598). Consumers
      #     reproduce the same hash by helm-pulling the published chart,
      #     extracting it, and running the same find+sort+sha256sum
      #     recipe documented in docs/supply-chain.md.
      #
      # The content-hash approach (rather than a tarball SHA256) avoids
      # cross-workflow SOURCE_DATE_EPOCH coordination — content equality
      # is byte-for-byte deterministic regardless of helm package
      # timestamps or tarball compression flags.
      - name: Compute SLSA subjects
        id: subjects
        run: |
          set -euo pipefail

          # Archive subjects (one per release artifact)
          archive_subjects=$(cd clients/ww/dist && sha256sum *.tar.gz)

          # Embedded chart content-hash (single subject)
          chart_dir=clients/ww/internal/operator/embedded/witwave-operator
          chart_hash=$(cd "$chart_dir" && \
            find . -type f -not -path './charts/*' | LC_ALL=C sort | \
            xargs sha256sum | sha256sum | awk '{print $1}')
          chart_subject="${chart_hash}  embedded-witwave-operator-${GITHUB_REF_NAME#v}-content"

          all_subjects=$(printf '%s\n%s' "$archive_subjects" "$chart_subject")

          echo "::group::SLSA subjects"
          echo "$all_subjects"
          echo "::endgroup::"

          # Base64 encode for slsa-github-generator (newlines preserved)
          encoded=$(echo "$all_subjects" | base64 -w0)
          echo "subjects=${encoded}" >> "$GITHUB_OUTPUT"

  # #1598 item 2 + 4: SLSA build provenance for ww binaries + the
  # embedded witwave-operator chart's content-hash.
  #
  # Uses the slsa-framework/slsa-github-generator generic generator
  # (workflow_call) — the same path FluxCD, kubectl, helm, and other
  # CNCF projects use. The reusable workflow runs in an isolated
  # context (separate runner, scoped permissions) and emits a SLSA L3
  # in-toto predicate signed via Sigstore keyless. The signed bundle
  # uploads to the GitHub Release as a `.intoto.jsonl` asset.
  #
  # Verification (consumer side, post-release):
  #
  #   slsa-verifier verify-artifact \
  #     --provenance-path multiple.intoto.jsonl \
  #     --source-uri github.com/witwave-ai/witwave \
  #     --source-tag <tag> \
  #     ww_<version>_<os>_<arch>.tar.gz
  #
  # See docs/supply-chain.md for the full recipe including the
  # embedded-chart bridge verification.
  provenance:
    name: SLSA provenance
    needs: [goreleaser]
    if: github.ref_type == 'tag'
    permissions:
      # slsa-github-generator needs these specific scopes per its docs.
      actions: read       # read the workflow run that built the artifacts
      id-token: write     # OIDC for keyless signing via Sigstore
      contents: write     # upload the predicate to the GitHub Release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.subjects }}"
      upload-assets: true
      provenance-name: "ww-${{ github.ref_name }}.intoto.jsonl"

  # Post-release validation: re-run the install.sh smoke matrix against
  # the *just-cut* tag rather than the previous one. ci-install-script.yml
  # exercises the script against pre-existing releases (catches script
  # bugs); this job exercises the just-shipped release (catches asset-
  # naming drift, missing platforms, install.sh upload failures, and
  # checksums.txt format changes — the "we shipped a broken release"
  # class of bug).
  #
  # Failure here does NOT roll back the release — by the time goreleaser
  # finished above the artifacts are already public. But a red check on
  # this job is the loudest possible signal that the next user to run the
  # curl one-liner is going to have a bad time, so we surface it
  # immediately and rely on operator triage to cut a follow-up release.
  install-smoke:
    name: install.sh smoke — ${{ matrix.image }}
    needs: goreleaser
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - alpine:3.19
          - debian:12-slim
          - ubuntu:22.04
          - fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Wait for the release asset to be reachable
        # The release was created in the previous job; GitHub's CDN
        # usually catches up within a few seconds, but we poll up to
        # ~90s to absorb any propagation lag. Hits the canonical URL
        # the user would (releases/latest/download/install.sh) so we
        # also verify the "latest" alias updated.
        run: |
          set -e
          URL="https://github.com/witwave-ai/witwave/releases/download/${{ github.ref_name }}/install.sh"
          for i in $(seq 1 30); do
            if curl -fsSL --max-time 5 -o /dev/null "$URL"; then
              echo "asset reachable after $((i*3))s: $URL"
              exit 0
            fi
            sleep 3
          done
          echo "::error::install.sh asset not reachable at $URL after 90s" >&2
          exit 1

      - name: Install just-cut release inside ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD":/src -w /src ${{ matrix.image }} sh -eux -c '
            case "$(. /etc/os-release && echo "$ID")" in
              alpine) apk add --no-cache curl ca-certificates tar ;;
              debian|ubuntu) apt-get update -qq && apt-get install -y -qq curl ca-certificates tar ;;
              fedora) dnf install -y -q curl ca-certificates tar ;;
            esac
            # Fetch the install.sh from the just-cut release (NOT the
            # in-repo copy) — the public-facing artifact is what we
            # actually need to validate.
            curl -fsSL "https://github.com/witwave-ai/witwave/releases/download/${{ github.ref_name }}/install.sh" -o /tmp/install.sh
            sh /tmp/install.sh --version ${{ github.ref_name }} --prefix /tmp/wwroot
            test -x /tmp/wwroot/bin/ww
            test -f /tmp/wwroot/bin/.ww.install-info
            grep -q "installer=curl" /tmp/wwroot/bin/.ww.install-info
            grep -q "version=${{ github.ref_name }}" /tmp/wwroot/bin/.ww.install-info
            /tmp/wwroot/bin/ww version

            # End-to-end ww-update round-trip: marker → DetectInstall-
            # Method → UpgradeCommand. Belongs here (not in pre-merge
            # CI) because the just-cut tag is guaranteed to include the
            # current InstallMethodCurl detection code, while pre-merge
            # CI pins to the latest existing tag which may predate it.
            #
            # We pinned --version to the tag we just cut, so the check
            # finds nothing newer and falls into the "Install method:"
            # reporting branch. GH API rate-limit failures take the same
            # branch (notice is nil), so the assertion is robust.
            /tmp/wwroot/bin/ww update --check > /tmp/update-out 2>&1 || true
            cat /tmp/update-out
            grep -q "Install method: curl-installer" /tmp/update-out \
              || { echo "ww update --check did not detect curl-installer method" >&2; exit 1; }
          '

  install-smoke-macos:
    name: install.sh smoke — macOS
    needs: goreleaser
    runs-on: macos-14
    if: github.ref_type == 'tag'
    permissions:
      contents: read
    steps:
      - name: Wait for the release asset to be reachable
        run: |
          set -e
          URL="https://github.com/witwave-ai/witwave/releases/download/${{ github.ref_name }}/install.sh"
          for i in $(seq 1 30); do
            if curl -fsSL --max-time 5 -o /dev/null "$URL"; then
              echo "asset reachable after $((i*3))s"
              exit 0
            fi
            sleep 3
          done
          echo "::error::install.sh asset not reachable at $URL after 90s" >&2
          exit 1

      - name: Install just-cut release on macOS arm64
        run: |
          curl -fsSL "https://github.com/witwave-ai/witwave/releases/download/${{ github.ref_name }}/install.sh" -o /tmp/install.sh
          sh /tmp/install.sh --version ${{ github.ref_name }} --prefix /tmp/wwroot
          test -x /tmp/wwroot/bin/ww
          test -f /tmp/wwroot/bin/.ww.install-info
          grep -q "installer=curl" /tmp/wwroot/bin/.ww.install-info
          /tmp/wwroot/bin/ww version

          # ww-update round-trip — proves marker → detector → UpgradeCommand
          # wiring. See the corresponding linux step for why this lives
          # in the post-release job rather than pre-merge CI.
          /tmp/wwroot/bin/ww update --check > /tmp/update-out 2>&1 || true
          cat /tmp/update-out
          grep -q "Install method: curl-installer" /tmp/update-out \
            || { echo "ww update --check did not detect curl-installer method" >&2; exit 1; }

  # Cosign-verify path coverage. install.sh's --verify-signature flag
  # downloads checksums.txt.sig + checksums.txt.pem and runs
  # `cosign verify-blob` against the keyless cert chain — a code path
  # ci-install-script.yml never exercises (no cosign on the runner).
  # The release workflow already installs cosign for goreleaser's own
  # signing step, so adding a smoke install with the flag costs almost
  # nothing here. Single host runner is enough — we're testing the
  # cosign branch, not whether the installed binary works (the matrix
  # above already proved that).
  install-smoke-cosign:
    name: install.sh smoke — --verify-signature
    needs: goreleaser
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Wait for the release asset to be reachable
        run: |
          set -e
          URL="https://github.com/witwave-ai/witwave/releases/download/${{ github.ref_name }}/install.sh"
          for i in $(seq 1 30); do
            if curl -fsSL --max-time 5 -o /dev/null "$URL"; then
              echo "asset reachable after $((i*3))s"
              exit 0
            fi
            sleep 3
          done
          echo "::error::install.sh asset not reachable at $URL after 90s" >&2
          exit 1

      - name: Install with --verify-signature
        run: |
          curl -fsSL "https://github.com/witwave-ai/witwave/releases/download/${{ github.ref_name }}/install.sh" -o /tmp/install.sh
          sh /tmp/install.sh --version ${{ github.ref_name }} \
            --prefix /tmp/wwroot --verify-signature
          test -x /tmp/wwroot/bin/ww
          /tmp/wwroot/bin/ww version
