# CI — Docs (#1481)
#
# Two jobs split on event type:
#
#   lint-changed (PR gate, hard-fail)
#     Runs prettier --check + markdownlint against the *.md files
#     touched in the PR diff only. Historical drift on untouched
#     files does NOT block unrelated PRs — the new floor is "no NEW
#     drift introduced." Convergence is incremental: as files are
#     edited their formatting is brought up to spec.
#
#   lint-full (push to main, hard-fail)
#     Runs the same tools across the whole repo and fails when drift
#     appears. The historical drift pile has been cleaned up, so main
#     now has a real repo-wide Markdown formatting/linting floor.
#
# Tooling pinned via npx --yes <pkg>@<version> — no package.json at
# repo root, no committed lockfile to maintain. Bump these versions
# the same way any other dep is bumped: edit + commit + push.
#
# Reflow IS enforced — .prettierrc.yaml carries proseWrap=always +
# printWidth=120, so unwrapped or over-long prose lines fail the
# PR gate.
#
# Excludes live in .prettierignore + .markdownlintignore (the two
# files mirror each other so both jobs agree on the file set).
name: CI — Docs

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/ci-docs.yml"
      - ".markdownlint.yaml"
      - ".prettierrc.yaml"
      - ".prettierignore"
      - ".markdownlintignore"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/ci-docs.yml"
      - ".markdownlint.yaml"
      - ".prettierrc.yaml"
      - ".prettierignore"
      - ".markdownlintignore"

# Cancel in-flight runs of this workflow on the same ref when a new
# commit lands — we only care about the latest state.
concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # PR gate — hard-fail on any drift in the *.md files this PR
  # adds, modifies, copies, or renames. Deletions are skipped.
  # ---------------------------------------------------------------
  lint-changed:
    name: Lint changed *.md (PR gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can diff base against head.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute changed *.md files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # --diff-filter=ACMR: Added, Copied, Modified, Renamed.
          # Skips Deleted (D) — we don't lint files that no longer
          # exist on HEAD.
          git diff --name-only --diff-filter=ACMR \
            "$BASE_SHA" "$HEAD_SHA" -- '*.md' \
            > .ci-changed-md.raw
          # Skip markdown symlinks. Prettier refuses explicit symlink
          # operands, and the canonical target file is linted directly.
          while IFS= read -r file; do
            if [ -n "$file" ] && [ ! -L "$file" ]; then
              printf '%s\n' "$file"
            fi
          done < .ci-changed-md.raw > .ci-changed-md.txt
          if [ -s .ci-changed-md.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "Changed *.md files:"
            cat .ci-changed-md.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No *.md files changed in this PR — nothing to check."
          fi

      - name: prettier --check (changed files)
        if: steps.changed.outputs.has_files == 'true'
        run: |
          set -euo pipefail
          # xargs piping the file list keeps shell-injection-safe
          # even though the repo currently has no spaces in paths.
          xargs npx --yes prettier@3.4.2 --check < .ci-changed-md.txt

      - name: markdownlint (changed files)
        if: steps.changed.outputs.has_files == 'true'
        run: |
          set -euo pipefail
          xargs \
            npx --yes markdownlint-cli@0.43.0 \
              --config .markdownlint.yaml \
              --ignore-path .markdownlintignore \
            < .ci-changed-md.txt

  # ---------------------------------------------------------------
  # Repo-wide lint on main. The repo now has a clean Markdown baseline,
  # so pushes to main should keep the whole tracked Markdown surface
  # formatted and lint-clean.
  # ---------------------------------------------------------------
  lint-full:
    name: Lint all *.md
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute tracked *.md files
        run: |
          set -euo pipefail
          git ls-files -z -- '*.md' |
            while IFS= read -r -d '' file; do
              # Skip markdown symlinks. Prettier refuses explicit
              # symlink operands; the canonical target file is checked
              # directly elsewhere in this list.
              if [ ! -L "$file" ]; then
                printf '%s\0' "$file"
              fi
            done > .ci-all-md.zlist

      - name: prettier --check (full repo)
        run: |
          set -euo pipefail
          xargs -0 npx --yes prettier@3.4.2 --check < .ci-all-md.zlist

      - name: markdownlint (full repo)
        run: |
          set -euo pipefail
          xargs -0 \
            npx --yes markdownlint-cli@0.43.0 \
            --config .markdownlint.yaml \
            --ignore-path .markdownlintignore \
            < .ci-all-md.zlist
