name: Publish social website

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: publish-social-website
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish to witwave-ai.github.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout witwave source
        uses: actions/checkout@v4

      - name: Clone website repository
        id: website_repo
        env:
          WEBSITE_DEPLOY_KEY: ${{ secrets.WITWAVE_AI_GITHUB_IO_DEPLOY_KEY }}
          WEBSITE_TOKEN: ${{ secrets.WITWAVE_AI_GITHUB_IO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "$WEBSITE_TOKEN" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=token" >> "$GITHUB_OUTPUT"
            auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$WEBSITE_TOKEN" | base64 | tr -d '\n')"
            git -c http.https://github.com/.extraheader="$auth_header" \
              clone https://github.com/witwave-ai/witwave-ai.github.io.git _site-repo
            exit 0
          fi

          if [ -z "$WEBSITE_DEPLOY_KEY" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Website publish skipped::Set WITWAVE_AI_GITHUB_IO_DEPLOY_KEY or WITWAVE_AI_GITHUB_IO_TOKEN to publish automatically."
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "auth_mode=ssh" >> "$GITHUB_OUTPUT"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$WEBSITE_DEPLOY_KEY" > "$HOME/.ssh/witwave-ai-github-io"
          chmod 600 "$HOME/.ssh/witwave-ai-github-io"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts"

          GIT_SSH_COMMAND="ssh -i $HOME/.ssh/witwave-ai-github-io -o IdentitiesOnly=yes" \
            git clone git@github.com:witwave-ai/witwave-ai.github.io.git _site-repo

      - name: Sync static website
        if: steps.website_repo.outputs.publish == 'true'
        run: scripts/sync-social-website.sh _site-repo

      - name: Commit and push website changes
        if: steps.website_repo.outputs.publish == 'true'
        working-directory: _site-repo
        env:
          AUTH_MODE: ${{ steps.website_repo.outputs.auth_mode }}
          SOURCE_SHA: ${{ github.sha }}
          WEBSITE_TOKEN: ${{ secrets.WITWAVE_AI_GITHUB_IO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "No website changes to publish."
            exit 0
          fi

          git config user.name "witwave website publisher"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish social website from ${SOURCE_SHA:0:12}"

          if [ "$AUTH_MODE" = "token" ]; then
            auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$WEBSITE_TOKEN" | base64 | tr -d '\n')"
            git -c http.https://github.com/.extraheader="$auth_header" \
              push https://github.com/witwave-ai/witwave-ai.github.io.git HEAD:main
          else
            GIT_SSH_COMMAND="ssh -i $HOME/.ssh/witwave-ai-github-io -o IdentitiesOnly=yes" \
              git push origin HEAD:main
          fi
