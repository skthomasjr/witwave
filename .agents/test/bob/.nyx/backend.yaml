backend:
  agents:
    - id: claude
      url: http://localhost:8090
      model: claude-opus-4-6

    - id: codex
      url: http://localhost:8091
      model: gpt-5.1-codex-max

    # gemini intentionally omitted — disabled in values-test.yaml because no
    # API key is provisioned. Restore both this entry and the values-test
    # backend block to re-enable.

  routing:
    default:
      agent: codex
      model: gpt-5.1-codex-max
    a2a:
      agent: codex
      model: gpt-5.1-codex-max
    heartbeat:
      agent: codex
      model: gpt-5.1-codex-max
    job:
      agent: codex
      model: gpt-5.1-codex-max
    task:
      agent: codex
      model: gpt-5.1-codex-max
    trigger:
      agent: codex
      model: gpt-5.1-codex-max
    continuation:
      agent: codex
      model: gpt-5.1-codex-max
