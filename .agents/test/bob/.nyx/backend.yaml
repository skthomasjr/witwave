backend:
  agents:
    - id: claude
      url: http://localhost:8090
      model: claude-opus-4-6

    # codex and gemini omitted — no API budget for codex, no key provisioned
    # for gemini. Restore those entries (and re-enable the backends in
    # values-test.yaml) to bring them back.

  routing:
    default:
      agent: claude
      model: claude-opus-4-6
    a2a:
      agent: claude
      model: claude-opus-4-6
    heartbeat:
      agent: claude
      model: claude-opus-4-6
    job:
      agent: claude
      model: claude-opus-4-6
    task:
      agent: claude
      model: claude-opus-4-6
    trigger:
      agent: claude
      model: claude-opus-4-6
    continuation:
      agent: claude
      model: claude-opus-4-6
