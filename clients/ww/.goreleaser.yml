# goreleaser config for the ww CLI.
# Run `goreleaser release --clean` from clients/ww; requires GITHUB_TOKEN
# and HOMEBREW_TAP_GITHUB_TOKEN env vars at release time.
#
# The tap repo (skthomasjr/homebrew-ww) does not exist yet — the
# Homebrew publish step will fail cleanly until it's created.
version: 2

project_name: ww

before:
  hooks:
    - go mod tidy

builds:
  - id: ww
    main: .
    binary: ww
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/skthomasjr/autonomous-agent/clients/ww/cmd.Version={{.Version}}'
      - -X 'github.com/skthomasjr/autonomous-agent/clients/ww/cmd.Commit={{.ShortCommit}}'
      - -X 'github.com/skthomasjr/autonomous-agent/clients/ww/cmd.BuildDate={{.Date}}'

archives:
  - id: ww
    ids:
      - ww
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt
  algorithm: sha256

# #1357: cosign keyless signing of the checksums.txt + each binary via
# GitHub OIDC. Consumers verify with:
#   cosign verify-blob --certificate ww_<tag>_checksums.txt.pem \
#     --signature ww_<tag>_checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/skthomasjr/autonomous-agent/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
# Requires cosign binary on the runner; ubuntu-latest has it pre-installed
# in setup-oidc contexts via sigstore/cosign-installer.
signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "--yes"
      - "${artifact}"
    artifacts: checksum

# SLSA provenance — emits a provenance attestation so consumers can
# verify the binary was built by this repo's GitHub Actions.
sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: skthomasjr
    name: autonomous-agent
  draft: false
  prerelease: auto
  mode: replace

brews:
  - name: ww
    ids:
      - ww
    # Tap repo — will be created in a follow-up; release will fail at
    # this step until the repo exists + token has write access.
    repository:
      owner: skthomasjr
      name: homebrew-ww
      branch: main
    directory: Formula
    homepage: https://github.com/skthomasjr/autonomous-agent
    description: witwave CLI for the Witwave multi-container agent platform
    license: Apache-2.0
    test: |
      system "#{bin}/ww", "version"
    install: |
      bin.install "ww"
