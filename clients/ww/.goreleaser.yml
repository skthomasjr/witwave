# goreleaser config for the ww CLI.
# Run `goreleaser release --clean` from clients/ww; requires GITHUB_TOKEN
# and HOMEBREW_TAP_GITHUB_TOKEN env vars at release time.
#
# Tap repo: witwave-ai/homebrew-ww (created as part of the witwave-era
# beta; formula push requires HOMEBREW_TAP_GITHUB_TOKEN — a
# fine-grained PAT scoped to the tap repo with Contents:Read-and-Write.
# The source repo's default GITHUB_TOKEN cannot push across owners.
version: 2

project_name: ww

before:
  hooks:
    # Sync the embedded witwave-operator chart before ANY build step so
    # `go:embed` picks up the current charts/witwave-operator contents.
    # CI guards this via the --check variant; releases always write.
    - ../../scripts/sync-embedded-chart.sh
    # Bump the embedded chart's version + appVersion to match the
    # release tag. Without this the shipped binary would report
    # chart version 0.1.0 (the canonical placeholder on main) instead
    # of the actual release — making `ww operator status` misleading
    # when paired with a released ww. The canonical Chart.yaml in the
    # repo stays at its placeholder; only the embedded copy bundled
    # into this release gets rewritten.
    - 'bash -c "../../scripts/bump-embedded-chart-version.sh ${GORELEASER_CURRENT_TAG:-}"'
    - go mod tidy
    # goreleaser runs from clients/ww/ but the Apache-2.0 LICENSE sits
    # at the repo root. `src: ../../LICENSE` in archives.files doesn't
    # work (goreleaser rejects parent-dir prefixes for archive globs,
    # see v0.4.0-beta.2 CI log). Copy the file into the build dir
    # before archiving; it's gitignored here so local dev doesn't end
    # up with a stray duplicate.
    - cp ../../LICENSE LICENSE
    # Same parent-dir issue applies to release.extra_files for the
    # universal curl installer (#v0.9.0 release attempt: glob
    # `../../scripts/install.sh` produced a mangled `.//home/runner/...`
    # static prefix and stat failed). Mirror the LICENSE pattern: copy
    # the script into the build dir, then reference it locally below.
    - cp ../../scripts/install.sh install.sh

builds:
  - id: ww
    main: .
    binary: ww
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/witwave-ai/witwave/clients/ww/cmd.Version={{.Version}}'
      - -X 'github.com/witwave-ai/witwave/clients/ww/cmd.Commit={{.ShortCommit}}'
      - -X 'github.com/witwave-ai/witwave/clients/ww/cmd.BuildDate={{.Date}}'

archives:
  - id: ww
    ids:
      - ww
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      # LICENSE is copied into clients/ww/ by the before-hook above.
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

# #1357: cosign keyless signing of the checksums.txt + each binary via
# GitHub OIDC. Consumers verify with:
#   cosign verify-blob --certificate ww_<tag>_checksums.txt.pem \
#     --signature ww_<tag>_checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/witwave-ai/witwave/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
# Requires cosign binary on the runner; ubuntu-latest has it pre-installed
# in setup-oidc contexts via sigstore/cosign-installer.
signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "--yes"
      - "${artifact}"
    artifacts: checksum

# SLSA provenance — emits a provenance attestation so consumers can
# verify the binary was built by this repo's GitHub Actions.
sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: witwave-ai
    name: witwave
  draft: false
  prerelease: auto
  mode: replace
  # Ship the universal curl installer alongside the binaries so
  # `https://github.com/<owner>/<repo>/releases/latest/download/install.sh`
  # always resolves to the script that matches the latest release.
  # The before-hook above copies scripts/install.sh into clients/ww/
  # (gitignored locally), so the glob is local — parent-dir globs
  # don't work in release.extra_files (see v0.9.0 release attempt
  # for the failure log).
  extra_files:
    - glob: install.sh

brews:
  - name: ww
    ids:
      - ww
    # Tap repo under the witwave-ai org. Formula push requires
    # HOMEBREW_TAP_GITHUB_TOKEN (fine-grained PAT with Contents:
    # Read-and-Write on witwave-ai/homebrew-ww); default GITHUB_TOKEN
    # can't push across owners. goreleaser v2 dropped the v1
    # auto-detection of HOMEBREW_TAP_GITHUB_TOKEN, so the token must be
    # wired explicitly via repository.token for the tap push to use it
    # instead of falling back to GITHUB_TOKEN.
    repository:
      owner: witwave-ai
      name: homebrew-ww
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/witwave-ai/witwave
    description: witwave CLI for the Witwave multi-container agent platform
    license: Apache-2.0
    test: |
      system "#{bin}/ww", "version"
    install: |
      bin.install "ww"
