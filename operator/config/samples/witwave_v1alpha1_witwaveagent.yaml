apiVersion: witwave.ai/v1alpha1
kind: WitwaveAgent
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: adam
spec:
  port: 8000
  image:
    repository: ghcr.io/witwave-ai/images/harness
    # tag defaults to the operator's DefaultImageTag when unset
  metrics:
    enabled: false
  backends:
    - name: claude
      image:
        repository: ghcr.io/witwave-ai/images/claude
      port: 8000
      model: claude-opus-4-6
      # envFrom references a Secret the user creates separately, e.g.
      # kubectl create secret generic adam-claude-secrets \
      #   --from-literal=ANTHROPIC_API_KEY=sk-ant-...
      # envFrom:
      #   - secretRef:
      #       name: adam-claude-secrets
    # Echo is a zero-dependency stub backend used as the hello-world default
    # for `ww agent create`. No credentials, no envFrom, no model — it returns
    # a canned response quoting the caller's prompt. Handy to keep alongside
    # a real backend for smoke tests without burning LLM credits; remove it
    # once you no longer need the sanity-check surface. See backends/echo/README.md.
    - name: echo
      image:
        repository: ghcr.io/witwave-ai/images/echo
      port: 8001
