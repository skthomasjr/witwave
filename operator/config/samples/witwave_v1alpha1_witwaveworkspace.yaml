apiVersion: witwave.ai/v1alpha1
kind: WitwaveWorkspace
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: shared
spec:
  # Shared volumes provisioned for this workspace. Each entry produces one PVC.
  # This sample keeps the claim small and ReadWriteOnce so it applies cleanly on
  # common single-node dev clusters. Use ReadWriteMany plus an explicit storage
  # class for a production workspace shared across nodes.
  volumes:
    - name: source
      size: 1Gi
      accessMode: ReadWriteOnce
      reclaimPolicy: Delete

  # Optional pre-created Secret references can be projected onto every
  # participating agent. Keep the default sample self-contained; uncomment only
  # after creating the Secret in this namespace.
  # secrets:
  #   - name: github-token
  #     envFrom: true

  # ConfigMap-backed files mounted onto every participating agent. Each entry
  # references either a pre-created ConfigMap or carries inline content the
  # operator renders into an owned ConfigMap.
  configFiles:
    - inline:
        name: repo-info
        path: workspace.yaml
        content: |
          repos:
            - name: witwave
      mountPath: /workspaces/shared/workspace.yaml
