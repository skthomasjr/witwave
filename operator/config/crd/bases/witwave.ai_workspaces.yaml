---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
    helm.sh/resource-policy: keep
  name: workspaces.witwave.ai
spec:
  group: witwave.ai
  names:
    kind: Workspace
    listKind: WorkspaceList
    plural: workspaces
    shortNames:
    - ws
    singular: workspace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.volumes[*]
      name: Volumes
      priority: 1
      type: integer
    - jsonPath: .status.boundAgents[*]
      name: Bound
      priority: 1
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Workspace is the Schema for the workspaces API. A Workspace provisions
          shared volumes, projects pre-created Secrets, and renders ConfigMap-backed
          files that the operator stamps onto every WitwaveAgent whose
          Spec.WorkspaceRefs references it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkspaceSpec is the desired state of a Workspace.
            properties:
              configFiles:
                description: |-
                  ConfigFiles lists ConfigMap-backed files mounted onto every
                  participating agent. Each entry references either a pre-created
                  ConfigMap or carries inline content the operator renders into an
                  owned ConfigMap.
                items:
                  description: |-
                    WorkspaceConfigFile describes one configuration file mount stamped onto
                    every participating agent. Exactly one of ConfigMap or Inline must be
                    set; the webhook rejects entries that violate the invariant.
                  properties:
                    configMap:
                      description: |-
                        ConfigMap references a pre-created ConfigMap by name. When set, the
                        operator does not own the ConfigMap and never reconciles its data —
                        it is only mounted into the participating agents.
                      pattern: ^[a-z0-9][a-z0-9.-]*$
                      type: string
                    inline:
                      description: |-
                        Inline carries operator-rendered content. When set the operator
                        reconciles a ConfigMap owned by the Workspace via IsControlledBy +
                        label dual-check.
                      properties:
                        content:
                          description: |-
                            Content is the literal file contents. Stamped verbatim into the
                            ConfigMap data — no templating, no validation, no expansion.
                          type: string
                        name:
                          description: Name is the ConfigMap data key (and conventional
                            filename).
                          minLength: 1
                          type: string
                        path:
                          description: |-
                            Path is the filename inside the rendered ConfigMap (typically the
                            same as Name). Materialised as one ConfigMap key.
                          minLength: 1
                          type: string
                      required:
                      - content
                      - name
                      - path
                      type: object
                    mountPath:
                      description: |-
                        MountPath is the absolute path inside each participating agent's
                        containers where this file is mounted.
                      minLength: 1
                      pattern: ^/.*
                      type: string
                    subPath:
                      description: |-
                        SubPath optionally restricts the mount to a single key inside the
                        referenced ConfigMap (matches Kubernetes' standard volumeMount
                        SubPath semantics). Use it when MountPath points at a single file
                        rather than a directory.
                      type: string
                  required:
                  - mountPath
                  type: object
                maxItems: 50
                type: array
              secrets:
                description: |-
                  Secrets lists pre-created Secret references projected onto every
                  participating agent. The operator never writes to these Secrets —
                  secrets-write RBAC is intentionally out of the workspace controller's
                  trust boundary.
                items:
                  description: |-
                    WorkspaceSecret declares a workspace-scoped Secret reference. The operator
                    stays out of the secrets-write trust boundary by accepting only references
                    to pre-created Secrets — no inline data field exists by design (see
                    tmp/workspace-crd.md "Soft-leaning decisions baked in").
                  properties:
                    envFrom:
                      description: |-
                        EnvFrom, when true, projects the Secret's keys as environment
                        variables on every backend container of every participating agent.
                        Mutually exclusive with MountPath.
                      type: boolean
                    mountPath:
                      description: |-
                        MountPath, when non-empty, mounts the Secret as a directory of files
                        at the given absolute path. Each Secret key becomes one file. Mutually
                        exclusive with EnvFrom — admission rejects entries that set both.
                      pattern: ^(|/.*)$
                      type: string
                    name:
                      description: Name references an existing Secret in the Workspace's
                        namespace.
                      minLength: 1
                      pattern: ^[a-z0-9][a-z0-9.-]*$
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 50
                type: array
              volumes:
                description: |-
                  Volumes lists the shared volumes provisioned for this workspace. Each
                  entry produces one PVC the operator stamps onto every participating
                  agent's pods.
                items:
                  description: |-
                    WorkspaceVolume describes one shared volume stamped onto every agent that
                    references the parent Workspace. Mirrors the shape of `SharedStorageSpec`
                    (per-agent) but lives at workspace scope so multiple agents can converge
                    on the same PVC.
                  properties:
                    accessMode:
                      default: ReadWriteMany
                      description: |-
                        AccessMode is the PVC access mode. Defaults to ReadWriteMany and
                        rejected at admission for any other value in v1alpha1 — the design
                        doc commits to RWM on the v1 cut. RWO single-node fallback is tracked
                        for v1.x.
                      type: string
                    mountPath:
                      description: |-
                        MountPath is the absolute path inside each participating agent's
                        containers. When empty the controller derives
                        `/workspaces/<workspace>/<volume.name>` so cross-agent paths line up
                        without operator-supplied glue.
                      pattern: ^(|/.*)$
                      type: string
                    name:
                      description: |-
                        Name is the workspace-local volume identifier. Used to derive the PVC
                        name (`<workspace>-vol-<name>`) and the per-agent volumeMount name
                        (`workspace-<workspace>-<name>`). DNS-1123 label-safe so the rendered
                        resource names stay valid.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9][a-z0-9-]*$
                      type: string
                    reclaimPolicy:
                      default: Delete
                      description: |-
                        ReclaimPolicy controls PVC cleanup on Workspace deletion. Defaults
                        to Delete; flip to Retain for stateful volumes whose data must
                        survive a Workspace recreate.
                      enum:
                      - Delete
                      - Retain
                      type: string
                    size:
                      anyOf:
                      - type: integer
                      - type: string
                      description: |-
                        Size is the PVC storage request (e.g. `50Gi`). Required for
                        StorageType=pvc when the operator creates the PVC. Stored as a
                        resource.Quantity so the structural schema rejects malformed values
                        before they reach the controller.
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    storageClassName:
                      description: |-
                        StorageClassName is the storage class for the operator-created PVC.
                        When nil the cluster default storage class is used.
                      type: string
                    storageType:
                      default: pvc
                      description: |-
                        StorageType selects the VolumeSource. Only `pvc` is honoured in
                        v1alpha1; the webhook rejects `hostPath`.
                      enum:
                      - pvc
                      - hostPath
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 20
                type: array
            type: object
          status:
            description: WorkspaceStatus is the observed state of a Workspace.
            properties:
              boundAgents:
                description: |-
                  BoundAgents is the operator-maintained inverted index of WitwaveAgents
                  that currently reference this workspace via Spec.WorkspaceRefs.
                items:
                  description: |-
                    WorkspaceBoundAgent records one WitwaveAgent that currently references this
                    Workspace via Spec.WorkspaceRefs. The list is maintained by the workspace
                    controller as an inverted index — agents are the source of truth.
                  properties:
                    name:
                      description: Name of the bound WitwaveAgent.
                      type: string
                    namespace:
                      description: |-
                        Namespace of the bound WitwaveAgent. Recorded explicitly even though
                        in v1alpha1 the controller only matches same-namespace agents — the
                        field documents the assumption and keeps the door open for a future
                        cross-namespace shape without status-format churn.
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              conditions:
                description: Conditions follow the standard Kubernetes condition convention.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the spec generation most recently
                  reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
