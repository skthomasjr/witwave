      AGENT_URL: http://iris-a2-codex:8080
      AGENT_MD: /home/agent/agent.md
      BACKEND_PORT: 8080
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      METRICS_ENABLED: "true"
    volumes:
      - ./.agents/active/iris/a2-codex/agent.md:/home/agent/agent.md:ro
      - ./.agents/active/iris/.nyx/AGENTS.md:/home/agent/.codex/AGENTS.md:ro
      - ./.agents/active/iris/.codex/config.toml:/home/agent/.codex/config.toml
      - ./.claude/skills:/home/agent/.codex/skills
      - ./.agents/active/iris/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/active/iris/logs/trace.jsonl:/home/agent/logs/trace.jsonl
      - ./.agents/active/iris/a2-codex/memory:/home/agent/memory
      - .:/home/agent/workspace

  iris-a2-gemini:
    build:
      context: .
      dockerfile: a2-gemini/Dockerfile
    image: a2-gemini:latest
    restart: unless-stopped
    ports:
      - "8012:8080"
