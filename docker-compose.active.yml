services:
  iris:
    image: nyx-agent:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AGENT_NAME: iris
      AGENT_PORT: 8000
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GH_REPO: skthomasjr/autonomous-agent
      GH_TOKEN: ${GITHUB_TOKEN_AUTONOMOUS_AGENT}
      METRICS_ENABLED: "true"
    volumes:
      - ./.agents/active/iris/.nyx:/home/agent/.nyx
      - ./.agents/active/manifest.json:/home/agent/.nyx/manifest.json:ro
      - ./.agents/active/iris/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/active/iris/logs/trace.jsonl:/home/agent/logs/trace.jsonl

  iris-a2-claude:
    build:
      context: .
      dockerfile: a2-claude/Dockerfile
    image: a2-claude:latest
    restart: unless-stopped
    ports:
      - "8010:8080"
    environment:
      AGENT_NAME: iris-a2-claude
      AGENT_OWNER: iris
      AGENT_ID: claude
      AGENT_URL: http://iris-a2-claude:8080
      AGENT_MD: /home/agent/agent.md
      BACKEND_PORT: 8080
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      METRICS_ENABLED: "true"
    volumes:
      - ./.agents/active/iris/a2-claude/agent.md:/home/agent/agent.md:ro
      - ./.agents/active/iris/.nyx/AGENTS.md:/home/agent/.claude/CLAUDE.md:ro
      - ./.agents/active/iris/.claude/mcp.json:/home/agent/.claude/mcp.json
      - ./.agents/active/iris/.claude/settings.json:/home/agent/.claude/settings.json
      - ./.claude/skills:/home/agent/.claude/skills
      - ./.agents/active/iris/logs/conversation.jsonl:/home/agent/logs/conversation.jsonl
      - ./.agents/active/iris/logs/trace.jsonl:/home/agent/logs/trace.jsonl
      - ./.agents/active/iris/a2-claude/memory:/home/agent/memory
      - .:/home/agent/workspace

  iris-a2-codex:
    build:
      context: .
      dockerfile: a2-codex/Dockerfile
    image: a2-codex:latest
    restart: unless-stopped
    ports:
      - "8011:8080"
    environment:
      AGENT_NAME: iris-a2-codex
      AGENT_OWNER: iris
