# nyx dashboard nginx config (#470).
# Serves the static Vite bundle out of /usr/share/nginx/html and proxies
# /api/* to the upstream harness service. The upstream host is driven by an
# env var so the same image is reusable across agents; Helm stamps
# HARNESS_URL into the pod environment and envsubst patches nginx.conf at
# container start.

server {
  listen 8080;
  server_name _;

  # Static SPA bundle.
  root /usr/share/nginx/html;
  index index.html;

  # History-mode fallback so deep-linked routes (e.g. /team) hit index.html
  # rather than returning 404 from nginx's static resolver.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy to the nyx-harness service. HARNESS_URL is expected to be
  # a full origin like http://nyx-iris-harness:8000; it can be overridden at
  # deploy time via the Helm chart (see charts/nyx/values.yaml dashboard.*).
  location /api/ {
    # Default points at the conventional in-cluster name; real deployments
    # should override via HARNESS_URL.
    set $harness_url "http://localhost:8000";
    if ($http_x_nyx_harness_url != "") {
      set $harness_url $http_x_nyx_harness_url;
    }
    proxy_pass $harness_url/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # /health — cheap liveness probe distinct from harness /health.
  location = /health {
    access_log off;
    add_header Content-Type application/json;
    return 200 '{"status":"ok","component":"dashboard"}';
  }
}
