# nyx dashboard nginx config (#470).
# Lives at /etc/nginx/templates/default.conf.template inside the image so the
# nginx-unprivileged entrypoint runs envsubst over it at container start —
# ${HARNESS_URL} is replaced with the pod's HARNESS_URL env var, which the
# Helm chart and operator stamp from .Values.dashboard.harnessUrl (defaults
# to a per-deployment-specific agent service name).

server {
  listen 8080;
  server_name _;

  # Static SPA bundle.
  root /usr/share/nginx/html;
  index index.html;

  # History-mode fallback so deep-linked routes (e.g. /team) hit index.html
  # rather than returning 404 from nginx's static resolver.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy to the upstream agent. ${HARNESS_URL} is substituted at
  # container start via the nginx-unprivileged image's envsubst pass over
  # /etc/nginx/templates/*.template — see Dockerfile.
  location /api/ {
    proxy_pass ${HARNESS_URL}/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # /health — cheap liveness probe distinct from the upstream agent's /health.
  location = /health {
    access_log off;
    add_header Content-Type application/json;
    return 200 '{"status":"ok","component":"dashboard"}';
  }
}
